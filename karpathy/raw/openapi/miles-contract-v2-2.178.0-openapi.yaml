  /contracts:
    get:
      summary: Find contracts
      description: 'This endpoint retrieves a list of contracts.It can be used with a search query to filter on the following attributes: contract reference, driver identification, customer trading name, fleet vehicle license plate and fleet vehicle description.The endpoint accepts multiple keywords separated by spaces, except for queries with only one character or the !, % and ^ wildcards. No spaces means that the whole string will be compared.An example for a search query is ''Jo 600214 9-XPP-'': a search will be performed to find a match or partial match for ''Jo'' or ''600214'' or ''9-XPP-'' on the attributes listed above.'
      operationId: findContracts
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: contract_id
          in: query
          description: ID(s) of the contract(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: customer_id
          in: query
          description: ID(s) of the customer(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: broker_company_id
          in: query
          description: ID(s) of the broker company(ies), only useful in case of broker/dealer users
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '500003'
            x-miles-extra-description:
              Will be ignored when using a searchQuery: 'false'
        - name: driver_id
          in: query
          description: ID(s) of the driver(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: vehicle_nature_id
          in: query
          description: ID(s) of the contract type(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: product_category_group_id
          in: query
          description: ID(s) of the product category group enumeration(s) for contracts. Only enumerations within configuration property included_product_category_group_enum_ids can be requested here.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: max_contract_run_out_date
          in: query
          description: Max contract run out date, determines when the contract is expected to end.
          schema:
            type: string
            format: date
            example: '2026-03-20'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: max_start_date
          in: query
          description: Max start date of the contract, the contract should have at least started before this date.
          schema:
            type: string
            format: date
            example: '2026-03-20'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: only_running
          in: query
          description: Deprecated since 2022-08-08 and version 2.59.0 in favor of contractStatusGroupIds
          schema:
            type: boolean
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: contractStatusGroupIds
          in: query
          description: Contract status group ID(s) to filter the search on
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: 1094, 1095
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: contract_status_id
          in: query
          description: Contract status ID(s) to filter the search on. If this is provided as filter together with contract status group ID(s), only the contract status ID(s) will be taken into account.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: 566, 567, 1295
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: vehicle_option_type_group_id
          in: query
          description: ID(s) of the vehicle option type group(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100041'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'false'
        - name: search_query
          in: query
          description: NOTICE THIS WILL ONLY WORK FOR POSTGRES ODS By filling in this property you can do a back-end search
          schema:
            type: string
          example: Krista
          x-miles-search:
            driver.identification: The identification (usually a concatenation first name and last name) of the driver of the contract
            fleetVehicle.description: The description of the vehicle of the contract
            fleetVehicle.licensePlate: The license plate of the vehicle of the contract
            contract.reference: The reference of the contract
            customer.officialRegistration: The official registration of the customer
            customer.tradingName: The trading name of the customer of the contract
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindContractsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '500':
          description: |-
            - Missing vehicle nature
             - Error fetching proxy objects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
            - mobility_user
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
