components:
  schemas:
    AttachedDepositDocument:
      type: object
      properties:
        depositId:
          type: string
          description: The ID of the deposit
          example: '1234567'
        documentId:
          type: string
          description: The ID of the document
          example: '7654321'
        name:
          description: The name of the document
          $ref: '#/components/schemas/MultiLanguageValue'
        documentTypeId:
          type: string
          description: The ID of the document type
          example: '935147'
        documentStatus:
          description: The document status enumeration value
          $ref: '#/components/schemas/EnumValue'
        documentClass:
          description: The document class enumeration value
          $ref: '#/components/schemas/EnumValue'
        description:
          description: The description of the attached document
          $ref: '#/components/schemas/MultiLanguageValue'
        documentTemplateName:
          description: The name of the document template
          $ref: '#/components/schemas/MultiLanguageValue'
        createdAt:
          type: string
          description: The date the document was created
          format: date-time
          example: '2026-03-20T14:36:13.534Z'
      description: Deposit document
    EnumValue:
      title: EnumValue
      type: object
      properties:
        enumId:
          type: string
          description: The enumeration ID
          example: '100002'
        attributeTypeId:
          type: string
          description: ' The ID of the attribute type'
          example: '237'
        enumGroupId:
          type: string
          description: This will be represented as a separate attribute value
          example: '1350'
          deprecated: true
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '24379'
        translation:
          type: string
          description: The translation of the enumeration ID in human-readable format
          example: Request
        enabled:
          type: boolean
          description: Indicates whether this object can still be used
          example: true
      description: Miles API v1 representation of an enum value. It contains additional values representing the attribute type and multi-language context.
    MultiLanguageValue:
      title: MultiLanguageValue
      type: object
      properties:
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '170392'
        translation:
          type: string
          description: The translation of the multi-language ID in human-readable format
          example: Hatchback
      description: Miles API v1 representation of a translated string value.
    AttachedDocumentRequest:
      type: object
      properties:
        file:
          type: string
          description: file data
          format: binary
        description:
          type: string
    ExceptionInfoDTO:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type. This provides human-readable documentation for the problem type when dereferenced.
          example: https://api.sofico.global/problems/microservices/service-unavailable
        title:
          type: string
          description: A short, human-readable summary of the problem type
          example: Service Unavailable
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
          example: The requested service is not available.
        message:
          description: Message objects containing translation information
          $ref: '#/components/schemas/MultiLanguageValue'
        arguments:
          type: array
          description: Additional arguments that provide context for the error
          items:
            type: string
            example: '34898219'
    WarningsInfoDTO:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type. This provides human-readable documentation for the problem type when dereferenced.
          example: https://api.sofico.global/warnings/microservices/unprocessable-entity
        title:
          type: string
          description: A short, human-readable summary of the problem type
          example: Unprocessable Entity
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
          example: Unable to process payload due to invalid data.
        messages:
          type: array
          description: An array of message objects containing translation information
          items:
            $ref: '#/components/schemas/MultiLanguageValue'
        arguments:
          type: array
          description: Additional arguments that provide context for the error
          items:
            type: string
            example: '23121434'
        isInteractiveWarning:
          type: boolean
          description: Indicates whether this error requires user interaction
          example: false
    AbstractValue:
      type: object
    CostTypeComponentResponse:
      type: object
      properties:
        costTypeComponentId:
          type: string
          description: The ID of the cost type component that was used for the calculation
          example: 557a2b02-4997-4086-b57f-a4192c36d317
        price:
          description: The price
          $ref: '#/components/schemas/MultiCurrencyValue'
        reference:
          type: string
          description: The reference of the cost type component
          example: winter_tires
        name:
          type: string
          description: The name of the cost type component
          example: Additional cost
      description: Cost type component price
    Customer:
      type: object
      properties:
        customerId:
          type: string
          description: The ID of the customer
          example: '456466'
        reference:
          type: string
          description: The reference of the customer
          example: '998425'
        businessUnitLegalName:
          type: string
          description: Deprecated since 2022-06-01 and version 2.40.0 in favor of legalName
          example: Empire
          deprecated: true
        legalName:
          type: string
          description: The legal name of the business unit
          example: Empire
        tradingName:
          type: string
          description: The trading name of the customer
          example: Empire
        legalEntity:
          description: The legal entity type of the customer
          $ref: '#/components/schemas/EnumValue'
        officialRegistration:
          type: string
          description: The official registration of the customer
          example: 36468213B
      description: The customer on the contract
    DoubleUnitValue:
      title: DoubleUnitValue
      type: object
      properties:
        value:
          type: number
          description: The value contains a decimal number
          format: double
          example: 3.9
        unit:
          description: The unit of the value
          $ref: '#/components/schemas/UnitValue'
      description: Miles API v1 representation of a double with an additional unit value.
    Driver:
      type: object
      properties:
        driverId:
          type: string
          description: The ID of the driver
          example: '456466'
      description: The driver linked to the quote
    DynamicAttributeValue:
      title: DynamicAttributeValue
      type: object
      properties:
        valueType:
          type: integer
          description: |
            Based on this integer the 'value' will consist of a value matching these types: 
             * 1  = MultiLanguageValue 
             * 2  = EnumValue 
             * 3  = MultiCurrencyValue 
             * 4  = DoubleUnitValue 
             * 5  = IntegerUnitValue 
             * 6  = StringValue 
             * 7  = IntegerValue 
             * 8  = DoubleValue 
             * 9  = BooleanValue 
             * 10 = UnnamedValue 
             * 11 = DateValue 
             * 12 = TimeValue 
             * 13 = DateTimeValue 
             * 14 = ZonedDateTimeValue 
             * 15 = LongValue 
          format: int32
          example: 7
        value:
          description: An object that contains the actual value
          $ref: '#/components/schemas/AbstractValue'
        sysRepAttributeId:
          type: string
          description: The Miles back-office application ID that describes the attribute
      description: Miles API v1 representation of a dynamic attribute value.It has a 'valueType' as a discriminator for the actual 'value'.The 'sysRepAttributeId' identifies which attribute value is represented.
      deprecated: true
    ForeignCurrencyValue:
      title: ForeignCurrencyValue
      type: object
      properties:
        value:
          type: number
          description: The value that holds the currency amount
          format: double
          example: 25.56
        currency:
          type: string
          description: The ISO code of the currency
          example: USD
      description: Miles API v1 representation of a foreign currency value.
    LabeledPrice:
      type: object
      properties:
        value:
          description: The price
          $ref: '#/components/schemas/MultiCurrencyValue'
        budgetUnit:
          description: The kind of budget unit
          $ref: '#/components/schemas/EnumValue'
        label:
          type: string
          description: The label of the price returned in this object. It reflects the displayed price like the cost type or the lease price name.
          example: excl. VAT without fuel provision
        costTypeId:
          type: string
          description: The ID of the cost type that was used for the calculation. Note that `budgetUnit` cannot be set in combination with this field.
          example: 557a2b02-4997-4086-b57f-a4192c36d317
      description: The applicable lease price of the product
    LeasingCompany:
      type: object
      properties:
        leasingCompanyId:
          type: string
          description: The ID of the leasing company
          example: '1'
      description: The leasing company that managed the contract
    MultiCurrencyValue:
      title: MultiCurrencyValue
      type: object
      properties:
        value:
          type: number
          description: The value that holds the currency amount
          format: double
          example: 25.56
        currencyValue:
          type: number
          description: The currency amount in a different currency. Deprecated since 2025-07-10 and version '3.5.0' in favor of 'foreignCurrency'.
          format: double
          example: 27.56
          deprecated: true
        currencyId:
          type: string
          description: The ID of the currency. Deprecated since 2025-07-10 and version '3.5.0' in favor of 'foreignCurrency'.
          example: '2'
          deprecated: true
        currency:
          type: string
          description: The ISO code of the reference currency
          example: EUR
        foreignCurrency:
          description: Foreign currency information
          $ref: '#/components/schemas/ForeignCurrencyValue'
      description: Miles API v1 representation of a currency value.
    Price:
      type: object
      properties:
        value:
          description: The price
          $ref: '#/components/schemas/MultiCurrencyValue'
        budgetUnit:
          description: The kind of budget unit
          $ref: '#/components/schemas/EnumValue'
      description: The purchase option value of the product
    Product:
      type: object
      properties:
        productId:
          type: string
          description: The ID of the Product
          example: '17348946'
        name:
          description: The name of the product
          $ref: '#/components/schemas/MultiLanguageValue'
        duration:
          description: The duration on the product
          $ref: '#/components/schemas/DoubleUnitValue'
        term:
          description: The term on the product
          $ref: '#/components/schemas/DoubleUnitValue'
        distance:
          description: The distance on the product
          $ref: '#/components/schemas/DoubleUnitValue'
        mileage:
          description: The mileage on the product
          $ref: '#/components/schemas/DoubleUnitValue'
        proRataDistance:
          description: Use annualMileage instead
          $ref: '#/components/schemas/DoubleUnitValue'
        annualMileage:
          description: The annual mileage of the sales quote
          $ref: '#/components/schemas/DoubleUnitValue'
        periodicMileage:
          description: The periodic mileage of the sales quote
          $ref: '#/components/schemas/DoubleUnitValue'
        interestRate:
          type: number
          description: The interestRate of the product
          format: double
          example: 14.5
        description:
          description: The description of the product
          $ref: '#/components/schemas/MultiLanguageValue'
        investment:
          description: The investment of the product
          $ref: '#/components/schemas/MultiCurrencyValue'
        applicableLeasePrice:
          description: The applicable lease price of the product
          $ref: '#/components/schemas/LabeledPrice'
        costTypeComponents:
          type: array
          description: A list of cost type component prices for the sales quote
          items:
            $ref: '#/components/schemas/CostTypeComponentResponse'
        otherLeasePrices:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/Price'
          description: The other lease prices of the product
        purchaseOptionValue:
          description: The purchase option value of the product
          $ref: '#/components/schemas/Price'
        customerUpfront:
          description: The customer upfront value for the product
          $ref: '#/components/schemas/MultiCurrencyValue'
        driverUpfront:
          description: The driver upfront value for the product
          $ref: '#/components/schemas/MultiCurrencyValue'
        productConfiguration:
          description: The configuration of the product
          $ref: '#/components/schemas/ProductConfiguration'
        productCategory:
          description: The category of the product
          $ref: '#/components/schemas/EnumValue'
        initialPayment:
          description: Rental schedule initial payment. Only filled in if the property `include.rental.profile.details.to.get.contract.response` is true.
          $ref: '#/components/schemas/MultiCurrencyValue'
        rentalProfileName:
          description: Rental profile name. Only filled in if the property `include.rental.profile.details.to.get.contract.response` is true.
          $ref: '#/components/schemas/MultiLanguageValue'
        dynamicAttributesMap:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: Use dynamicAttributes instead
          deprecated: true
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: A map of dynamic attributes
      description: The product on the contract
    ProductConfiguration:
      type: object
      properties:
        reference:
          type: string
          description: The reference of the product configuration
          example: RND4564
        productId:
          type: string
          description: The ID of the product
          example: '17348946'
        productSettings:
          type: array
          description: The list of product settings found
          items:
            $ref: '#/components/schemas/ProductSetting'
        priceDetails:
          type: array
          description: The list of product price details found
          items:
            $ref: '#/components/schemas/ProductPricingDetail'
      description: The configuration of the product
    ProductPricingDetail:
      type: object
      properties:
        pricingDetailId:
          type: string
          description: The ID of the product pricing detail
          example: '17348946'
        label:
          description: The label of the product pricing detail
          $ref: '#/components/schemas/MultiLanguageValue'
        leasePrice:
          description: The lease price of the product pricing detail
          $ref: '#/components/schemas/MultiCurrencyValue'
        leaseVAT:
          description: The lease VAT of the product pricing detail
          $ref: '#/components/schemas/MultiCurrencyValue'
        reference:
          type: string
          description: The reference of the product pricing detail
          example: RND54648
        editable:
          type: boolean
          description: Indicates if the product pricing detail is editable. Defaulted to false.
          example: false
        editValue:
          type: string
          description: The editted value of the product pricing detail
          example: lease price
        category:
          type: string
          description: The category of the product pricing detail
          example: Accessory
        freeText:
          type: boolean
          description: Indicates if the product pricing detail holds a free text. Defaulted to false.
          example: false
        fix:
          type: boolean
