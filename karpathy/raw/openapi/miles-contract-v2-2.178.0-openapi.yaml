openapi: 3.0.1
info:
  title: miles-contract
  contact:
    url: https://www.sofico.global
  license:
    name: Sofico
    url: https://www.sofico.global
  version: 2.178.0
  x-milesServiceType: functional
  x-logo:
    url: https://www.sofico.global/sofico.svg
    altText: Sofico logo
paths:
  /contracts/{contract_id}/deposits/{deposit_id}/documents:
    get:
      summary: Find deposit documents
      description: This endpoint retrieves a list of deposit documents attached to a contract.
      operationId: findAttachedDepositDocuments
      parameters:
        - name: contract_id
          in: path
          description: ID of the contract
          required: true
          schema:
            type: string
        - name: deposit_id
          in: path
          description: ID of the deposit
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindAttachedDepositDocumentsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Contract not found
             - Deposit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
            - dealer_manager
            - dealer_salesperson
            - retail_customer
    post:
      summary: Attaches deposit document
      description: This endpoint attach a deposit document to a contract.
      operationId: attachDepositDocument
      parameters:
        - name: contract_id
          in: path
          description: ID of the contract
          required: true
          schema:
            type: string
        - name: deposit_id
          in: path
          description: ID of the deposit
          required: true
          schema:
            type: string
      requestBody:
        description: File to attach to the deposit
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttachedDocumentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachedDepositDocument'
        '400':
          description: |-
            - A contract ID should be provided.
             - A deposit ID should be provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Contract not found
             - Deposit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
            - retail_customer
  /contracts/{contract_id}/termination-quotes/{termination_quote_id}/calculations:
    post:
      summary: Calculate termination quote for contract
      description: This endpoint calculates a termination quote belonging to the contract.
      operationId: calculateTerminationQuoteForContract
      parameters:
        - name: contract_id
          in: path
          description: ID of the contract
          required: true
          schema:
            type: string
        - name: termination_quote_id
          in: path
          description: ID of the termination quote
          required: true
          schema:
            type: string
      requestBody:
        description: Data required to calculate the termination quote
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateTerminationQuoteRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminationQuoteResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Contract not found
             - Termination quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
            - broker_salesperson
            - broker_manager
            - dealer_salesperson
            - dealer_manager
  /contracts/{contract_id}/amendment-quotes/{amendment_quote_id}/cancellations:
    post:
      summary: Cancel amendment quote for contract
      description: This endpoint cancels an amendment quote belonging to the contract.
      operationId: cancelAmendmentQuoteForContract
      parameters:
        - name: contract_id
          in: path
          description: ID of the contract
          required: true
          schema:
            type: string
        - name: amendment_quote_id
          in: path
          description: ID of the amendment quote
          required: true
          schema:
            type: string
      requestBody:
        description: Additional data to confirm an amendment quote
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelAmendmentQuoteRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelAmendmentQuoteResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Contract not found
             - Amendment quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
  /contracts/{contract_id}/termination-quotes/{termination_quote_id}/cancellations:
    post:
      summary: Cancel termination quote for contract
      description: This endpoint cancels a termination quote belonging to the contract.
      operationId: cancelTerminationQuoteForContract
      parameters:
        - name: contract_id
          in: path
