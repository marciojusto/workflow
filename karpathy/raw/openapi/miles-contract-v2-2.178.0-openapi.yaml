          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: contract_id
          in: path
          description: ID of the contract
          required: true
          schema:
            type: string
        - name: amendment_quote_id
          in: path
