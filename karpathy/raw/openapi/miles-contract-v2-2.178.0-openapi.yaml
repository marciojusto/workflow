    M2MContractPaymentInformation:
      type: object
      properties:
        paymentCommunication:
          type: string
          description: The payment communication
        bankAccount:
          description: The bank account linked to the contract
          $ref: '#/components/schemas/M2MBankAccount'
        bankAccountOrigin:
          description: |-
            The origin of the derived bank account.
            When the bank account is derived from the contract-paying bank account, the origin will be CONTRACT_PAYING_BANK_ACCOUNT.
            When the bank account is derived from the contract payment preference, the origin will be CONTRACT_PAYMENT_PREFERENCE.
            When the bank account is derived from the contract payment method, the origin will be CUSTOMER_PAYMENT_PREFERENCE_FOR_CONTRACT_PAYMENT_METHOD.
            When the bank account is derived from the customer payment method, the origin will be CUSTOMER_PAYMENT_PREFERENCE_FOR_CUSTOMER_PAYMENT_METHOD.
          $ref: '#/components/schemas/RetailContractPaymentInformationBankAccountOrigin'
        paymentPreference:
          description: The payment preference of the contract
          $ref: '#/components/schemas/PaymentPreference'
      description: The payment information of the contract
