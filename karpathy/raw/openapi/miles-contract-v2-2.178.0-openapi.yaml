        method:
          description: The Http method of the action
          $ref: '#/components/schemas/HTTPMethod'
        allowed:
          type: boolean
          description: If the action is allowed
        message:
          type: string
          description: The message if an action is not allowed
      description: Info on an action
    GetActionResponse:
      type: object
      properties:
        actions:
          type: array
          description: A list of action information
          items:
            $ref: '#/components/schemas/ActionInfo'
    HTTPMethod:
      type: string
      enum:
        - GET
        - POST
        - PUT
        - DELETE
    ContractPaymentSchedule:
      type: object
      properties:
        numberOfPeriods:
          type: integer
          description: The number of periods in the payment schedule
          format: int32
          example: 48
        periodsTobeInvoiced:
          type: integer
          description: The number of periods left to invoice
          format: int32
          example: 5
        outstandingBalance:
          description: The outstanding balance of due invoices
          $ref: '#/components/schemas/MultiCurrencyValue'
        receivingParty:
          type: string
          description: The receiving party
          example: My Leasing Company
        receivingBankAccount:
          type: string
          description: The receiving party bank account
          example: BE12345678 99
        interestOnArrears:
          description: The interest on late payments
          $ref: '#/components/schemas/MultiCurrencyValue'
        paymentScheduleStartDate:
          type: string
          description: The start date of the payment schedule
          format: date
          example: '2026-03-20'
        contractEndDate:
          type: string
          description: The date on which the contract is expected to end
          format: date
          example: '2026-03-20'
        paymentScheduleDetails:
          type: array
          description: A list of payment schedule details. Every entry corresponds to the details of a single payment period.
          items:
            $ref: '#/components/schemas/PaymentScheduleDetail'
    PaymentScheduleDetail:
      type: object
      properties:
        paymentDescription:
          type: string
          description: The payment description for this period. In most cases this is a communication that is to be used on the payment for reference
          example: ABC1245098
        periodNumber:
          type: integer
          description: The sequential number of the payment period in time
          format: int32
          example: 23
        dueDate:
          type: string
          description: Deprecated since 2024-05-29 and version 2.126.0 in favor of invoiceDueDate
          format: date
          deprecated: true
          example: '2026-03-20'
        amount:
          description: The total amount that is or was due for this payment period
          $ref: '#/components/schemas/MultiCurrencyValue'
        status:
          type: string
          description: The status of the payment of this period
          example: Paid
        startDateBillablePeriod:
          type: string
          description: The start date of the period that is being billed
          format: date
          example: '2026-03-20'
        endDateBillablePeriod:
          type: string
          description: The end date of the period that is being billed
          format: date
          example: '2026-03-20'
        amountInclVat:
          description: The amount that needs to be paid for the period, including VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        expectedDueDate:
          type: string
          description: The expected due date of the period
          format: date
          example: '2026-03-20'
        invoiceDueDate:
          type: string
          description: The due date of the invoice
          format: date
          example: '2026-03-20'
      description: Payment schedule detail
    ContractQuotePricingDetails:
      type: object
      properties:
        applicableLeasePrice:
          description: The applicable lease price
          $ref: '#/components/schemas/Price'
        leasePriceExclFuel:
          description: The lease price, excluding fuel and including VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        leasePriceExclFuelInclVat:
          description: The lease price, excluding fuel and including VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        leasePriceExclFuelEffectivePrice:
          description: The lease price, excluding fuel and including non-reclaimable VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        leasePriceInclFuel:
          description: The lease price, including fuel and including VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        leasePriceInclFuelInclVat:
          description: The lease price, including fuel and including VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        leasePriceInclFuelEffectivePrice:
          description: The lease price, including fuel and including non-reclaimable VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        catalogPrice:
          description: The catalog price of the config vehicle
          $ref: '#/components/schemas/MultiCurrencyValue'
        optionCatalogPriceVat:
          description: The sum of every VAT amount of the catalog price of all selected options of type 'Colour', 'Upholstery', 'FreeFormOptions','Options'
          $ref: '#/components/schemas/MultiCurrencyValue'
        optionCatalogPriceInclVat:
          description: The sum of catalog prices including VAT of all selected options of type 'Colour', 'Upholstery', 'FreeFormOptions','Options'
          $ref: '#/components/schemas/MultiCurrencyValue'
        accessoriesCatalogPriceVat:
          description: The VAT sum of catalog prices of all selected options of type 'Accessory', 'FreeFormAccessory', excluding 'Extra Web discount' accessories
          $ref: '#/components/schemas/MultiCurrencyValue'
        accessoriesCatalogPriceInclVat:
          description: The sum of catalog prices including VAT of all selected options of type 'Accessory', 'FreeFormAccessory', excluding 'Extra Web discount' accessories
          $ref: '#/components/schemas/MultiCurrencyValue'
        optionCatalogPrice:
          description: The sum of catalog prices of all selected options of type 'Colour', 'Upholstery', 'FreeFormOptions','Options'
          $ref: '#/components/schemas/MultiCurrencyValue'
        accessoriesCatalogPrice:
          description: The sum of catalog prices of all selected options of type 'Accessory', 'FreeFormAccessory', excluding 'Extra Web discount' accessories
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalPrice:
          description: |
            For **NEW** and **STOCK** vehicles, this is the sum of the 'catalogPrice', 'optionCatalogPrice' and 'accessoriesCatalogPrice' parameters.
            For **USED** vehicles, this is the sum of the 'dealerVehiclePrice.amountExcludingVat' and 'accessoriesCatalogPrice' parameters.
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalVatAmount:
          description: The total VAT amount, calculated based on the totalPrice field (VAT percentage based on ConfigVehicle.catalogVATCodeEnumId)
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalPriceInclVat:
          description: The sum of the totalPrice and totalVATAmount fields
          $ref: '#/components/schemas/MultiCurrencyValue'
        catalogPriceVat:
          description: The VAT value of the catalog vehicle
          $ref: '#/components/schemas/MultiCurrencyValue'
        catalogPriceInclVat:
          description: The price of the catalog vehicle including the VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        fiscalValue:
          description: The fiscal value
          $ref: '#/components/schemas/MultiCurrencyValue'
        vehicleDiscountAmount:
          description: The configuration discount of type 100001 (Standard discount)
          $ref: '#/components/schemas/MultiCurrencyValue'
        vehicleDiscountVatAmount:
          description: The VAT amount calculated based on the vehicleDiscountAmount field (VAT percentage based on ConfigVehicle.catalogVATCodeEnumId)
          $ref: '#/components/schemas/MultiCurrencyValue'
        vehicleDiscountAmountInclVat:
          description: The sum of the vehicleDiscountAmount and vehicleDiscountVATAmount fields
          $ref: '#/components/schemas/MultiCurrencyValue'
        vehicleDiscountPercentage:
          type: number
          description: The configuration discount percentage of type 100001 (Standard discount)
          format: double
          example: 0.0015
        fleetDiscountAmount:
          description: The configuration discount of type 100002 (Fleet discount)
          $ref: '#/components/schemas/MultiCurrencyValue'
        fleetDiscountPercentage:
          type: number
          description: The configuration discount percentage of type 100002 (Fleet discount)
          format: double
          example: 0.2
        dealerDiscountAmount:
          description: The configuration discount of type 100003 (Dealer discount)
          $ref: '#/components/schemas/MultiCurrencyValue'
        dealerDiscountPercentage:
          type: number
          description: The configuration discount percentage of type 100003 (Dealer discount)
          format: double
          example: 0.02
        nonDealerDiscountAmount:
          description: The configuration discount of type 100004 (Non-dealer discount)
          $ref: '#/components/schemas/MultiCurrencyValue'
        nonDealerDiscountPercentage:
          type: number
          description: The configuration discount percentage of type 100004 (Non-dealer discount)
          format: double
          example: 0.07
        optionDiscount:
          description: The sum of discounts of all selected options of type 'Colour', 'Upholstery', 'FreeFormOptions','Options'
          $ref: '#/components/schemas/MultiCurrencyValue'
        optionDiscountVatAmount:
          description: The VAT amount calculated based on the optionDiscount field (VAT percentage based on ConfigOption.catalogVATCodeEnumId)
          $ref: '#/components/schemas/MultiCurrencyValue'
        optionDiscountAmountInclVat:
          description: The sum of the optionDiscountAmount and optionDiscountVATAmount fields
          $ref: '#/components/schemas/MultiCurrencyValue'
        accessoryDiscount:
          description: The sum of discounts of all selected accessories
          $ref: '#/components/schemas/MultiCurrencyValue'
        accessoryDiscountVatAmount:
          description: The VAT amount calculated based on the accessoryDiscount field (VAT percentage based on ConfigOption.catalogVATCodeEnumId)
          $ref: '#/components/schemas/MultiCurrencyValue'
        accessoryDiscountAmountInclVat:
          description: The sum of the accessoryDiscountAmount and accessoryDiscountVATAmount fields
          $ref: '#/components/schemas/MultiCurrencyValue'
        extraWebDiscount:
          description: The sum of catalogPrices of all 'Extra Web discount' accessories
          $ref: '#/components/schemas/MultiCurrencyValue'
        extraWebDiscountVatAmount:
          description: The VAT amount calculated based on the extraWebDiscount field (VAT percentage based on ConfigOption.catalogVATCodeEnumId)
          $ref: '#/components/schemas/MultiCurrencyValue'
        extraWebDiscountAmountInclVat:
          description: The sum of the extraWebDiscount and extraWebDiscountVATAmount fields
          $ref: '#/components/schemas/MultiCurrencyValue'
        extraDiscounts:
          type: array
          description: A list of extra discounts
          items:
            $ref: '#/components/schemas/ContractQuotePricingDetailsDiscount'
        commercialAction:
          description: The sum of delivery cost components of configured delivery cost model
          $ref: '#/components/schemas/MultiCurrencyValue'
        deliveryCostComponents:
          type: array
          description: A list of delivery cost components of configured delivery cost model
          items:
            $ref: '#/components/schemas/DeliveryCostComponent'
        totalDiscount:
          description: The sum of the vehicleDiscount, fleetDiscount, optionDiscount, extraWebDiscount and commercialAction fields
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalDiscounted:
          description: The difference between the totalPrice and totalDiscount fields
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalDiscountedVatAmount:
          description: The VAT amount calculated based on the totalDiscountedPrice field (VAT percentage based on ConfigVehicle.catalogVATCodeEnumId)
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalDiscountedInclVat:
          description: The sum of the totalDiscounted and totalDiscountedVATAmount field
          $ref: '#/components/schemas/MultiCurrencyValue'
        tax:
          description: The tax of the configured vehicle
          $ref: '#/components/schemas/MultiCurrencyValue'
        moreMileagePrice:
          description: The excess mileage price, excluding VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        lessMileagePrice:
          description: The less mileage price, excluding VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        moreMileagePriceInclVat:
          description: The excess mileage, including VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        lessMileagePriceInclVat:
          description: The insufficient mileage, including VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        purchaseOptionValue:
          description: The purchase option description
          $ref: '#/components/schemas/Price'
        purchaseOptionValueVatAmount:
          description: The purchase option VAT amount
          $ref: '#/components/schemas/MultiCurrencyValue'
        purchaseOptionValueInclVat:
          description: The sum of the purchaseOptionValue and purchaseOptionValueVATAmount fields
          $ref: '#/components/schemas/MultiCurrencyValue'
        quotationTemplateId:
          type: string
          description: The ID of the quotation template
          example: '600080'
        dealerVehiclePrice:
          description: The dealer vehicle price
          $ref: '#/components/schemas/DealerVehiclePrice'
        totalDealerDeliveryCosts:
          description: The sum of all dealer delivery costs, which are the delivery costs marked as 'apply to order'
          $ref: '#/components/schemas/TotalDealerDeliveryCosts'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: A map of dynamic attributes
    TerminationProductReference:
