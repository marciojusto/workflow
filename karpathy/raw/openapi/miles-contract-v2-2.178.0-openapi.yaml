    RetailContractVehicle:
      type: object
      properties:
        description:
          description: The car description
          $ref: '#/components/schemas/MultiLanguageValue'
        firstRegistrationDate:
          type: string
          description: The first registration date
          format: date
          example: '2026-03-20'
        licensePlate:
          type: string
          description: The license plate of the vehicle
          example: 1-PRO-002
        make:
          description: The make of the vehicle
          $ref: '#/components/schemas/RetailContractVehicleMake'
        model:
          description: The model of the vehicle
          $ref: '#/components/schemas/RetailContractVehicleModel'
        typeName:
          type: string
          description: The type name of the vehicle
          example: 25 TFSI  70(95) kW(PS) S tronic
        car:
          description: The car of the retail contract, it can only return a car or a bike not both
          $ref: '#/components/schemas/RetailContractCar'
        bike:
          description: The bike of the retail contract, it can only return a bike or a car not both
          $ref: '#/components/schemas/RetailContractBike'
      description: The vehicle of the retail contract
    RetailContractVehicleMake:
      type: object
      properties:
        name:
          description: The name of the make
          $ref: '#/components/schemas/MultiLanguageValue'
      description: The make of the vehicle
    RetailContractVehicleModel:
      type: object
      properties:
        name:
          description: The name of the model
          $ref: '#/components/schemas/MultiLanguageValue'
        year:
          type: string
          description: The year of the model
          format: date
          example: '2026-03-20'
      description: The model of the vehicle
    RetailFinanceLease:
      type: object
      properties:
        leasePriceExclusiveFuelExclusiveVat:
          description: The lease price, excluding fuel and excluding VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        leasePriceExclusiveFuelInclusiveVat:
          description: The lease price, excluding fuel and including VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        residualValue:
          description: The residual value
          $ref: '#/components/schemas/MultiCurrencyValue'
        increasedFirstRental:
          description: The upfront amount to be paid at the start of a lease agreement which typically consists of the first rental period increased by an additional sum. This additional sum can be chosen at will by the customer or be a prerequisite of the finance deal or credit acceptance criteria. It is different from a down payment as it will typically include both the principal and the interest, whereas a down payment typically only reduces the principal.
          $ref: '#/components/schemas/MultiCurrencyValue'
      description: Finance lease part of product, it can only return a `financeLease` or a `leasePurchase` not both
    RetailLeasePurchase:
      type: object
      properties:
        balloonPayment:
          description: A larger, final payment due at the end of a loan
          $ref: '#/components/schemas/MultiCurrencyValue'
        downPayment:
          description: The initial payment made upfront when purchasing an asset under a lease purchase agreement
          $ref: '#/components/schemas/MultiCurrencyValue'
        installment:
          description: The monthly amount payable on a lease purchase (loan) agreement
          $ref: '#/components/schemas/MultiCurrencyValue'
      description: Lease purchase part of product, it can only return a `leasePurchase` or a `financeLease` not both
    RetailProduct:
      type: object
      properties:
        productCategory:
          description: The product category
          $ref: '#/components/schemas/EnumValue'
        leasePurchase:
          description: Lease purchase part of product, it can only return a `leasePurchase` or a `financeLease` not both
          $ref: '#/components/schemas/RetailLeasePurchase'
        financeLease:
          description: Finance lease part of product, it can only return a `financeLease` or a `leasePurchase` not both
          $ref: '#/components/schemas/RetailFinanceLease'
      description: The product
    RetailProductConfiguration:
      type: object
      properties:
        reference:
          type: string
          description: The reference of the retail product configuration
          example: Operating Lease
        productTypeId:
          type: string
          description: Type ID of the product
          example: '100002'
        services:
          type: array
          description: A list of services
          items:
            $ref: '#/components/schemas/Service'
        priceDetails:
          type: array
          description: A list of product pricing details
          items:
            $ref: '#/components/schemas/ProductPricingDetail'
      description: The configuration of the retail contract product
    Service:
      type: object
      properties:
        reference:
          type: string
          description: Reference of the product service
          example: RMT
        choices:
          type: array
          description: A list of service choices
          items:
            $ref: '#/components/schemas/ServiceChoice'
        qualifierSettings:
          type: array
          description: A list of qualifier settings
          items:
            $ref: '#/components/schemas/QualifierSetting'
      description: Service
    ServiceChoice:
      type: object
      properties:
        serviceChoiceId:
          type: string
          description: The ID of the service choice
          example: '100351'
        label:
          description: The label of the service choice
          $ref: '#/components/schemas/MultiLanguageValue'
        isSelected:
          type: boolean
          description: Indicates whether the service choice is selected
          example: false
          default: false
      description: Service choice
    Signatory:
      type: object
      properties:
        contactId:
          type: string
          description: The ID of the contact
          example: '1111'
        firstName:
          type: string
          description: The first name of the signatory
          example: John
        lastName:
          type: string
          description: The last name of the signatory
          example: Doe
        identification:
          type: string
          description: The identification of the signatory
          example: John Doe
        title:
          description: The title of the signatory
          $ref: '#/components/schemas/SimpleEnumValue'
        signatoryType:
          description: The type of the signatory
          $ref: '#/components/schemas/SimpleEnumValue'
      description: A signatory
      deprecated: true
    RetailContractUpdateRestrictionsResponse:
      type: object
      properties:
        isUpdateRestricted:
          type: boolean
          description: Indicates whether a retail contract can be updated. If there is an active data change request for the retail contract, then it will not be possible to update the retail contract until the active data change request has been handled.
        retailContractId:
          type: string
          description: The ID of the retail contract
          example: '4652002'
    UpdateRetailMileageTermResponse:
      type: object
      properties:
        amendmentQuoteId:
          type: string
          description: The ID of the resulting amendment quote
          example: '123456'
        caseId:
          type: string
          description: The ID of the resulting case
          example: '654321'
        annualMileage:
          description: The updated annual mileage
          $ref: '#/components/schemas/DoubleUnitValue'
        totalMileage:
          description: The updated total mileage
          $ref: '#/components/schemas/DoubleUnitValue'
        changeDate:
          type: string
          description: The date the changes will go in effect
          format: date
          example: '2026-03-20'
        status:
          description: The status of the change. When a ticket was created the status will be TICKET_CREATED. When no ticket was created, the status will be CONTRACT_MODIFIED.
          $ref: '#/components/schemas/UpdateStatus'
    UpdateStatus:
      type: string
      description: The status of the change. When a ticket was created the status will be STATUS_CREATED. When no ticket was created, the status will be CONTRACT_MODIFIED.
      enum:
        - TICKET_CREATED
        - CONTRACT_MODIFIED
    UpdateRetailMileageTermRequest:
      required:
        - term
        - totalMileage
      type: object
      properties:
        totalMileage:
          description: The new total mileage of the retail contract
          $ref: '#/components/schemas/DoubleUnitValue'
        term:
          description: The new term of the retail contract
          $ref: '#/components/schemas/DoubleUnitValue'
        initialComment:
          type: string
          description: The initial comment of the created ticket
          example: Change mileage and term.
    UpdateRetailPaymentDayResponse:
      type: object
      properties:
        amendmentQuoteId:
          type: string
          description: The ID of the resulting amendment quote
          example: '123456'
        caseId:
          type: string
          description: The ID of the resulting case
          example: '654321'
        paymentDay:
          type: integer
          description: The updated payment day
          format: int32
          example: 20
        changeDate:
          type: string
          description: The date the changes will go in effect
          format: date
          example: '2026-03-20'
        status:
          description: The status of the change. When a ticket was created the status will be STATUS_CREATED. When no ticket was created, the status will be CONTRACT_MODIFIED.
          $ref: '#/components/schemas/UpdateStatus'
    UpdateRetailPaymentDayRequest:
      required:
        - paymentDay
      type: object
      properties:
        paymentDay:
          maximum: 31
          minimum: 1
          type: integer
          description: The new payment day
          format: int32
          example: 16
        initialComment:
          type: string
          description: The initial comment of the created ticket
          example: Change payment day.
  securitySchemes:
    Roles:
      type: openIdConnect
      description: Users need to have certain roles to be able to access certain API endpoints. If there are no roles defined for the endpoint, * is shown. This means that every authorized user has access to the endpoint.
      openIdConnectUrl: ''
