                $ref: '#/components/schemas/TerminationQuoteResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Contract not found
             - Termination quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
            - mobility_user
  /contracts/{contract_id}/amendment-quotes/{amendment_quote_id}/confirmations:
    post:
      summary: Confirm amendment quote
      description: This endpoint confirms an amendment quote.
      operationId: confirmAmendmentQuote
      parameters:
        - name: contract_id
          in: path
          description: ID of the contract
          required: true
          schema:
            type: string
          example: '123456'
        - name: amendment_quote_id
          in: path
          description: ID of the amendment quote
          required: true
          schema:
            type: string
          example: '1234'
      requestBody:
        description: Additional data to confirm an amendment quote
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmAmendmentQuoteRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmAmendmentQuoteResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Contract not found
             - Amendment quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
  /contracts/{contract_id}/termination-quotes/{termination_quote_id}/confirmations:
    post:
      summary: Confirm termination quote
      description: This endpoint confirms a termination quote.
      operationId: confirmTerminationQuote
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: contract_id
          in: path
          description: ID of the contract
          required: true
          schema:
            type: string
          example: '123456'
        - name: termination_quote_id
          in: path
          description: ID of the termination quote
          required: true
          schema:
            type: string
          example: '1234'
        - name: enable_document_generation
          in: query
          description: Enable termination document generation
          schema:
            type: boolean
            default: true
          example: true
        - name: enable_invoice_generation
          in: query
          description: Enable termination invoice generation
          schema:
            type: boolean
            default: false
          example: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminationQuoteResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Contract not found
             - Termination quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
            - mobility_user
            - dealer_manager
            - dealer_salesperson
            - broker_salesperson
            - broker_manager
            - collections_agent
  /contracts/{contract_id}/termination-quotes/{termination_quote_id}/clauses:
    get:
      summary: Get clauses for a termination quote
      description: This endpoint gets the clauses for a termination quote
      operationId: findClausesForTerminationQuote
      parameters:
        - name: contract_id
          in: path
          description: ID of the contract
          required: true
          schema:
            type: string
          example: '123456'
        - name: termination_quote_id
          in: path
          description: ID of the termination quote
          required: true
          schema:
            type: string
          example: '1234'
        - name: clause_id
          in: query
          description: ID(s) of the clause(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147595062'
        - name: clause_type_id
          in: query
          description: ID(s) of the clause type(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100002'
        - name: condition_category_id
          in: query
          description: ID(s) of the condition categories of the clause
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '355'
        - name: count
          in: query
          description: Maximum number of quotes to be displayed
          schema:
            minimum: 0
            type: integer
            format: int32
        - name: offset
          in: query
          description: Number of quotes to skip before selecting quotes
          schema:
            minimum: 0
            type: integer
            format: int32
            default: 0
        - name: sort_by
          in: query
          description: Sorting to be applied applied on the results list
          schema:
            $ref: '#/components/schemas/SortBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindTerminationClausesResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            Contract not found
             - Termination quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
            - mobility_user
    post:
      summary: Create clauses for a termination quote
      description: This endpoint creates clauses for a termination quote. For each clause type in the request body, one clause will be created.
      operationId: createClauses
      parameters:
        - name: contract_id
          in: path
          description: ID of the contract
          required: true
          schema:
            type: string
          example: '123456'
        - name: termination_quote_id
          in: path
          description: ID of the termination quote
          required: true
          schema:
            type: string
          example: '1234'
      requestBody:
        description: Data required to create the clause(s)
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClausesRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateClausesResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            Contract not found
             - Termination quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
    delete:
      summary: Delete clauses for a termination quote
      description: This endpoint deletes clauses for a termination quote. The response contains the clause that remain after the deletion.
      operationId: deleteClauses
      parameters:
        - name: contract_id
          in: path
          description: ID of the contract
          required: true
          schema:
            type: string
          example: '123456'
        - name: termination_quote_id
          in: path
          description: ID of the termination quote
          required: true
          schema:
            type: string
          example: '1234'
        - name: clause_id
          in: query
          description: ID(s) of the clause(s)
          required: true
          schema:
            minItems: 1
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147595062'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteClausesResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Contract not found
             - Termination quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
  /contracts/{contract_id}/termination-quotes:
    get:
      summary: Find contract termination quotes
      description: Get contract termination quotes based on contract ID and a set of filters.Deprecated since 2021-11-29 and version 2.13.0 in favor of findTerminationQuotes
      operationId: findContractTerminationQuotes
      parameters:
        - name: contract_id
          in: path
          description: The id of the contract
          required: true
          schema:
            type: string
          example: '41199698'
        - name: termination_quote_status_id
          in: query
          description: The termination quote status
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '300'
        - name: termination_quote_reason_id
          in: query
          description: The termination quote reason
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '400'
        - name: count
          in: query
          description: Maximum number of quotes to be displayed
          schema:
            minimum: 0
            type: integer
            format: int32
        - name: offset
          in: query
          description: Number of quotes to skip before selecting quotes
          schema:
            minimum: 0
            type: integer
            format: int32
            default: 0
        - name: sort_by
          in: query
          description: Sorting to be applied applied on the results list
          schema:
            $ref: '#/components/schemas/SortBy'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindContractTerminationQuotesResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      deprecated: true
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
            - mobility_user
    post:
      summary: Create termination quote for contract
      description: This endpoint creates a termination quote for a contract. Config properties are used to set quote status, quote reason and change reason. They are defaulted with values 'Web initial', 'Web' and 'Early termination'
      operationId: createTerminationQuoteForContract
      parameters:
        - name: contract_id
          in: path
          description: ID of the contract
          required: true
          schema:
            type: string
      requestBody:
        description: Data required to create a termination quote
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTerminationQuoteRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminationQuoteResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: The start date is invalid for the termination quote.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
            - broker_salesperson
            - broker_manager
            - dealer_salesperson
            - dealer_manager
            - retail_customer
            - collections_agent
  /contracts/{contract_id}/amendment-quotes/{amendment_quote_id}/documents:
