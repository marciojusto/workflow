            - mobility_manager_assistant
  /amendment-quotes:
    get:
      summary: Find amendment quotes
      description: This endpoint retrieves amendment quotes based on contract ID and a set of filters.
      operationId: findAmendmentQuotes
      parameters:
        - name: amendment_quote_id
          in: query
