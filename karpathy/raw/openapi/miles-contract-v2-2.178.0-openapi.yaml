  /retail-contracts:
    get:
      summary: Get retail contracts
      description: This endpoint retrieves a list of retail-specific contracts based on a set of parameters. The contracts in the response will contain a limited number of relevant fields.
      operationId: findRetailContracts
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: contract_id
          in: query
          description: ID of the contract
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147595062'
        - name: vehicle_option_type_group_id
          in: query
          description: ID(s) of the vehicle option type group(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100041'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'false'
        - name: contract_status_group_id
          in: query
          description: A list with IDs of contract statuses which will be compared to a list of all existing contract statuses in the Miles back-office application.If an ID is entered that does not exist in the Miles back-office application, it will be ignored. Only contracts with a status that occurs in both lists will be returned, unless no IDs are entered. If no IDs were entered, all contracts are returned.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '1094'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindRetailContractsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - retail_customer
