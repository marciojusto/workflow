openapi: 3.0.1
info:
  title: miles-driver
  description: This service is used by a driver to retrieve information linked to the driver.
  contact:
    url: https://www.sofico.global
  license:
    name: Sofico
    url: https://www.sofico.global
  version: 3.66.2
  x-milesServiceType: functional
  x-logo:
    url: https://www.sofico.global/sofico.svg
    altText: Sofico logo
paths:
  /driver/current/ordered-quotations/{quote_id}/documents:
    get:
      summary: Find documents attached to ordered quotation
      description: This endpoint retrieves a list of all documents attached to the given ordered quotation.
      operationId: findAttachedDocuments
      parameters:
        - name: quote_id
          in: path
          description: ID of the ordered quotation
          required: true
          schema:
            type: string
        - name: status_id
          in: query
          description: ID(s) of the document status(es) (enumeration)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
        - name: document_template_id
          in: query
          description: ID(s) of the document template(es)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindAttachedQuoteDocumentsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: '- No quote found for user'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
    post:
      summary: Attach document to ordered quotation
      description: This endpoint uploads a document for an ordered quotation. Deprecated since 2023-09-28 and version 3.47.0 in favor of the `POST /orders/{order_id}/documents` endpoint on the **miles-fleet-order-v1** service.
      operationId: attachQuoteDocument
      parameters:
        - name: quote_id
          in: path
          description: ID of ordered quotation
          required: true
          schema:
            type: string
      requestBody:
        description: File to attach to the ordered quotation
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttachedDocumentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderedQuotationDocument'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      deprecated: true
      security:
        - Roles:
            - mobility_user
  /driver/current/ordered-quotation/{quote_id}/documents:
    post:
      summary: Attach document to ordered quotation
      description: This endpoint uploads a document for an ordered quotation.
      operationId: attachQuoteDocumentDeprecated
      parameters:
        - name: quote_id
          in: path
          description: ID of ordered quotation
          required: true
          schema:
            type: string
      requestBody:
        description: File to attach to the ordered quotation
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttachedDocumentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OrderedQuotationDocument'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - No quote found for user
            - Quote ID is missing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: |-
            - Invalid file name
            - File type not allowed
            - File size not allowed
            - Failed to upload document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
        '500':
          description: '- Failed to upload document'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      deprecated: true
      security:
        - Roles:
            - mobility_user
  /driver/current/change-password:
    put:
      summary: Change password of authenticated driver
      description: This endpoint updates the password of the authenticated driver.
      operationId: changeDriverPassword
      parameters:
        - name: ignore_warnings
          in: query
          description: If set to true, (interactive) warnings will be ignored.
          schema:
            type: boolean
            default: false
      requestBody:
        description: Date to update the passwords
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePassword'
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: '- Failed to change the driver password'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
        '500':
          description: '- Failed to change the driver password'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
  /sales-quotes/{sales_quote_id}/allocated-driver:
    put:
      summary: Update an allocated driver
      description: This endpoint updates an allocated driver on a quote.Deprecated since 2023-09-15 and version 3.46.0, instead use the `PUT /sales-quotes/{sales_quote_id}/allocated-driver` endpoint on the **miles-quotation-v4** service
      operationId: updateAllocatedDriver
      parameters:
        - name: sales_quote_id
          in: path
          description: ID of the sales quote
          required: true
          schema:
            type: string
      requestBody:
        description: Data required to update the allocated driver
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllocatedDriverRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllocatedDriversResponse'
        '400':
          description: |-
            - No allocated driver present
            - A contact ID must be present
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - No quote found for user
            - Invalid mobility user
            - Insurance not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: |-
            - Failed to change insurance
            - Insurance not found
            - Creating/updating driver failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
        '500':
          description: '- Creating/updating driver failed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      deprecated: true
      security:
        - Roles:
            - mobility_user
    post:
      summary: Create an allocated driver
      description: This endpoint creates an allocated driver on a quote.Deprecated since 2023-09-15 and version 3.46.0, instead use the `POST /sales-quotes/{sales_quote_id}/allocated-driver` endpoint on the **miles-quotation-v4** service
      operationId: createAllocatedDriver
      parameters:
        - name: sales_quote_id
          in: path
          description: ID of the sales quote
          required: true
          schema:
            type: string
      requestBody:
        description: Data required to create the allocated driver
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AllocatedDriverRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllocatedDriversResponse'
        '400':
          description: '- No allocated driver present'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - No quote found for user
            - Invalid mobility user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: |-
            - Failed to change insurance
            - Insurance not found
            - Creating/updating driver failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
        '500':
          description: '- Creating/updating driver failed'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      deprecated: true
      security:
        - Roles:
            - mobility_user
  /sales-quotes/{sales_quote_id}/allocated-driver/{contact_id}:
    delete:
      summary: Delete an allocated driver
      description: This endpoint deletes an allocated driver from a quote.Deprecated since 2023-09-15 and version 3.46.0, instead use the `DELETE /sales-quotes/{sales_quote_id}/allocated-driver/{contact_id}` endpoint on the **miles-quotation-v4** service
      operationId: deleteAllocatedDriver
      parameters:
        - name: sales_quote_id
          in: path
          description: ID of the sales quote
          required: true
          schema:
            type: string
        - name: contact_id
          in: path
          description: ID of the contact
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - No quote found for user
            - Driver cannot be deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: |-
            - Failed to delete driver
            - Failed to delete driver
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      deprecated: true
      security:
        - Roles:
            - mobility_user
  /driver/current/documents:
    get:
      summary: Find documents attached to authenticated driver
      description: This endpoint retrieves all documents attached to the authenticated driver.
      operationId: findAttachedDriverDocuments
      parameters:
        - name: status_id
          in: query
          description: ID(s) of the document status(es) (enumeration)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
        - name: document_template_id
          in: query
          description: ID(s) of the document template(es)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindAttachedDriverDocumentsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
  /driver/current/car-policies/{car_policy_id}/help-contents:
    get:
      summary: Find car policy help contents
      description: This endpoints retrieves a list of car policy help contents.
      operationId: findCarPolicyHelpContents
      parameters:
        - name: car_policy_id
          in: path
          description: ID of the car policy
          required: true
          schema:
            type: string
        - name: topic
          in: query
          description: Topic of the help content.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CarPolicyHelpContentsResponse'
        '400':
          description: '- Customer not valid for authenticated user'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: '- No such car policy found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
  /driver/current/sites:
    get:
      summary: Find delivery addresses
      description: This endpoint retrieves the vehicle delivery addresses for the customer the driver is linked to.
      operationId: findDeliveryAddresses
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindSitesResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: '- Address not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '500':
          description: '- Failed to find delivery address'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
  /driver/current/managers:
    get:
      summary: Find managers related to authenticated driver
      description: This endpoint retrieves a list of the associated managers for the authenticated driver.
      operationId: findManagers
      parameters:
        - name: manager_type
          in: query
          description: ID(s) of the manager type(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindManagersResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
  /driver/current/ordered-quotations:
    get:
      summary: Find ordered quotations for authenticated driver
      description: This endpoint retrieves a list of ordered quotations based on the query parameters for the authenticated driver.
      operationId: findOrderedQuotations
      parameters:
        - name: quote_id
          in: query
          description: ID(s) of the quote(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
        - name: vehicle_category
          in: query
          description: ID(s) of the vehicle category(ies)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
        - name: count
          in: query
          description: Maximum number of quotes to be displayed
          schema:
            type: integer
            format: int32
        - name: offset
          in: query
          description: Offset to start counting
          schema:
            type: integer
            format: int32
            default: 0
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindOrderedQuotationsResponse'
        '400':
          description: '- Invalid customer ID'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '500':
          description: |-
            - Vehicle on ordered quotation not found
            - Missing vehicle nature on ordered quotation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
  /driver/current/documents/actions/generations:
    post:
      summary: Generate document for authenticated driver
      description: This endpoint creates a document for the authenticated driver.
      operationId: generateDriverDocument
      requestBody:
        description: Data required to generate the document
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateDocumentRequest'
        required: true
      responses:
        '204':
          description: No Content
        '400':
          description: '- Requested document template not available'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: '- Failed to generate document'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
        '500':
          description: '- Failed to generate document'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
  /driver/current/ordered-quotations/{quote_id}/documents/actions/creations:
    post:
      summary: Generate document for an ordered quotation
      description: This endpoint generates a document for an ordered quotation. Deprecated since 2023-10-18 and version 3.48.0 in favor of the `POST /orders/{order_id}/documents/actions/creations` endpoint on the **miles-fleet-order-v1** service.
      operationId: generateQuoteDocument
      parameters:
        - name: quote_id
          in: path
          description: ID of ordered quotation
          required: true
          schema:
            type: string
      requestBody:
        description: Data required to generate the document
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GenerateDocumentRequest'
        required: true
      responses:
        '200':
          description: Response is a download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          x-isResponseFile: 'true'
        '400':
          description: '- Requested document template not available'
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: '- No quote found for user'
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: '- Failed to generate document'
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
        '500':
          description: '- Failed to generate document'
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      deprecated: true
      security:
        - Roles:
            - mobility_user
  /sales-quotes/{sales_quote_id}/allocated-drivers/{driver_id}:
    get:
      summary: Get an allocated driver
      description: This endpoint retrieves an allocated driver for the authenticated driver, based on a sales quote ID and driver ID.Deprecated since 2023-09-15 and version 3.46.0, instead use the `GET /sales-quotes/{sales_quote_id}/allocated-drivers/{driver_id}` endpoint on the **miles-quotation-v4** service
      operationId: getAllocatedDriver
      parameters:
        - name: sales_quote_id
          in: path
          description: ID of the sales quote
          required: true
          schema:
            type: string
        - name: driver_id
          in: path
          description: ID of the driver
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllocatedDriverResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - No quote found for user
            - Allocated driver not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      deprecated: true
      security:
        - Roles:
            - mobility_user
  /amendment-quotes/{amendment_quote_id}/allocated-drivers/{driver_id}:
    get:
      summary: Get an allocated driver
      description: This endpoint retrieves an allocated driver for the authenticated driver, based on a sales quote ID and driver ID.Deprecated since 2023-09-15 and version 3.46.0, instead use the `GET /amendment-quotes/{amendment_quote_id}/allocated-drivers/{driver_id}` endpoint on the **miles-contract-v2** service
      operationId: getAllocatedDriverOnAmendmentQuote
      parameters:
        - name: amendment_quote_id
          in: path
          description: ID of the amendment quote
          required: true
          schema:
            type: string
          example: '1515456'
        - name: driver_id
          in: path
          description: ID of the driver
          required: true
          schema:
            type: string
          example: '4578146'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllocatedDriverResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - No quote found for user
