components:
  schemas:
    MultiLanguageValue:
      title: MultiLanguageValue
      type: object
      properties:
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '170392'
        translation:
          type: string
          description: The translation of the multi-language ID in human-readable format
          example: Hatchback
      description: Miles API v1 representation of a translated string value.
    OrderedQuotationDocument:
      type: object
      properties:
        quoteId:
          type: string
        documentId:
          type: string
        name:
          $ref: '#/components/schemas/MultiLanguageValue'
        documentType:
          type: string
        description:
          $ref: '#/components/schemas/MultiLanguageValue'
    AttachedDocumentRequest:
      type: object
      properties:
        file:
          type: string
          description: file data
          format: binary
        description:
          type: string
    ExceptionInfoDTO:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type. This provides human-readable documentation for the problem type when dereferenced.
          example: https://api.sofico.global/problems/microservices/service-unavailable
        title:
          type: string
          description: A short, human-readable summary of the problem type
          example: Service Unavailable
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
          example: The requested service is not available.
        message:
          description: Message objects containing translation information
          $ref: '#/components/schemas/MultiLanguageValue'
        arguments:
          type: array
          description: Additional arguments that provide context for the error
          items:
            type: string
            example: '34898219'
    WarningsInfoDTO:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type. This provides human-readable documentation for the problem type when dereferenced.
          example: https://api.sofico.global/warnings/microservices/unprocessable-entity
        title:
          type: string
          description: A short, human-readable summary of the problem type
          example: Unprocessable Entity
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
          example: Unable to process payload due to invalid data.
        messages:
          type: array
          description: An array of message objects containing translation information
          items:
            $ref: '#/components/schemas/MultiLanguageValue'
        arguments:
          type: array
          description: Additional arguments that provide context for the error
          items:
            type: string
            example: '23121434'
        isInteractiveWarning:
          type: boolean
          description: Indicates whether this error requires user interaction
          example: false
    UpdatePassword:
      type: object
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string
    AbstractValue:
      type: object
      description: An object that contains the actual value
    Address:
      type: object
      properties:
        addressId:
          type: string
          description: The address ID
          example: '23287213'
        formattedAddress:
          type: string
          description: This parameter should no longer be used
          deprecated: true
        addressLine1:
          description: Address line 1
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine1Number:
          description: Address line 1 number
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine2:
          description: Address line 2
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine3:
          description: Address line 3
          $ref: '#/components/schemas/MultiLanguageValue'
        city:
          description: City
          $ref: '#/components/schemas/MultiLanguageValue'
        locationIdentification:
          description: The location of identification
          $ref: '#/components/schemas/MultiLanguageValue'
        postalCode:
          type: string
          description: The postal code of the address
          example: '9000'
        state:
          description: The state of the address
          $ref: '#/components/schemas/MultiLanguageValue'
        deleted:
          type: boolean
          description: If the address must be deleted, only when the address ID is given
          example: true
          default: false
        country:
          description: Country
          $ref: '#/components/schemas/Country'
      description: Use driverAddress instead
      deprecated: true
    AllocatedDriverResponse:
      type: object
      properties:
        contactId:
          type: string
          description: The contact ID of the driver
          example: '2000568'
        firstName:
          type: string
          description: The first name of the driver
          example: John
        middleName:
          type: string
          description: The middle name of the driver
          example: Jeff
        lastName:
          type: string
          description: The last name of the driver
          example: Doe
        identification:
          type: string
          description: The identification of the driver
          example: John Jeff Doe
        isMainDriver:
          type: boolean
          description: Indicates whether the driver is the main driver on the quote
          example: true
        customerId:
          type: string
          description: The ID of the customer this driver belongs to
          example: '20356789'
        dateOfBirth:
          type: string
          description: The date of birth of the driver
          format: date
          example: '2026-03-27'
        officialRegistration:
          type: string
          description: The official registration of the driver
          example: PD-001
        gender:
          description: The gender of the driver
          $ref: '#/components/schemas/EnumValue'
        personTitle:
          description: The person title of the driver
          $ref: '#/components/schemas/EnumValue'
        driverStatus:
          description: The driver status
          $ref: '#/components/schemas/EnumValue'
        driverAddress:
          description: The address of the driver
          $ref: '#/components/schemas/DriverAddress'
        phoneNumbers:
          type: array
          description: A list of phone numbers
          items:
            $ref: '#/components/schemas/PhoneNumber'
        internetReferences:
          type: array
          description: A list of internet references
          items:
            $ref: '#/components/schemas/InternetReference'
        customers:
          type: array
          description: A list of customers
          items:
            $ref: '#/components/schemas/Customer'
        language:
          description: The language for the driver
          $ref: '#/components/schemas/DriverLanguage'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: A map of dynamic attributes
          x-Included in response from detail_level: MEDIUM
      description: An allocated driver
    AllocatedDriversResponse:
      type: object
      properties:
        allocatedDrivers:
          type: array
          description: A list of allocated drivers
          items:
            $ref: '#/components/schemas/AllocatedDriverResponse'
    ContactAddress:
      type: object
      properties:
        label:
          description: The contact address label
          $ref: '#/components/schemas/EnumValue'
        address:
          description: The address
          $ref: '#/components/schemas/Address'
    Country:
      type: object
      properties:
        countryId:
          type: string
        countryCodeISO2:
          type: string
        countryCodeISO3:
          type: string
        countryCodeISONumber:
          type: integer
          format: int32
        countryName:
          $ref: '#/components/schemas/MultiLanguageValue'
        countryPhoneCode:
          type: string
        ecCountryCode:
          type: string
      description: The country the phone number is from
    Customer:
      type: object
      properties:
        customerId:
          type: string
          description: The ID of the customer
          example: '1234'
        businessUnitLegalName:
          type: string
          description: The name of the legal unit
          example: management
        tradingName:
          type: string
          description: The trading name
          example: Sofico
        addresses:
          type: array
          description: The addresses of the customer
          items:
            $ref: '#/components/schemas/ContactAddress'
      description: The customer of the driver
    DriverAddress:
      type: object
      properties:
        label:
          description: The address label
          $ref: '#/components/schemas/EnumValue'
        address:
          description: The address
          $ref: '#/components/schemas/Address'
      description: The address of the driver
    DriverLanguage:
      type: object
      properties:
        languageId:
          type: string
          description: The ID of the language
          example: '2147599982'
        reference:
          type: string
          description: The reference of the language
          example: nl
        description:
          type: string
          description: Deprecated since 2022-12-01 and version '3.41.0' in favor of 'translatedDescription'
          deprecated: true
        translatedDescription:
          description: The translation of the language
          $ref: '#/components/schemas/MultiLanguageValue'
      description: The language for the driver
    DynamicAttributeValue:
      title: DynamicAttributeValue
      type: object
      properties:
        valueType:
          type: integer
          description: |
            Based on this integer the 'value' will consist of a value matching these types: 
             * 1  = MultiLanguageValue 
             * 2  = EnumValue 
             * 3  = MultiCurrencyValue 
             * 4  = DoubleUnitValue 
             * 5  = IntegerUnitValue 
             * 6  = StringValue 
             * 7  = IntegerValue 
             * 8  = DoubleValue 
             * 9  = BooleanValue 
             * 10 = UnnamedValue 
             * 11 = DateValue 
             * 12 = TimeValue 
             * 13 = DateTimeValue 
             * 14 = ZonedDateTimeValue 
             * 15 = LongValue 
          format: int32
