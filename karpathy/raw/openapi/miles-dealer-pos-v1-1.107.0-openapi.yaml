    CreateQuoteProduct:
      required:
        - identifiers
      type: object
      properties:
        identifiers:
          description: The identifiers of the quote for the pending contract
          $ref: '#/components/schemas/CreateQuoteProductIdentifiers'
        interestRate:
          maximum: 1
          minimum: 0
          type: number
          description: The interest rate of the sales quote, expressed as a value between 0 and 1 (e.g., 0.50 = 50%). It will be returned only for the configured products, which are by default 'Lease Purchase' and 'Consumer Loan'.
          format: double
          example: 0.25
        interestSplit:
          maximum: 1
          minimum: 0
          type: number
          description: The monthly tax percentage that is applied to the interest portion, expressed as a value between 0 and 1 (e.g., 0.50 = 50%)
          format: double
          example: 0.25
        dueDay:
          minimum: 0
          type: integer
          description: Indicates when the contract needs to be invoiced. This is independent of the rental schedule. For example, a quote and contract with period duration '1 month' and due day '15' means that the contract will be invoiced every 15th of the month. Due day = 0 means day of activation, indicating that the contract will be invoiced on the day it is activated.
          format: int32
          example: 1
        investment:
          type: number
          description: The total investment of the sales quote and the resulting contract. This is typically the sum of all investments of the service components. However, this can be overruled by the user.
          format: double
          example: 40500
        purchaseOptionValue:
          minimum: 0
          exclusiveMinimum: true
          type: number
          description: If a purchase option is specified in the contract, this amount will be used as the amount for the option
          format: double
          example: 15000
        residualValue:
          description: The residual value
          $ref: '#/components/schemas/CreateResidualValue'
        oneOffCommission:
          description: The one-off commission fee representing the dealer network effort necessary to adjust the dealer's commissions
          $ref: '#/components/schemas/CreateOneOffCommissionFee'
        costOfFunds:
          description: The cost of funds used for calculating the interest rate applied to the lease price
          $ref: '#/components/schemas/CreateCostOfFunds'
        spreadCommission:
          description: The spread commission fee representing the dealer network effort necessary to adjust the dealer's commissions
          $ref: '#/components/schemas/CreateSpreadCommissionFee'
        customerUpfront:
          minimum: 0
          type: number
          description: The upfront amount paid by the customer
          format: double
          example: 1000
        rentalProfile:
          description: |
            The rental profile of the sales quote.

            Examples are:
            - 3+33 in 36 term: 3 months are to be paid in the first month; 33 months are to be paid monthly; last 2 months are to be prepaid
            - 3+35 in 36 term: 3 months are to be paid in the first month; the rest of the 33 monthly payments are spread over the other 35 months
            - first increased rent: a fixed amount is to be paid in the first month; the rest of the amount to be paid is spread over the other months
          $ref: '#/components/schemas/RentalProfileRequest'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/SimpleDynamicAttributeValue'
          description: The dynamic attributes of the lease service to update
      description: The product of the new quote and pending contract
