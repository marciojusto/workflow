  /m2m/pending-contracts:
    get:
      tags:
        - M2MPendingContractsResource
      summary: Find M2M pending contracts
      description: This endpoint retrieves a list of pending contracts based on the provided filters.
      operationId: findM2MPendingContracts
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: sign_on_id
          in: query
          description: The sign-on identification of the user
          required: true
          schema:
            minLength: 1
            type: string
        - name: broker_contact_id
          in: query
          description: The IDs of the broker contacts to fetch pending contracts for
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '600278'
        - name: pending_contract_id
          in: query
          description: The IDs of the contracts to fetch
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147483816'
        - name: customer_id
          in: query
          description: The IDs of the customers to fetch pending contracts for
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100001'
        - name: contract_reference
          in: query
          description: The references of the pending contracts to fetch
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147483816'
        - name: contract_status_id
          in: query
          description: ID(s) of the contract status(es). Only ID(s) that are in the initialized status group will be filtered out.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100215'
        - name: maximum_start_date
          in: query
          description: The maximum start date to filter pending contracts
          schema:
            type: string
          example: '2023-12-31'
        - name: base_quote_reason
          in: query
          description: ID(s) of the base quote reason(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100041'
        - name: base_quote_id
          in: query
          description: ID(s) of the base quote(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147765893'
        - name: external_key
          in: query
          description: The external key(s) of the pending contract(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              format: uuid
              example: 37507d09-5f05-46d9-b2b9-027b3014ae96
        - name: search_query
          in: query
          schema:
            maxLength: 2147483647
            minLength: 1
            type: string
            description: NOTICE THIS WILL ONLY WORK FOR POSTGRES ODS By filling in this property, you can do a back-end search
            example: director
            x-miles-search:
              tradingName: The trading name of the customer of the pending contract
              reference: The reference of the pending contract
              identification: The identification of the driver of the pending contract, which is a concatenation of first and last name
              licensePlate: The license plate of the vehicle of the pending contract
              officialRegistration: The official registration of the customer
              description: The description of the vehicle of the pending contract
              quoteReference: The reference of the quote
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/M2MFindPendingContractsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Requested user not found
            - Pending contracts not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - m2m_contract
