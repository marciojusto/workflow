          $ref: '#/components/schemas/ValidationElementType'
        .mandatoryErrorMessage:
          type: object
          additionalProperties:
            type: string
            description: |
              Deprecated since 2025-06-06 in favor of '.validationRequirementErrorMessage'.
              Should and will be exactly the same content as `.mandatoryErrorMessage`.
            deprecated: true
          description: |
            Deprecated since 2025-06-06 in favor of '.validationRequirementErrorMessage'.
            Should and will be exactly the same content as `.mandatoryErrorMessage`.
          deprecated: true
        .validationRequirementErrorMessage:
          type: object
          additionalProperties:
            type: string
            description: The custom error message in case the property is (not) provided, according to the `.validationRequirement` rule. The property names will be an ISO 639-2 language code.
          description: The custom error message in case the property is (not) provided, according to the `.validationRequirement` rule. The property names will be an ISO 639-2 language code.
        .validationErrorMessage:
          type: object
          additionalProperties:
            type: string
            description: The custom error message in case the property validation is not correct. The property names will be an ISO 639-2 language code.
          description: The custom error message in case the property validation is not correct. The property names will be an ISO 639-2 language code.
