  /pending-contracts:
    get:
      tags:
        - PendingContractsResource
      summary: Find pending contracts
      description: This endpoint retrieves a filtered list of pending contracts with the status group initialized.
      operationId: findPendingContracts
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: broker_company_id
          in: query
          description: The IDs of the broker companies to fetch pending contracts for
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '500000'
        - name: broker_contact_id
          in: query
          description: The IDs of the broker contacts to fetch pending contracts for
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '600278'
        - name: customer_id
          in: query
          description: The IDs of the customers to fetch pending contracts for
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100001'
        - name: pending_contract_id
          in: query
          description: The IDs of the pending contracts to fetch
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147483816'
        - name: product_category_id
          in: query
          description: The IDs of the product categories of the pending contracts
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '801'
        - name: pending_contract_reference
          in: query
          description: The references of the pending contracts to fetch
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147483816'
        - name: originating_quote_id
          in: query
          description: The IDs of the originating quote to fetch pending contracts
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147483816'
        - name: originating_quote_reference
          in: query
          description: The references of the originating quote to fetch pending contracts
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: 100000/001
        - name: pending_contract_status
          in: query
          description: ID(s) of the pending contract status(es). Only ID(s) that are in the initialized status group will be filtered out.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100215'
        - name: search_query
          in: query
          schema:
            maxLength: 2147483647
            minLength: 1
            type: string
            description: NOTICE THIS WILL ONLY WORK FOR POSTGRES ODS By filling in this property, you can do a back-end search
            example: bestuurder
            x-miles-search:
              tradingName: The trading name of the customer of the contract
              reference: The reference of the contract
              identification: The identification of the driver of the contract, which is a concatenation of first and last name
              licensePlate: The license plate of the vehicle of the contract
              officialRegistration: The official registration of the customer
              description: The description of the vehicle of the contract
              quoteReference: The reference of the quote
        - name: include_conversation_info
          in: query
          description: Indicates whether conversation information should be included. The Miles chat feature must be included in your Miles Enterprise license to use this parameter.
          schema:
            type: boolean
            default: false
          example: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindPendingContractsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
