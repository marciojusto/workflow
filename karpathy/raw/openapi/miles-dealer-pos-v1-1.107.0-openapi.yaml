            Defines which type an abstract Value, dynamic attribute or qualifier should have:
            - 1 / MULTI_LANGUAGE = MultiLanguageValue
            - 2 / ENUM = EnumValue
            - 3 / MULTI_CURRENCY = MultiCurrencyValue
            - 4 / DOUBLE_UNIT = DoubleUnitValue
            - 5 / INTEGER_UNIT = IntegerUnitValue
            - 6 / STRING = StringValue
            - 7 / INTEGER = IntegerValue
            - 8 / DOUBLE = DoubleValue
            - 9 / BOOLEAN = BooleanValue
            - 11 / DATE = DateValue
            - 12 / TIME = TimeValue
            - 13 / DATE_TIME = DateTimeValue
            - 14 / ZONED_DATE_TIME = ZonedDateTimeValue
            - 15 / LONG = LongValue

            Both the names and the numbers are allowed
          example: '7'
          enum:
            - '1'
            - MULTI_LANGUAGE
            - '2'
            - ENUM
            - '3'
            - MULTI_CURRENCY
            - '4'
            - DOUBLE_UNIT
            - '5'
            - INTEGER_UNIT
            - '6'
            - STRING
            - '7'
            - INTEGER
            - '8'
            - DOUBLE
            - '9'
            - BOOLEAN
            - '11'
            - DATE
            - '12'
            - TIME
            - '13'
            - DATE_TIME
            - '14'
            - ZONED_DATE_TIME
            - '15'
            - LONG
