        - NOT_EQUALS_IGNORE_CASE
        - IN_IGNORE_CASE
        - NOT_IN_IGNORE_CASE
        - IN
        - NOT_IN
        - IN_GROUP
        - NOT_IN_GROUP
        - IS_ENUMERATION_TYPE
        - EQUALS
        - NOT_EQUALS
        - IS_TRUE
        - IS_FALSE
        - LOWER_THAN
        - LOWER_THAN_EQUAL_TO
        - GREATER_THAN
        - GREATER_THAN_EQUAL_TO
        - MIN_AGE
        - MAX_AGE
