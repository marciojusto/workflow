openapi: 3.0.1
info:
  title: miles-dealer-pos
  contact:
    url: https://www.sofico.global
  license:
    name: Sofico
    url: https://www.sofico.global
  version: 1.107.0
  x-milesServiceType: functional
  x-logo:
    url: https://www.sofico.global/sofico.svg
    altText: Sofico logo
tags:
  - name: CanceledContractsResource
    description: This resource contains the endpoints related to canceled contracts.
    x-displayName: Canceled contracts
  - name: CatalogVehiclesResource
    description: This resource contains the endpoints related to catalog vehicles.
    x-displayName: Catalog vehicles
  - name: ContractsResource
    description: This resource contains the endpoints related to the manipulation of contracts.
    x-displayName: Contracts
  - name: ConversationsResource
    description: This resource contains the endpoints related to the manipulation of chat conversations, participants, messages and attachments. The Miles chat feature must be included in your Miles Enterprise license to use this resource.
    x-displayName: Conversations
  - name: M2MConditionTypeDefinitionResource
    description: This resource contains the endpoints related to condition type definitions.
    x-displayName: Condition type definitions
  - name: M2MContractResource
    description: This resource contains the endpoints related to the management of running and terminated contracts and their related data.
    x-displayName: Contracts
  - name: M2MConversationsResource
    description: This resource contains the endpoints related to the manipulation of machine-to-machine conversations.
    x-displayName: Conversations
  - name: M2MCreditApplicationsResource
    description: This resource contains the endpoints related to the manipulation of machine-to-machine credit applications.
    x-displayName: Credit applications
  - name: M2MEnumerationResource
    description: This resource contains the endpoints related to the retrieval of enumeration types in the context of pending contracts.
    x-displayName: Enumerations
  - name: M2MPendingContractsResource
    description: This resource contains the endpoints related to the manipulation of machine-to-machine pending contracts.
    x-displayName: Pending contracts
  - name: M2MQuotationTemplatesResource
    description: This resource contains the endpoints related to the manipulation of machine-to-machine quotation templates.
    x-displayName: Quotation templates
  - name: M2MRelatedEntityTypesResource
    description: This resource contains the endpoints related to entity types.
    x-displayName: Related entity types
  - name: M2MSalesQuotesResource
    description: This resource contains the endpoints related to the manipulation of machine-to-machine sales quotes.
    x-displayName: Sales quotes
  - name: M2MStipulationTypeDefinitionResource
    description: This resource contains the endpoints related to stipulation type definitions in the context of pending contracts.
    x-displayName: Stipulation type definitions
  - name: PendingContractAmendmentQuotesResource
    description: This resource contains the endpoints related to the manipulation of existing amendment quotes, as well as the creation of an amendment quote for a specific pending contract.
    x-displayName: Pending contract amendment quotes
  - name: PendingContractsResource
    description: This resource contains the endpoints related to the manipulation of pending contracts.
    x-displayName: Pending contracts
  - name: PriceIndicationsResource
    description: |
      This resource contains the endpoints related to the calculation of price indications.
      To be able to use them, the Miles PCS module needs to be part of your license.
    x-displayName: Price indications
  - name: PromotionsResource
    description: |
      This resource contains the endpoints related to promotions.
      To be able to use them, the Miles promotion module needs to be part of your license.
    x-displayName: Promotions
  - name: SalesQuoteResource
    description: This resource contains the endpoints related to the sales quotes.
    x-displayName: Sales quotes
  - name: ValidationRulesResource
    description: This resource contains the endpoints related to validation rules.
    x-displayName: Validation rules
paths:
  /canceled-contracts:
    get:
      tags:
        - CanceledContractsResource
      summary: Find canceled contracts
      description: This endpoint retrieves a filtered list of canceled contracts with the status group `canceled`.
      operationId: findCanceledContracts
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: canceled_contract_references
          in: query
          description: The references of the canceled contracts to fetch
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147483816'
        - name: cancellation_date_lower_limit
          in: query
          description: Filters contracts with a cancellation date on or after the specified date
          schema:
            type: string
            format: date
            example: '2026-04-16'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'true'
        - name: cancellation_date_upper_limit
          in: query
          description: Filters contracts with a cancellation date on or before the specified date
          schema:
            type: string
            format: date
            example: '2026-04-16'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'true'
        - name: search_query
          in: query
          schema:
            maxLength: 2147483647
            minLength: 1
            type: string
            description: This functionality is only available when using the Postgres ODS. Performs a back-end search on canceled contracts.
            example: bestuurder
            x-miles-search:
              tradingName: The trading name of the customer of the contract
              reference: The reference of the contract
              identification: The identification of the driver of the contract, which is a concatenation of first and last name
              licensePlate: The license plate of the vehicle of the contract
              officialRegistration: The official registration of the customer
              description: The description of the vehicle of the contract
              quoteReference: The reference of the quote
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindCanceledContractsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /canceled-contracts/{canceled_contract_id}:
    get:
      tags:
        - CanceledContractsResource
      summary: Get canceled contract
      description: This endpoint retrieves information of a canceled contract by ID.
      operationId: getCanceledContract
      parameters:
        - name: canceled_contract_id
          in: path
          description: The ID of the canceled contract
          required: true
          schema:
            type: string
          example: '2147483816'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CanceledContract'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Canceled contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '500':
          description: Failed to fetch canceled contract
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /catalog-vehicles/{catalog_vehicle_id}/validations:
    post:
      tags:
        - CatalogVehiclesResource
      summary: Validate the vehicle structure
      description: |
        This endpoint validates the structure of a catalog vehicle.
        To use this endpoint, the Miles PCS module must be part of your license.
      operationId: validateVehicleStructure
      parameters:
        - name: catalog_vehicle_id
          in: path
          description: The ID of the catalog vehicle to validate
          required: true
          schema:
            minLength: 1
            type: string
      requestBody:
        description: The vehicle information to validate
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CatalogVehicleValidationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogVehicleValidationResponse'
        '400':
          description: '- Request validation exception'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-

            - Catalog vehicle not found
            - Catalog vehicle options not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /contracts/{contract_id}/documents/{document_id}:
    get:
      tags:
        - ContractsResource
      summary: Download contract document
      description: This endpoint downloads a document attached to a contract.
      operationId: downloadContractDocument
      parameters:
        - name: contract_id
          in: path
          description: The ID of the contract
          required: true
          schema:
            type: string
          example: '2147483816'
        - name: document_id
          in: path
          description: The ID of the document to download
          required: true
          schema:
            type: string
          example: '100530'
      responses:
        '200':
          description: Response is a download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          x-isResponseFile: 'true'
        '401':
          description: Unauthorized
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Contract not found
            - Document not found
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /contracts/{contract_id}/stipulations/{stipulation_id}/documents/{document_id}:
    get:
      tags:
        - ContractsResource
      summary: Download a document from a stipulation linked to contract
      description: This endpoint downloads a document from a stipulation linked to a contract.
      operationId: downloadContractStipulationDocument
      parameters:
        - name: contract_id
          in: path
          description: The ID of the contract
          required: true
          schema:
            type: string
          example: '2147483816'
        - name: stipulation_id
          in: path
          description: The ID of the stipulation linked to a contract
          required: true
          schema:
            type: string
          example: '2147483648'
        - name: document_id
          in: path
          description: The ID of the document from a stipulation linked to a contract
          required: true
          schema:
            type: string
          example: '2147483678'
      responses:
        '200':
          description: Response is a download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          x-isResponseFile: 'true'
        '401':
          description: Unauthorized
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Contract not found
            - Stipulation not found
            - Document not found
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /contracts/{contract_id}/documents:
    get:
      tags:
        - ContractsResource
      summary: Find contract documents
      description: This endpoint retrieves a list of documents for a given running/terminated contract.
      operationId: findContractDocuments
      parameters:
        - name: contract_id
          in: path
          description: The ID of the contract
          required: true
          schema:
            type: string
          example: '2147483816'
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: document_id
          in: query
          description: The IDs of the documents linked to the contract you want to search for
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100530'
        - name: document_type_id
          in: query
          description: The IDs of the document types of the documents linked to the contract you want to search for
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '3'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindContractDocumentsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Contract not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /contracts/{contract_id}/stipulations/documents:
    get:
      tags:
        - ContractsResource
      summary: Find contract stipulation documents
      description: This endpoint retrieves a filtered list of contract stipulation documents.
      operationId: findContractStipulationDocuments
      parameters:
        - name: contract_id
          in: path
          description: The ID of the contract
          required: true
          schema:
            type: string
          example: '2147483816'
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: document_id
          in: query
          description: The IDs of the documents linked to the contract stipulations you want to search for
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100530'
        - name: stipulation_id
          in: query
          description: The IDs of the contract stipulations you want to search the documents for
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '124868'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindContractStipulationDocumentsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: '- Contract not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /contracts/{contract_id}/stipulations:
    get:
      tags:
        - ContractsResource
      summary: Find contract stipulations
      description: This endpoint retrieves a filtered list of contract stipulations.
      operationId: findContractStipulations
      parameters:
        - name: contract_id
          in: path
          description: The ID of the contract
          required: true
          schema:
            type: string
          example: '2147483816'
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: stipulation_type
          in: query
          description: The type of the stipulations linked to the contract you want to search for
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '600215'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindContractStipulationsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: '- Contract not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /contracts:
    get:
      tags:
        - ContractsResource
      summary: Find contracts
      description: This endpoint retrieves a list of contracts based on the provided filters.
      operationId: findContracts
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: contract_id
          in: query
          description: The ID(s) of the contract(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100001'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: customer_id
          in: query
          description: The ID(s) of the customer(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '200002'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: broker_contact_id
          in: query
          description: The ID(s) of the broker(s) contact(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '300003'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: broker_company_id
          in: query
          description: The ID(s) of the broker company(ies), only useful in case of broker/dealer users
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '500003'
            x-miles-extra-description:
              Will be ignored when using a searchQuery: 'false'
        - name: contract_status_id
          in: query
          description: The contract status ID(s). If this is provided together with the contract status group ID(s), only the contract status ID(s) will be taken into account.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: 566, 567, 1295
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: search_query
          in: query
          description: Allows users to perform a backend search using property values that are not exposed as query parameters. In this property, a user can provide the value(s) they want to search for. Note that this only works for postgres ODS.
          schema:
            type: string
          example: Krista
          x-miles-search:
            driver.identification: The identification of the driver of the contract, usually a concatenation of their first name and last name
            fleetVehicle.description: The description of the vehicle of the contract
            fleetVehicle.licensePlate: The license plate of the vehicle of the contract
            contract.reference: The reference of the contract
            customer.officialRegistration: The official registration of the customer
            customer.tradingName: The trading name of the customer of the contract
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindContractsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /contracts/{contract_id}/stipulations/{stipulation_id}/documents:
    post:
      tags:
        - ContractsResource
      summary: Upload a document from a stipulation linked to contract
      description: This endpoint uploads a document from a contract stipulation linked to a contract.
      operationId: uploadContractStipulationDocument
      parameters:
        - name: contract_id
          in: path
          description: The ID of the contract
          required: true
          schema:
            type: string
          example: '2147483816'
        - name: stipulation_id
          in: path
          description: The ID of the stipulation linked to a contract
          required: true
          schema:
            type: string
          example: '124868'
      requestBody:
        description: 'The file to attach to the stipulation:'
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ContractStipulationAttachedDocumentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractStipulationAttachedDocument'
        '400':
          description: |-
            - Contract not found
            - Contract stipulation not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
