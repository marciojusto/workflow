  /m2m/contracts:
    get:
      tags:
        - M2MContractResource
      summary: Find contracts
      description: This endpoint retrieves running and terminated contracts based on the provided filters.
      operationId: findM2MContracts
      parameters:
        - name: Miles-M2M-User-SignOn
          in: header
          description: The sign-on identification of the user that triggered the machine-to-machine communication
          schema:
            type: string
          example: salesperson-123
        - name: Miles-M2M-User-LeasingCompanyId
          in: header
          description: The ID of the leasing company that should be used in the machine-to-machine communication
          required: true
          schema:
            minLength: 1
            type: string
          example: '1'
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: sign_on_id
          in: query
          description: The sign-on identification of the user
          required: true
          schema:
            type: string
          example: dealer-manager
        - name: contract_id
          in: query
          description: The IDs of the running and terminated contracts to filter on
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '1005214'
        - name: external_key
          in: query
          description: The external key of the running and terminated contracts to filter on
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              format: uuid
              example: 73f57b10-fb81-4f99-8b7c-ff29e37219a8
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindM2MContractsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: '-Requested user not found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - m2m_contract
