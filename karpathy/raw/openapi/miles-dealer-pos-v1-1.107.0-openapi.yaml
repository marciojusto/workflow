        - M2MCreditApplicationsResource
      summary: M2M endpoint to import a credit application
      description: This endpoint creates a credit application for the given broker, linked to the provided customer - which is either reused if existing or registered as a new customer. For this purpose, the service also registers a new vehicle configuration and sales quote based on the request data.
      operationId: importCreditApplication
