    RentalProfileFixedRequest:
      required:
        - firstIncreasedRent
        - rentalType
      type: object
      allOf:
        - $ref: '#/components/schemas/RentalProfileRequest'
        - type: object
          properties:
            firstIncreasedRent:
              description: The first increased rent of the sales quote
              $ref: '#/components/schemas/FirstIncreasedRentRequest'
    RentalProfilePauseRequest:
      type: string
      description: |
        Specifies whether the rental profile includes any payment-free months and, if so, whether they occur at the start or end of the contract term
      enum:
        - none
        - start
        - end
    RentalProfilePredefinedRequest:
      required:
        - productRentalProfileId
        - rentalType
      type: object
      allOf:
        - $ref: '#/components/schemas/RentalProfileRequest'
        - type: object
          properties:
            productRentalProfileId:
              minLength: 1
              type: string
              description: The ID of the product rental profile, which is a predefined rental profile defined at product level
              example: '123456789'
    RentalProfileRequest:
      required:
        - rentalType
      type: object
      properties:
        rentalType:
          description: The type of the rental profile
          $ref: '#/components/schemas/RentalProfileTypeRequest'
      description: |
        The rental profile of the sales quote.

        Examples are:
        - 3+33 in 36 term: 3 months are to be paid in the first month; 33 months are to be paid monthly; last 2 months are to be prepaid
        - 3+35 in 36 term: 3 months are to be paid in the first month; the rest of the 33 monthly payments are spread over the other 35 months
        - first increased rent: a fixed amount is to be paid in the first month; the rest of the amount to be paid is spread over the other months
      discriminator:
        propertyName: rentalType
        mapping:
          fixed-rental: '#/components/schemas/RentalProfileFixedRequest'
          spread: '#/components/schemas/RentalProfileSpreadRequest'
          simple-spread: '#/components/schemas/RentalProfileSimpleSpreadRequest'
          predefined: '#/components/schemas/RentalProfilePredefinedRequest'
    RentalProfileSimpleSpreadRequest:
      required:
        - numberUpfrontRentals
        - rentalType
        - terminalPause
      type: object
      allOf:
        - $ref: '#/components/schemas/RentalProfileRequest'
        - type: object
          properties:
            numberUpfrontRentals:
              minimum: 1
              type: integer
              description: The number of rentals to be paid in advance
              format: int32
            terminalPause:
              description: |
                Specifies whether the rental profile includes any payment-free months and, if so, whether they occur at the start or end of the contract term
              $ref: '#/components/schemas/RentalProfilePauseRequest'
    RentalProfileSpreadRequest:
      required:
        - numberUpfrontRentals
        - rentalType
        - terminalPause
      type: object
      allOf:
        - $ref: '#/components/schemas/RentalProfileRequest'
        - type: object
          properties:
            numberUpfrontRentals:
              minimum: 1
              type: integer
              description: The number of rentals to be paid in advance
              format: int32
            terminalPause:
              description: |
                Specifies whether the rental profile includes any payment-free months and, if so, whether they occur at the start or end of the contract term
              $ref: '#/components/schemas/RentalProfilePauseRequest'
    RentalProfileTypeRequest:
      type: string
      description: The type of the rental profile
      example: spread
      enum:
        - fixed-rental
        - spread
        - simple-spread
        - predefined
