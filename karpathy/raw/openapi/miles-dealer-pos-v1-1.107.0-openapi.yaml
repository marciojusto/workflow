        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImportCreditApplicationResponse'
        '400':
          description: |-
            - Catalog vehicle not found
            - Catalog vehicle not uniquely identified
            - Lookup table not found
            - Broker cannot be identified
            - Customer legal name required
            - Individual person required for customer type 'Individual'
            - Individual person required for customer type 'Sole Trader'
            - Identifier for quotation template missing
            - Quotation template not uniquely identified
            - Broker company not provided
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Broker contact not found
            - Broker contact cannot be uniquely identified
            - Broker company not unique
            - Broker company not found
            - Dealer company not found
            - Multiple dealer companies found
            - Broker and company cannot be found
            - ISIC code not found
            - Customer not found
            - Requested quotation template not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: '- Supplier is no valid dealer company'
