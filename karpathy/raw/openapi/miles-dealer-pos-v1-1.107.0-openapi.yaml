      title: SimpleQualifierValue
      type: object
      properties:
        valueType:
          type: integer
          description: |
            Based on this integer, the 'value' will consist of a value matching one of these types:
             * 1  = MultiLanguageValue
             * 2  = EnumValue
             * 3  = MultiCurrencyValue
             * 4  = DoubleUnitValue
             * 5  = IntegerUnitValue
             * 6  = StringValue
             * 7  = IntegerValue
             * 8  = DoubleValue
             * 9  = BooleanValue
             * 10 = UnnamedValue
             * 11 = DateValue
             * 12 = TimeValue
             * 13 = DateTimeValue
             * 14 = ZonedDateTimeValue
             * 15 = LongValue
          format: int32
          example: 9
        value:
          description: An object that contains the actual value
          $ref: '#/components/schemas/AbstractValue'
