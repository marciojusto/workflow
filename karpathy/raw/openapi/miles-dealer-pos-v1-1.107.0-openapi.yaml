          type: array
          description: |
            The ordered list of types corresponding to the elements of the condition path.
            Example:

            The condition path 'object.subobject.field' consists of 3 elements in a set order: 'object', 'subobject', and 'field'.

            This means that this list will also have 3 elements where the first element will be the type of 'object',
            the second element the type of 'subobject' and the last element the type of 'field'.
          items:
