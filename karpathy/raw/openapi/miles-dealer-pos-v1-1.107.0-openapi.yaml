          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceIndicationsResponse'
        '400':
          description: '- Request validation exception'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            Requested quotation template not found
            - Catalog vehicle not found
            - Price indication accessory options not found
            - Factory options not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: |-
            Discount type manipulation not possible
            - Unallowed price indication accessory option
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /promotions/{promotion_id}:
    get:
      tags:
        - PromotionsResource
      summary: Get promotion
      description: This endpoint retrieves a promotion by its ID.
      operationId: getPromotion
      parameters:
        - name: promotion_id
          in: path
          description: The ID of the promotion
          required: true
          schema:
            type: string
          example: 8024c24b-25e4-4c99-ae58-04870e339b1d
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Promotion'
        '400':
          description: Request validation exception
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Promotion not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /sales-quotes/{sales_quote_id}/bank-accounts:
    put:
      tags:
        - SalesQuoteResource
      summary: Create a bank account with a payment preference
      description: This endpoint creates a new customer bank account with a payment preference and immediately links the new payment preference to the existing sales quote defined in the request.
      operationId: createBankAccountAndLinkToSalesQuote
      parameters:
        - name: sales_quote_id
          in: path
          description: The ID of the sales quote
          required: true
          schema:
            type: string
          example: '2147483816'
      requestBody:
        description: Information of the bank account creation
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBankAccountLinkToSalesQuoteRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateBankAccountLinkToSalesQuoteResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Sales quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Failed to create the bank account.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
            - retail_prospect
  /sales-quotes:
    post:
      tags:
        - SalesQuoteResource
      summary: Create sales quote
      description: This endpoint creates and validates a new sales quote used in the PCS flow.
      operationId: portalCreateSalesQuote
      parameters:
        - name: ignore_warnings
          in: query
          description: If true, warnings, like for example the duplicate check, will be ignored.
          schema:
            type: boolean
            default: false
      requestBody:
        description: 'The information needed to create a sales quote:'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PortalCreateSalesQuoteRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedSalesQuoteResponse'
        '400':
          description: |-
            - Request validation exception
             -Invalid email type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Customer not found
            - Catalog vehicle not found
            - Requested quotation template not found
            - Factory options not found
            - Sales quote accessory options not found
            - ISIC code not found
            - Language not found
            - Country not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: |-
            - Unallowed sales quote accessory option
            - Discount type manipulation not possible
            - Unable to find active vehicle condition in group
            - Failed to create the sales quote for the given request. Please contact the back office for more information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /validation-rules/{validation_id}:
    get:
      tags:
        - ValidationRulesResource
      summary: Get validation rules
      description: This endpoint retrieves the validation rules used by the requested validation category.
      operationId: getValidationRules
      parameters:
        - name: validation_id
          in: path
          description: |-
            The ID of the validation category.
            - `PENDING_CONTRACT_REGISTER_LICENSE_PLATE`: Returns the validation rules that will be used before registering the registration details for a pending contract.
          required: true
          schema:
            $ref: '#/components/schemas/ValidationRulesCategory'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationRoot'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
components:
  schemas:
    BrokerContactReference:
      type: object
      properties:
        brokerContactId:
          type: string
          description: The ID of the broker contact
          example: '600278'
        identification:
          type: string
          description: The identification of the broker contact
          example: Smith, John
      description: The reference information of the broker contact
    ContractType:
      type: object
      properties:
        id:
          type: string
          description: The contract type ID
          example: '3430'
        description:
          type: string
          description: The contract type description
          example: Retail
      description: The type of the pending contract
    CustomerReference:
      type: object
      properties:
        customerId:
          type: string
          description: The ID of the customer
          example: '600364'
        legalName:
          type: string
          description: The legal name of the customer
          example: Sofico Lease
        tradingName:
          type: string
          description: The trading name of the customer
          example: Sofico Lease
        legalEntity:
          description: The legal entity type of the customer
          $ref: '#/components/schemas/LegalEntity'
        officialRegistration:
          type: string
          description: The official registration of the customer
          example: '1256849532198'
      description: The reference information of the customer
    FindCanceledContract:
      type: object
      properties:
        canceledContractId:
          type: string
          description: The ID of the canceled contract
          example: '2147483816'
        reference:
          type: string
          description: The reference of the canceled contract
          example: '0001132'
        type:
          description: The type of the contract
          $ref: '#/components/schemas/ContractType'
        originatingQuote:
          description: The originating quote information of the canceled contract
          $ref: '#/components/schemas/OriginatingQuoteReference'
        customer:
          description: The customer of the canceled contract
          $ref: '#/components/schemas/CustomerReference'
        brokerContact:
          description: The broker contact of the canceled contract
          $ref: '#/components/schemas/BrokerContactReference'
        vehicleDescription:
          description: The description of the vehicle on the canceled contract
          $ref: '#/components/schemas/MultiLanguageValue'
        licensePlate:
          type: string
          description: The license plate of the vehicle on the canceled contract
          example: 1-ABC-003
        productCategory:
          description: The product category
          $ref: '#/components/schemas/ProductCategory'
      description: A canceled contract
    FindCanceledContractsResponse:
      type: object
      properties:
        canceledContracts:
          type: array
          description: The paginated list of canceled contracts
          items:
            $ref: '#/components/schemas/FindCanceledContract'
        totalCount:
          type: integer
          description: Number of canceled contracts that qualify for the filters
          format: int64
          example: 25
    LegalEntity:
      type: object
      properties:
        id:
          type: string
          description: The legal entity ID
          example: '700'
        description:
          type: string
          description: The legal entity description
          example: Particulier
      description: The legal entity type of the customer
    MultiLanguageValue:
      title: MultiLanguageValue
      type: object
      properties:
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '170392'
        translation:
          type: string
          description: The translation of the multi-language ID in human-readable format
          example: Hatchback
      description: Miles API v1 representation of a translated string value.
    OriginatingQuoteReference:
      type: object
      properties:
        originatingQuoteId:
          type: string
          description: The ID of the originating quote
          example: '2147483816'
        originatingQuoteReference:
          type: string
          description: The reference of the originating quote
          example: 100000/001
      description: The originating quote information of the pending contract
    ProductCategory:
      type: object
      properties:
        id:
          type: string
          description: The product category ID
          example: '802'
        description:
          type: string
          description: The product category description
          example: Finance Lease
      description: The category of the product linked to the sales quote
    ExceptionInfoDTO:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type. This provides human-readable documentation for the problem type when dereferenced.
          example: https://api.sofico.global/problems/microservices/service-unavailable
        title:
          type: string
          description: A short, human-readable summary of the problem type
          example: Service Unavailable
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
          example: The requested service is not available.
        message:
          description: Message objects containing translation information
          $ref: '#/components/schemas/MultiLanguageValue'
        arguments:
          type: array
          description: Additional arguments that provide context for the error
          items:
            type: string
            example: '34898219'
    AbstractValue:
      type: object
      description: An object that contains the actual value
    AccessoryOption:
      required:
        - type
      type: object
      allOf:
        - $ref: '#/components/schemas/VehicleOption'
        - type: object
          properties:
            genericOptionId:
              type: string
              description: The generic option ID
              example: '7'
            qualifier1:
              description: The first qualifier
              $ref: '#/components/schemas/QualifierValue'
            qualifier2:
              description: The second qualifier
              $ref: '#/components/schemas/QualifierValue'
            qualifier3:
              description: The third qualifier
              $ref: '#/components/schemas/QualifierValue'
    CanceledContract:
      type: object
      properties:
        canceledContractId:
          type: string
          description: The ID of the canceled contract
          example: '2147483816'
        reference:
          type: string
          description: The reference of the canceled contract
          example: '0001132'
        type:
          description: The type of the contract
          $ref: '#/components/schemas/ContractType'
        customer:
          description: The customer of the canceled contract
          $ref: '#/components/schemas/CustomerReference'
        brokerContact:
          description: The broker contact of the canceled contract
          $ref: '#/components/schemas/BrokerContactReference'
        leasingCompany:
          description: The leasing company that is responsible for the canceled contract
          $ref: '#/components/schemas/LeasingCompanyReference'
        product:
          description: The product information of the canceled contract
          $ref: '#/components/schemas/CanceledContractProduct'
        vehicle:
          description: The vehicle of the canceled contract
          $ref: '#/components/schemas/CanceledContractVehicle'
    CanceledContractProduct:
      type: object
      properties:
        productCategory:
          description: The product category
          $ref: '#/components/schemas/EnumValue'
        mileage:
          description: The mileage on the canceled contract
          $ref: '#/components/schemas/DoubleUnitValue'
        term:
          description: The term on the canceled contract
          $ref: '#/components/schemas/DoubleUnitValue'
        productConfiguration:
          description: The configuration of the product linked to the canceled contract
          $ref: '#/components/schemas/CanceledContractProductConfiguration'
      description: The product information of the canceled contract
    CanceledContractProductConfiguration:
      type: object
      properties:
        reference:
          type: string
          description: The reference of the product
          example: Operating Lease
        services:
          type: array
          description: A list of services
          items:
            $ref: '#/components/schemas/Service'
      description: The configuration of the product linked to the canceled contract
    CanceledContractVehicle:
      type: object
      properties:
        vehicleId:
          type: string
          description: The ID of the vehicle
          example: '604880'
        catalogVehicleId:
          type: string
          description: The ID of the catalog vehicle on which this vehicle is based
          example: '604213'
        description:
          description: The description of the vehicle
          $ref: '#/components/schemas/MultiLanguageValue'
        typeName:
          type: string
          description: The type of the vehicle
          example: 1.2 TFSI S TRONIC AMBITION PRO LINE SPOR
        vehicleNature:
          description: The nature of the vehicle
          $ref: '#/components/schemas/EnumValue'
        make:
          description: The make of the vehicle
          $ref: '#/components/schemas/Make'
        model:
          description: The model of the vehicle
          $ref: '#/components/schemas/Model'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: A map of dynamic attributes
        imagesPath:
          type: string
          description: The path to the image of the vehicle
          example: AUDI/A4/2017/5ES*
        technicalSpecifications:
          description: The technical specifications of the vehicle
          $ref: '#/components/schemas/CanceledContractVehicleTechnicalSpecification'
        configuration:
          description: The configuration information of the vehicle
          $ref: '#/components/schemas/CanceledContractVehicleConfigurationInformation'
      description: The vehicle of the canceled contract
    CanceledContractVehicleConfigurationInformation:
      type: object
      properties:
        vehicleOptions:
          type: array
          description: A list of options for the vehicle
          items:
            $ref: '#/components/schemas/VehicleOption'
      description: The configuration information of the vehicle
    CanceledContractVehicleTechnicalSpecification:
      type: object
      properties:
        consumption:
          description: The fuel consumption of the vehicle
          $ref: '#/components/schemas/DoubleUnitValue'
        co2Emission:
          type: integer
          description: The CO2 emission of the vehicle
          format: int32
          example: 174
        kw:
          type: number
          description: The power of the vehicle in kW
          format: double
          example: 118
        tireSpecification:
          type: string
          description: The specification of the tire
          example: 225 45 17 V
        bodyStyle:
          description: The body style of the vehicle
          $ref: '#/components/schemas/EnumValue'
        fuelType:
          description: The fuel type of the vehicle
          $ref: '#/components/schemas/EnumValue'
        netWeight:
          description: The weight of the vehicle
          $ref: '#/components/schemas/DoubleUnitValue'
        maximumWeight:
          description: The maximum weight of the vehicle
          $ref: '#/components/schemas/DoubleUnitValue'
        maximumLoad:
          description: The maximum load of the vehicle
          $ref: '#/components/schemas/DoubleUnitValue'
        trailerLoadBraked:
          description: The braked weight, being the maximum weight of a trailer, caravan, boat trailer or horsebox that has its own brakes
          $ref: '#/components/schemas/DoubleUnitValue'
        trailerLoadUnbraked:
          description: The unbraked weight, being the maximum weight of a trailer, caravan, boat trailer or horsebox that is not capable of braking independently
          $ref: '#/components/schemas/DoubleUnitValue'
      description: The technical specifications of the vehicle
    DoubleUnitValue:
      title: DoubleUnitValue
      type: object
      properties:
        value:
          type: number
          description: The value contains a decimal number
          format: double
          example: 3.9
        unit:
          description: The unit of the value
          $ref: '#/components/schemas/UnitValue'
      description: Miles API v1 representation of a double with an additional unit value.
    DynamicAttributeValue:
      title: DynamicAttributeValue
      type: object
      properties:
        valueType:
          type: integer
          description: |
            Based on this integer the 'value' will consist of a value matching these types: 
             * 1  = MultiLanguageValue 
             * 2  = EnumValue 
             * 3  = MultiCurrencyValue 
             * 4  = DoubleUnitValue 
             * 5  = IntegerUnitValue 
             * 6  = StringValue 
             * 7  = IntegerValue 
             * 8  = DoubleValue 
             * 9  = BooleanValue 
             * 10 = UnnamedValue 
             * 11 = DateValue 
             * 12 = TimeValue 
             * 13 = DateTimeValue 
             * 14 = ZonedDateTimeValue 
             * 15 = LongValue 
          format: int32
          example: 7
        value:
          description: An object that contains the actual value
          $ref: '#/components/schemas/AbstractValue'
        sysRepAttributeId:
          type: string
          description: The Miles back-office application ID that describes the attribute
      description: Miles API v1 representation of a dynamic attribute value.It has a 'valueType' as a discriminator for the actual 'value'.The 'sysRepAttributeId' identifies which attribute value is represented.
    EnumValue:
      title: EnumValue
      type: object
      properties:
        enumId:
          type: string
          description: The enumeration ID
          example: '100002'
        attributeTypeId:
          type: string
          description: ' The ID of the attribute type'
          example: '237'
        enumGroupId:
          type: string
          description: This will be represented as a separate attribute value
          example: '1350'
          deprecated: true
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '24379'
        translation:
          type: string
          description: The translation of the enumeration ID in human-readable format
          example: Request
        enabled:
          type: boolean
          description: Indicates whether this object can still be used
          example: true
      description: Miles API v1 representation of an enum value. It contains additional values representing the attribute type and multi-language context.
    FactoryOption:
      required:
        - type
      type: object
      allOf:
        - $ref: '#/components/schemas/VehicleOption'
        - type: object
          properties:
            factoryOptionId:
              type: string
              description: The factory option ID
              example: '60024129'
            optionCode:
              type: string
              description: The option code
              example: PKC
            isStandard:
              type: boolean
              description: Indicates whether the option is standard
              example: false
    ForeignCurrencyValue:
      title: ForeignCurrencyValue
      type: object
      properties:
        value:
          type: number
          description: The value that holds the currency amount
          format: double
          example: 25.56
        currency:
          type: string
          description: The ISO code of the currency
          example: USD
      description: Miles API v1 representation of a foreign currency value.
    LeasingCompanyReference:
      type: object
      properties:
        leasingCompanyId:
          type: string
          description: The ID of the leasing company
          example: '1'
      description: The reference information of the leasing company
    Make:
      type: object
      properties:
        name:
          description: The name of the make
          $ref: '#/components/schemas/MultiLanguageValue'
      description: The make of the vehicle
    Model:
      type: object
      properties:
        modelId:
          type: string
          description: The ID of the model
          example: '62773627'
        name:
          description: The name of the model
          $ref: '#/components/schemas/MultiLanguageValue'
        year:
          type: string
          description: The year of the model
          format: date
          example: '2026-04-16'
      description: The model of the vehicle
    MultiCurrencyValue:
      title: MultiCurrencyValue
      type: object
      properties:
        value:
          type: number
          description: The value that holds the currency amount
          format: double
          example: 25.56
        currencyValue:
          type: number
          description: The currency amount in a different currency. Deprecated since 2025-07-10 and version '3.5.0' in favor of 'foreignCurrency'.
          format: double
          example: 27.56
          deprecated: true
        currencyId:
          type: string
          description: The ID of the currency. Deprecated since 2025-07-10 and version '3.5.0' in favor of 'foreignCurrency'.
          example: '2'
          deprecated: true
        currency:
          type: string
          description: The ISO code of the reference currency
          example: EUR
        foreignCurrency:
          description: Foreign currency information
          $ref: '#/components/schemas/ForeignCurrencyValue'
      description: Miles API v1 representation of a currency value.
    QualifierSetting:
      type: object
      properties:
        qualifierSettingId:
          type: string
          description: ID of the qualifier settings
          example: MD_EXCESS_PCT
        condition:
          type: array
          description: A list of service choice IDs that uses this qualifier setting
          items:
            type: string
            description: The ID of a service choice that uses this qualifier setting
            example: '100344'
        value:
          type: string
          description: The value
          example: '0.025'
        dataType:
          type: string
          description: The kind of data type
          example: Enum
        defaultValue:
          type: string
          description: The default value of the qualifier setting
          example: '8'
        minValue:
          type: number
          description: The minimum value of the qualifier setting
          format: double
          example: 4
        maxValue:
          type: number
          description: The maximum value of the qualifier setting
          format: double
          example: 12
        isRequired:
          type: boolean
          description: Indicates whether the qualifier setting is required
          default: false
        choices:
          type: array
          description: A list of qualifier setting choices
          items:
            $ref: '#/components/schemas/QualifierSettingChoice'
      description: A qualifier setting of the service
    QualifierSettingChoice:
      type: object
      properties:
        qualifierSettingChoiceId:
          type: string
          description: The ID of the qualifier setting choice
          example: '100513'
        label:
          description: The label of the qualifier setting choice
          $ref: '#/components/schemas/MultiLanguageValue'
        isSelected:
          type: boolean
          description: Indicates whether the qualifier setting choice is selected
          example: false
      description: A qualifier setting choice
    QualifierValue:
      title: QualifierValue
      type: object
      properties:
        valueType:
          type: integer
          description: |
            Based on this integer, the 'value' will consist of a value matching one of these types:
             * 1  = MultiLanguageValue
             * 2  = EnumValue
             * 3  = MultiCurrencyValue
             * 4  = DoubleUnitValue
             * 5  = IntegerUnitValue
             * 6  = StringValue
             * 7  = IntegerValue
             * 8  = DoubleValue
             * 9  = BooleanValue
             * 10 = UnnamedValue
             * 11 = DateValue
             * 12 = TimeValue
             * 13 = DateTimeValue
             * 14 = ZonedDateTimeValue
             * 15 = LongValue
          format: int32
          example: 9
        value:
          description: An object that contains the actual value
          $ref: '#/components/schemas/AbstractValue'
        name:
          type: string
          description: The name of the qualifier value
          example: Insured yes/no
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '170392'
        qualifierType:
          type: string
          description: The type of the qualifier
          example: '5'
        translation:
          type: string
      description: Miles API v1 representation of a qualifier value.
    Service:
      type: object
      properties:
        serviceId:
          type: string
          description: The ID of the service
          example: RMT
        choices:
          type: array
          description: A list of service choices
          items:
            $ref: '#/components/schemas/ServiceChoice'
        qualifierSettings:
          type: array
          description: A list of qualifier settings
          items:
            $ref: '#/components/schemas/QualifierSetting'
      description: A service
    ServiceChoice:
      type: object
      properties:
        serviceChoiceId:
          type: string
