          example: 15678
        integers:
          type: array
          description: The list of integers for the operator
          items:
            type: integer
            description: An integer value for the operator
            format: int32
            example: 15678
        longs:
          type: array
          description: The list of longs for the operator
          items:
            type: integer
            description: A long value for the operator
            format: int64
            example: 15678468974132
        age:
          description: The age for the operator
          $ref: '#/components/schemas/AgeUnitValue'
        date:
          type: string
          description: The date for the operator
          format: date
          example: '2026-04-16'
        dateTime:
          type: string
          description: The date time for the operator
          format: date-time
          example: '2026-04-16T14:18:53.649Z'
        time:
          type: string
          description: The time for the operator
          format: ISO 8601 hh:mm:ss
