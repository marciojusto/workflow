openapi: 3.0.1
info:
  title: miles-customer
  description: "This service is used to retrieve information about customers, fleet managers,\n\t\t\tdrivers & legal entity groups.\n\t\t\tIt can manage all things related to UBO and its documents.\n\t\t\tCustomers can be created, updated and links to them can be removed.\n\t\t\tThe service provides filters needed to manage all these objects."
  contact:
    url: https://www.sofico.global
  license:
    name: Sofico
    url: https://www.sofico.global
  version: 1.201.2
  x-milesServiceType: functional
  x-logo:
    url: https://www.sofico.global/sofico.svg
    altText: Sofico logo
tags:
  - name: ValidationRulesResource
    description: This resource contains the endpoints related to validation rules.
    x-displayName: Validation rules
paths:
  /customers/{customer_id}/address-histories:
    post:
      summary: Add address history
      description: This endpoint creates an address history record for a customer.
      operationId: addAddressHistory
      parameters:
        - name: customer_id
          in: path
          description: ID of the customer
          required: true
          schema:
            type: string
          example: '2147483728'
      requestBody:
        description: Data required to add a contact to a customer
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddressHistoryRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AddressHistoryResponse'
        '400':
          description: The customer ID and the address history request must not be null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
  /customers/{customer_id}/bank-accounts:
    get:
      summary: Get customer bank accounts
      description: This endpoint retrieves bank accounts related to a customer.
      operationId: getCustomerBankAccounts
      parameters:
        - name: customer_id
          in: path
          description: The ID of the customer
          required: true
          schema:
            type: string
        - name: count
          in: query
          description: Maximum number of bank accounts to be displayed
          schema:
            minimum: 0
            type: integer
            format: int32
        - name: offset
          in: query
          description: Number of bank accounts to skip before selecting customer
          schema:
            minimum: 0
            type: integer
            format: int32
            default: 0
        - name: sort_by
          in: query
          description: Sorting to be applied on the results list
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindBankAccountsResponse'
        '400':
          description: The customer ID must not be null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
    post:
      summary: Add a bank account
      description: Register a new bank account to a customer
      operationId: addBankAccount
      parameters:
        - name: customer_id
          in: path
          description: ID of the customer owns bank accounts
          required: true
          schema:
            type: string
          example: '2147483728'
      requestBody:
        description: Data required to add a bank account
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BankAccountRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBankAccountsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_customer
  /customers/{customer_id}/payment-preferences:
    get:
      summary: Get customer payment preferences
      description: Get payment preferences for a given customer
      operationId: getCustomerPaymentPreferences
      parameters:
        - name: customer_id
          in: path
          description: The ID of the customer
          required: true
          schema:
            type: string
        - name: count
          in: query
          description: Maximum number of payment preferences to be displayed
          schema:
            minimum: 0
            type: integer
            format: int32
        - name: offset
          in: query
          description: Number of payment preferences to skip
          schema:
            minimum: 0
            type: integer
            format: int32
            default: 0
        - name: sort_by
          in: query
          description: Sorting to be applied on the results list
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindPaymentPreferencesResponse'
        '400':
          description: The customer ID must not be null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
    post:
      summary: Add payment preference
      description: Add payment preference to a customer
      operationId: addPaymentPreferences
      parameters:
        - name: customer_id
          in: path
          description: ID of the customer owns bank accounts
          required: true
          schema:
            type: string
          example: '2147483728'
      requestBody:
        description: Data required to add a payment preference
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PaymentPreferenceRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPaymentPreferencesResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_customer
  /customers/{customer_id}/sites:
    post:
      summary: Add a site for a customer
      description: This endpoint creates a site for a customer with the given customer ID.
      operationId: addSite
      parameters:
        - name: customer_id
          in: path
          description: The ID of the customer
          required: true
          schema:
            type: string
          example: '1000001'
        - name: ignore_warnings
          in: query
          description: |-
            Indicates whether warnings should be ignored.
            If set to true, interactive warnings will be ignored.
          schema:
            type: boolean
            default: false
      requestBody:
        description: Data required to create a new site
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSiteRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Site'
        '400':
          description: The customer ID and the site request must not be null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - account_manager
  /customers/{customer_id}/ubos/{deposit_id}/documents:
    get:
      summary: Find documents attached to an UBO
      description: This endpoint retrieves a list of all documents attached to an UBO.
      operationId: findAttachedUBODocuments
      parameters:
        - name: customer_id
          in: path
          description: ID of the customer
          required: true
          schema:
            type: string
        - name: deposit_id
          in: path
          description: ID of the UBO
          required: true
          schema:
            type: string
        - name: document_template_id
          in: query
          description: ID(s) of the document template(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindAttachedUBODocumentsResponse'
        '400':
          description: The customer ID and the deposit ID must not be null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Customer not found
            - Deposit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
    post:
      summary: Attach document
      description: This endpoint attaches a document to a person
      operationId: attachDocument
      parameters:
        - name: customer_id
          in: path
          description: ID of the customer
          required: true
          schema:
            type: string
        - name: deposit_id
          in: path
          description: ID of the UBO
          required: true
          schema:
            type: string
      requestBody:
        description: File to attach to the person
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/AttachedDocumentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AttachedDocument'
        '400':
          description: The customer ID, deposit ID and the attached document request must not be null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Customer not found
            - Deposit not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
  /contact/current/consents:
    get:
      summary: Get consents
      description: This endpoint retrieves the currently valid consents for the authenticated user. Consents that have been withdrawn have an opt-out date in the past and are not returned.
      operationId: getConsentsForUser
      parameters:
        - name: include_optout_consents
          in: query
          description: If true, will retrieve the revoked consents for the authenticated user.
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindConsentResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - user
            - mobility_user
    put:
      summary: Withdraw consents
      description: This endpoint withdraws consents for the authenticated user by setting the opt out date to the current date.
      operationId: withdrawConsentsForUser
      requestBody:
        description: Data required to withdraw a consent
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WithdrawConsentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: No consents found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - user
            - retail_customer
            - mobility_user
    post:
      summary: Register consents
      description: This endpoint registers a consent for data processing activities to the authenticated user.
      operationId: createConsentsForUser
      requestBody:
        description: Data required to create a consent
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConsentRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsentResponse'
        '400':
          description: Invalid data processing enumeration ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - user
            - retail_customer
            - mobility_user
  /customers/{customer_id}/contacts:
    get:
      summary: Find contacts for a customer
      description: This endpoint retrieves a list of contacts for the given customer.
      operationId: findContacts
      parameters:
        - name: customer_id
          in: path
          description: The ID of the customer
          required: true
          schema:
            type: string
          example: '2147483728'
        - name: contact_role_id
          in: query
          description: The ID(s) of the contact role(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100001'
        - name: official_registration
          in: query
          description: The official registration of the contact
          schema:
            type: string
          example: 36468213B
        - name: dynamic_attribute_filters
          in: query
          description: The dynamic attributes to filter on
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: 300123|Criterium
            x-miles-extra-description:
              Will be ignored when using a search_query: 'true'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindContactsResponse'
        '400':
          description: The customer ID must not be null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - dealer_salesperson
            - dealer_manager
            - broker_salesperson
            - broker_manager
    post:
      summary: Create contact for a customer
      description: |-
        This endpoint creates a new contact for a customer.
        The creation is possible only if the given customer belongs to the dealer/broker portfolio of the authenticated user and if the provided contact roles are allowed.
      operationId: createContact
      parameters:
        - name: customer_id
          in: path
          description: ID of the customer
          required: true
          schema:
            type: string
          example: '2147483728'
      requestBody:
        description: Data required to create a contact
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateContactRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContactResponse'
        '400':
          description: The customer ID and the contact request must not be null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Customer not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - dealer_salesperson
            - dealer_manager
            - broker_salesperson
            - broker_manager
  /customers:
    get:
      summary: Find customers
      description: 'This endpoint retrieves a list of customers.It can be used with a search query using the properties that can be found in the description of the query parameter search_query.It accepts multiple keywords separated by spaces, except for queries with only one character or the !, % and ^ wildcards.An example for a search query is ''+31092 Smith Sofic'': a search will be performed to find a match or partial match for ''+31092'' or ''Smith'' or ''Sofic'' on the attributes.'
      operationId: findCustomers
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: Order clause in which the elements will be returned, deprecated since 1.221.0 on 2023-02-22 in favor of a list of sortBy
          deprecated: true
          schema:
            $ref: '#/components/schemas/SortBy'
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: customer_id
          in: query
          description: ID(s) of the customer(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100001'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: broker_company_id
          in: query
          description: ID(s) of the broker company(ies)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '500000'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'true'
        - name: only_managed_customers
          in: query
          description: Indicates whether to filter by managed customers
          schema:
            type: boolean
          example: false
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'false'
        - name: reference
          in: query
          description: Indicates whether to filter by reference of the customer
          schema:
            type: string
          example: '100001'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'true'
        - name: trading_name
          in: query
          description: Indicates whether to filter by trading name of the customer
          schema:
            type: string
          example: Sofico Finance
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'true'
        - name: legal_entity_group_id
          in: query
          description: ID(s) of the legal entity group(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2051'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'true'
        - name: official_registration
          in: query
          description: Indicates whether to filter by a list of official registrations of the customer
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '41199698'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'true'
        - name: birth_date
          in: query
          description: Indicates whether to filter by the birth date (exact match) of the person linked to the customer
          schema:
            type: string
            format: date
            example: '2026-04-16'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'true'
        - name: last_name
          in: query
          description: Indicates whether to filter by the last name of the person linked to the customer
          schema:
            type: string
          example: Smith
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'true'
        - name: first_name
          in: query
          description: Indicates whether to filter by the first name of the person linked to the customer
          schema:
            type: string
          example: John
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'true'
        - name: postal_code
          in: query
          description: Indicates whether to filter by the postal code (exact match) of the person linked to the customer
          schema:
            type: string
          example: '9000'
          x-miles-extra-description:
            Will be ignored when using a searchQuery: 'true'
        - name: city
          in: query
          description: Indicates whether to filter by the city of the person linked to the customer
          schema:
            type: string
          example: Ghent
          x-miles-extra-description:
