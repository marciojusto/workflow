          example: '2026-04-16T14:58:24.592Z'
        time:
          type: string
          description: The time for the operator
          format: ISO 8601 hh:mm:ss
        elementRange:
          description: The element range information for the operator
          $ref: '#/components/schemas/ElementRange'
        unit:
          type: string
          description: The unit for DoubleUnitValue or IntegerUnitValue evaluations. This is field optional.
          example: '4497'
        long:
          type: integer
          description: The long value for the operator
          format: int64
          example: 15678468974132
        double:
          type: number
          description: The floating-point decimal number value for the operator
          format: double
          example: 2500.87
      description: The operator argument
    LocalTime:
      type: object
      properties:
        hour:
          type: integer
          format: int32
        minute:
          type: integer
          format: int32
        second:
          type: integer
          format: int32
        nano:
          type: integer
          format: int32
      description: The time to use as default
      format: ISO 8601 hh:mm:ss
    Mandatory:
      type: string
      description: Deprecated since 2025-06-06 in favor of '.validationRequirement'
      deprecated: true
      enum:
        - REQUIRED
        - CONDITIONAL
        - OPTIONAL
    NotCondition:
      type: object
      properties:
        not:
          type: object
          description: A condition used in the validation
          oneOf:
            - $ref: '#/components/schemas/Condition'
            - $ref: '#/components/schemas/AndCondition'
            - $ref: '#/components/schemas/OrCondition'
            - $ref: '#/components/schemas/NotCondition'
    Operator:
      type: string
      description: The operator to use
      enum:
        - NOT_NULL
        - IS_NULL
        - NOT_EMPTY
        - IS_EMPTY
        - NOT_BLANK
        - IS_BLANK
        - REGEX
        - EQUALS_IGNORE_CASE
        - NOT_EQUALS_IGNORE_CASE
        - IN_IGNORE_CASE
        - NOT_IN_IGNORE_CASE
        - IN
        - NOT_IN
        - IN_GROUP
        - NOT_IN_GROUP
        - IS_ENUMERATION_TYPE
        - EQUALS
        - NOT_EQUALS
        - IS_TRUE
        - IS_FALSE
        - LOWER_THAN
        - LOWER_THAN_EQUAL_TO
        - GREATER_THAN
        - GREATER_THAN_EQUAL_TO
        - MIN_AGE
        - MAX_AGE
        - HAS_GAPS
        - HAS_NO_GAPS
        - HAS_OVERLAPS
        - HAS_NO_OVERLAPS
        - 'FALSE'
        - 'TRUE'
    OperatorContext:
      maxProperties: 1
      minProperties: 1
      type: object
      properties:
        operator:
          description: The operator to use
          $ref: '#/components/schemas/Operator'
        value:
          description: The operator argument
          $ref: '#/components/schemas/EvaluatorContext'
        dynamicType:
          type: string
          description: |
            Defines which type an abstract Value, dynamic attribute or qualifier should have:
            - 1 / MULTI_LANGUAGE = MultiLanguageValue
            - 2 / ENUM = EnumValue
            - 3 / MULTI_CURRENCY = MultiCurrencyValue
            - 4 / DOUBLE_UNIT = DoubleUnitValue
            - 5 / INTEGER_UNIT = IntegerUnitValue
            - 6 / STRING = StringValue
            - 7 / INTEGER = IntegerValue
            - 8 / DOUBLE = DoubleValue
            - 9 / BOOLEAN = BooleanValue
            - 11 / DATE = DateValue
            - 12 / TIME = TimeValue
            - 13 / DATE_TIME = DateTimeValue
            - 14 / ZONED_DATE_TIME = ZonedDateTimeValue
            - 15 / LONG = LongValue

            Both the names and the numbers are allowed
          example: '7'
          enum:
            - '1'
            - MULTI_LANGUAGE
            - '2'
            - ENUM
            - '3'
            - MULTI_CURRENCY
            - '4'
            - DOUBLE_UNIT
            - '5'
            - INTEGER_UNIT
            - '6'
            - STRING
            - '7'
            - INTEGER
            - '8'
            - DOUBLE
            - '9'
            - BOOLEAN
            - '11'
            - DATE
            - '12'
            - TIME
            - '13'
            - DATE_TIME
            - '14'
            - ZONED_DATE_TIME
            - '15'
            - LONG
        type:
          type: array
          description: |
            The ordered list of types corresponding to the elements of the condition path.
            Example:

            The condition path 'object.subobject.field' consists of 3 elements in a set order: 'object', 'subobject', and 'field'.

            This means that this list will also have 3 elements where the first element will be the type of 'object',
            the second element the type of 'subobject' and the last element the type of 'field'.
          items:
            $ref: '#/components/schemas/ValidationElementType'
      description: A single condition element
    OrCondition:
      type: object
      properties:
        or:
          type: array
          description: The conditions to combine with the OR logical operator, an empty list of conditions evaluates to FALSE
          items:
            allOf: []
            anyOf: []
            oneOf:
              - $ref: '#/components/schemas/Condition'
              - $ref: '#/components/schemas/AndCondition'
              - $ref: '#/components/schemas/OrCondition'
              - $ref: '#/components/schemas/NotCondition'
    ValidationElementType:
      type: object
      properties:
        value:
          type: string
          description: |-
            Defines the type corresponding with the element

            Possible types:
            - An object name, for objects with a fixed set of fields
            - Map (objects with dynamic keys)
            - Enum (enumerations)
            - String (text)
            - Integer
            - Number (decimal numbers)
            - Boolean
            - Time
            - Date
            - DateTime
            - ZonedDateTime
          example: EnumValue
        isArray:
          type: boolean
          description: Defines if the element contains multiple values (`true`) or only a single value (`false`)
          example: true
          default: false
        property:
          type: string
          description: |-
            When the element contains a propety list selector, this fields will contain the type of the property.

            Possible types:
            - An object name, for objects with a fixed set of fields
            - Map (objects with dynamic keys)
            - Enum (enumerations)
            - String (text)
            - Integer
            - Number (decimal numbers)
            - Boolean
            - Time
            - Date
            - DateTime
            - ZonedDateTime
          example: String
      description: The type of an element in the condition path
    ValidationPath:
      maxProperties: 2147483647
      type: object
      properties:
        .mandatory:
          description: Deprecated since 2025-06-06 in favor of '.validationRequirement'
          $ref: '#/components/schemas/Mandatory'
        .validationRequirement:
          description: The validation requirement for this field
          $ref: '#/components/schemas/ValidationRequirement'
        .condition:
          type: string
          description: The condition to use for the conditionally required check
          example: MY_CONDITION
        .validation:
          type: string
          description: The validation condition to which this field should apply
          example: MY_VALIDATION_CONDITION
        .default:
          description: The default value that applies for this field when it is empty
          $ref: '#/components/schemas/DefaultValue'
        .type:
          description: The type of the current element in the validation path
          $ref: '#/components/schemas/ValidationElementType'
        .mandatoryErrorMessage:
          type: object
          additionalProperties:
            type: string
            description: |
              Deprecated since 2025-06-06 in favor of '.validationRequirementErrorMessage'.
              Should and will be exactly the same content as `.mandatoryErrorMessage`.
            deprecated: true
          description: |
            Deprecated since 2025-06-06 in favor of '.validationRequirementErrorMessage'.
            Should and will be exactly the same content as `.mandatoryErrorMessage`.
          deprecated: true
        .validationRequirementErrorMessage:
          type: object
          additionalProperties:
            type: string
            description: The custom error message in case the property is (not) provided, according to the `.validationRequirement` rule. The property names will be an ISO 639-2 language code.
          description: The custom error message in case the property is (not) provided, according to the `.validationRequirement` rule. The property names will be an ISO 639-2 language code.
        .validationErrorMessage:
          type: object
          additionalProperties:
            type: string
            description: The custom error message in case the property validation is not correct. The property names will be an ISO 639-2 language code.
          description: The custom error message in case the property validation is not correct. The property names will be an ISO 639-2 language code.
        .conditionalValidation:
          type: array
          description: The list of conditional validation rules
          items:
            $ref: '#/components/schemas/ConditionalValidation'
      additionalProperties:
        $ref: '#/components/schemas/ValidationPath'
      description: A path element to the element to evaluate
    ValidationRequirement:
      type: string
      description: The validation requirement for this field
      example: REQUIRED
      enum:
        - REQUIRED
        - CONDITIONALLY
        - OPTIONAL
        - NOT_ALLOWED
        - CONDITIONALLY_NOT_ALLOWED
    ValidationRoot:
      type: object
      properties:
        defaultLanguage:
          type: string
          description: The ISO language code of the fallback language for the error message. The language code should have been defined in the `supportedLanguages` set.
          format: ISO 639-2
          example: ENG
        supportedLanguages:
          uniqueItems: true
          type: array
          description: A not empty set of supported languages
          items:
            type: string
            description: An ISO language code of a supported language
            format: ISO 639-2
            example: ENG
        root:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ValidationPath'
          description: All the validation paths
        conditions:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/AbstractCondition'
          description: All the conditions used in the validations
    ValidationRulesCategory:
      type: string
      enum:
        - CREATE_CUSTOMER
        - UPDATE_CUSTOMER
