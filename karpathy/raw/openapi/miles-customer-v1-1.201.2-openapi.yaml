      maxProperties: 1
      minProperties: 1
      type: object
      additionalProperties:
        $ref: '#/components/schemas/OperatorContext'
      description: A single condition element
    ConditionalValidation:
      type: object
      properties:
        .condition:
          type: string
          description: When this condition evaluates to true, the field should apply to the validation
          example: MY_CONDITION
        .validation:
          type: string
          description: The validation condition to which this field should apply, when the condition evaluates to true
          example: MY_VALIDATION_CONDITION
        .validationErrorMessage:
          type: object
          additionalProperties:
            type: string
            description: The custom error message in case the property validation is not correct. The property names will be an ISO 639-2 language code.
          description: The custom error message in case the property validation is not correct. The property names will be an ISO 639-2 language code.
      description: A conditional validation rule
    DefaultValue:
      type: object
      properties:
        string:
          type: string
          description: The text value to use as default
          example: my paragraph
        enumId:
          type: string
          description: The enumeration value to use as default
          example: '800'
        integer:
          type: integer
          description: The integer value to use as default
          format: int32
          example: 12347
        date:
          type: string
          description: The date to use as default
          format: date
          example: '2026-04-16'
        dateTime:
          type: string
