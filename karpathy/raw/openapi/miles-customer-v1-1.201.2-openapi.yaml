          format: date-time
          example: '2026-04-16T14:58:24.591Z'
        time:
          description: The time to use as default
          $ref: '#/components/schemas/LocalTime'
        value:
          type: object
        long:
          type: integer
          description: The long value to use as default
          format: int64
          example: 15678468974132
        double:
          type: number
          description: The double value to use as default
          format: double
          example: 15248.1337
        boolean:
          type: boolean
          description: The boolean value to use as default
          example: true
      description: The default value that applies for this field when it is empty
    Element:
      type: object
      properties:
        path:
          type: string
          description: The relative path to the element starting from the collection that needs to be evaluated
          example: startDate
        type:
          type: array
          description: |
            The ordered list of types corresponding to the elements of the condition path.
            Example:

            The condition path 'object.subobject.field' consists of 3 elements in a set order: 'object', 'subobject', and 'field'.

            This means that this list will also have 3 elements where the first element will be the type of 'object',
            the second element the type of 'subobject' and the last element the type of 'field'.
          items:
            $ref: '#/components/schemas/ValidationElementType'
      description: The definition of the end element inside the collection
    ElementRange:
      type: object
      properties:
        isOpenEnded:
          type: boolean
          description: |
            Indicates that the end of the range is open.
            The start of the range is always closed.
            Only integer numbers (8-/16-/32-/64-bit) and local dates support closed ends.
            All comparable types are supported for open ends.
          example: false
          default: true
        start:
          description: The definition of the start element inside the collection
          $ref: '#/components/schemas/Element'
        end:
