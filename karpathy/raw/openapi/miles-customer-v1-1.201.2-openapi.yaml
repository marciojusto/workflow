          description: The predefined label of the contact address
          $ref: '#/components/schemas/EnumValue'
        addressId:
          type: string
          description: The ID of the contact address
          example: '15000'
        validFrom:
          type: string
          description: The start date from which the address history record is valid
          format: date
          example: '2026-04-16'
        validTo:
          type: string
          description: The end date until which the address history record is valid
          format: date
          example: '2026-04-16'
        creationDate:
          type: string
          description: The date on which the address history record was created
          format: date-time
          example: '2026-04-16T14:58:24.520Z'
    EnumValue:
      title: EnumValue
      type: object
      properties:
        enumId:
          type: string
          description: The enumeration ID
          example: '100002'
        attributeTypeId:
          type: string
          description: ' The ID of the attribute type'
          example: '237'
        enumGroupId:
          type: string
          description: This will be represented as a separate attribute value
          example: '1350'
          deprecated: true
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '24379'
        translation:
          type: string
          description: The translation of the enumeration ID in human-readable format
          example: Request
        enabled:
          type: boolean
          description: Indicates whether this object can still be used
          example: true
      description: Miles API v1 representation of an enum value. It contains additional values representing the attribute type and multi-language context.
    AddressHistoryRequest:
      type: object
      properties:
        addressLabel:
          description: The predefined label of the address
          $ref: '#/components/schemas/SimpleEnumValue'
        validFrom:
