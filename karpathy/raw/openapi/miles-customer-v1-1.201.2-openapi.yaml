          description: Sorting to be applied on the results list
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindPaymentPreferencesResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - retail_customer
  /retail-customer/current/update-restrictions:
    get:
      summary: Get info and status on update restrictions for the current retail customer
      description: This endpoint retrieves info on all update restrictions that are currently active for the retail customer linked to the authenticated user. If there is an active data change request for the retail customer, it means that the retail customer cannot be updated until the data change request has been handled.
      operationId: getUpdateRestrictionsForCurrentRetailCustomer
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RetailCustomerUpdateRestrictionsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - retail_customer
  /validation-rules/{validation_id}:
    get:
      tags:
        - ValidationRulesResource
      summary: Get validation rules
      description: This endpoint retrieves the validation rules used by the requested validation category.
      operationId: getValidationRules
      parameters:
        - name: validation_id
          in: path
          description: |
            The ID of the validation category.
            - `CREATE_CUSTOMER`: Returns the validation rules that will be used to validate the create customer request.
            - `UPDATE_CUSTOMER`: Returns the validation rules that will be used to validate the update customer request.
          required: true
          schema:
            $ref: '#/components/schemas/ValidationRulesCategory'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationRoot'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
components:
  schemas:
    AddressHistoryResponse:
      type: object
      properties:
        addressHistoryId:
          type: string
          description: The ID of the address history
          example: '45122'
