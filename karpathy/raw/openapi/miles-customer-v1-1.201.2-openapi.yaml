          $ref: '#/components/schemas/AgeUnit'
      description: The age for the operator
    AndCondition:
      type: object
      properties:
        and:
          type: array
          description: The conditions to combine with the AND logical operator, an empty list of conditions evaluates to TRUE
          items:
            allOf: []
            anyOf: []
            oneOf:
              - $ref: '#/components/schemas/Condition'
              - $ref: '#/components/schemas/AndCondition'
              - $ref: '#/components/schemas/OrCondition'
              - $ref: '#/components/schemas/NotCondition'
