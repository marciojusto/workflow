  /suppliers:
    get:
      summary: Find suppliers
      description: This endpoint retrieves suppliers based on a set of filters.
      operationId: findSuppliers
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: Order clause in which the elements will be returned, deprecated since 1.221.0 on 2023-02-22 in favor of a list of sortBy
          deprecated: true
          schema:
            $ref: '#/components/schemas/SortBy'
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: supplier_id
          in: query
          description: The ID(s) of the supplier(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '123456'
        - name: references
          in: query
          description: The references of the supplier(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: Company
        - name: supplier_state_id
          in: query
          description: The ID(s) of the supplier state(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '123458'
        - name: make_id
          in: query
          description: The ID(s) of the make(s) for which the supplier is allowed to perform activities
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '123459'
        - name: leasing_company_id
          in: query
          description: The ID(s) of the leasing company(ies)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '1234510'
        - name: supplier_make_activity_service_type_id
          in: query
          description: The ID(s) of the service type(s) for which the supplier is allowed to perform make-specific activities
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '1234511'
        - name: supplier_make_activity_service_type_group_id
          in: query
          description: The ID(s) of the service type group(s) for which the supplier is allowed to perform make-specific activities
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '1234512'
        - name: supplier_make_activity_type_id
          in: query
          description: The ID(s) of the activity type(s) of the make-specific activities the supplier is allowed to perform
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '123413'
        - name: partner_roles
          in: query
          description: The partner roles of the supplier(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: supplier
        - name: trading_name
          in: query
          description: Wildcard for the trading description
          schema:
            type: string
          example: Company Inc
        - name: reference
          in: query
          description: Wildcard for the reference
          schema:
            type: string
          example: '123456'
        - name: dynamic_attribute_filters
          in: query
          description: The dynamic attributes to filter by
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: 300123|Criterium,400123|123
            x-miles-extra-description:
              Will be ignored when using a search_query: 'true'
        - name: detail_level
          in: query
          description: The detail level of the response. Used to reduce or expand the fields in the response.
          schema:
            type: string
            default: HIGH
            enum:
              - ID_ONLY
              - LOW
              - MEDIUM
              - HIGH
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindSuppliersResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - customer_support
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
            - promotion_manager
            - promotion_user
