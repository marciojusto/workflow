openapi: 3.0.1
info:
  title: miles-supplier
  description: "This service is used to retrieve data about brokers, dealers, suppliers, make activities, documents,\n\t\t\tsendings and their corresponding relations. In the context of retail customers, it is also possible to\n\t\t\tretrieve information on dealerships, which are specific suppliers whose data is made available to retail\n\t\t\tcustomers."
  contact:
    url: https://www.sofico.global
  license:
    name: Sofico
    url: https://www.sofico.global
  version: 1.62.0
  x-milesServiceType: functional
  x-logo:
    url: https://www.sofico.global/sofico.svg
    altText: Sofico logo
paths:
  /m2m/users/sign-ons/{sign_on_id}/broker-contacts:
    get:
      tags:
        - M2MSupplierResource
      summary: Get broker contacts
      description: This endpoint retrieves broker contacts linked to a user based on the sign-on ID of that user.
      operationId: findBrokerContactsForUserM2M
      parameters:
        - name: sign_on_id
          in: path
          description: The sign-on ID of the user
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/M2MFindBrokerContactsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Broker contacts not found
            - User not found
            - Enterprise not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - m2m_relation_management
      x-miles-m2m: true
  /m2m/suppliers:
    get:
      tags:
        - M2MSupplierResource
      summary: Find suppliers
      description: This endpoint retrieves suppliers based on a set of filters.
      operationId: findSuppliersM2M
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: Order clause in which the elements will be returned, deprecated since 1.221.0 on 2023-02-22 in favor of a list of sortBy
          deprecated: true
          schema:
            $ref: '#/components/schemas/SortBy'
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: supplier_id
          in: query
          description: The ID(s) of the supplier(s). Either 'supplier_id' or 'references' must be provided.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '123456'
        - name: references
          in: query
          description: The references of the supplier(s). Either 'supplier_id' or 'references' must be provided.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: Company
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindSuppliersResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - m2m_relation_management
      x-miles-m2m: true
  /m2m/suppliers/{supplier_id}/bank-accounts:
    get:
      tags:
        - M2MSupplierResource
      summary: Get supplier bank accounts
      description: This endpoint retrieves a given supplier's bank accounts by using the supplier ID. It is intended for machine-to-machine integrations.
      operationId: getSupplierBankAccountsForM2M
      parameters:
        - name: supplier_id
          in: path
          description: The ID of the supplier
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/M2MFindBankAccountsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Supplier not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - m2m_relation_management
      x-miles-m2m: true
  /m2m/suppliers/{supplier_id}:
    get:
      tags:
        - M2MSupplierResource
      summary: Get supplier
      description: This endpoint gets a supplier by its ID. It is intended for machine-to-machine integrations.
      operationId: getSupplierForM2M
      parameters:
        - name: supplier_id
          in: path
          description: The ID of the supplier
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/M2MSupplier'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Supplier not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - m2m_relation_management
      x-miles-m2m: true
  /broker-contacts/{broker_contact_id}/activations:
    post:
      summary: Activate the broker contact
      description: This endpoint activates the user of the broker contact by its ID.
      operationId: activateBrokerContact
      parameters:
        - name: broker_contact_id
          in: path
          description: ID of the broker contact
          required: true
          schema:
            type: string
          example: '2147484130'
      responses:
        '204':
          description: The activation of the user was successful
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Broker contact not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: 'Activating the user linked to the broker contact (ID: ''%s'') failed.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - dealer_manager
  /broker-contact/current/password:
    put:
      summary: Change password of authenticated broker contact
      description: This endpoint changes the password of the authenticated broker contact.
      operationId: changePassword
      parameters:
        - name: ignore_warnings
          in: query
          description: If set to true, (interactive) warnings will be ignored.
          schema:
            type: boolean
            default: false
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBrokerContactPasswordRequest'
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Changing the broker password failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - bike_dealer_manager
            - bike_dealer_manager_assistant
  /broker-contacts:
    get:
      summary: Find broker contacts
      description: This endpoint retrieves broker contacts based on a set of filters.
      operationId: findBrokerContacts
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: Order clause in which the elements will be returned, deprecated since 1.221.0 on 2023-02-22 in favor of a list of sortBy
          deprecated: true
          schema:
            $ref: '#/components/schemas/SortBy'
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: broker_contact_id
          in: query
          description: The ID(s) of the broker contact(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '5000001'
        - name: identification
          in: query
          description: Wildcard for the identification
          schema:
            type: string
          example: John doe Inc
        - name: sign_on
          in: query
          description: Wildcard for the sign-on of the broker contact
          schema:
            type: string
          example: '123456'
        - name: supplier_id
          in: query
          description: The ID(s) of the broker supplier(s). Deprecated since 2022-06-20 and version 1.25.0 in favor of broker_company_id
          deprecated: true
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
        - name: broker_company_id
          in: query
          description: The ID(s) of the broker company(ies)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '123456'
        - name: contact_role_id
          in: query
          description: The ID(s) of the contact role(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '123457'
        - name: account_expired
          in: query
          description: Indicates whether the account is expired
          schema:
            type: boolean
        - name: broker_contact_has_left
          in: query
          description: 'Indicates whether broker contacts who have left should be fetched (depending on the leave date) (default: all)'
          schema:
            type: boolean
        - name: official_registration
          in: query
          description: Indicates whether to filter by a list of official registrations of the person
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindBrokerContactsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - customer_support
            - promotion_manager
            - promotion_user
            - bike_dealer_manager
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
    post:
      summary: Create a new broker contact
      description: This endpoint creates a new broker contact.
      operationId: createBrokerContact
      parameters:
        - name: ignore_warnings
          in: query
          description: If set to true, (interactive) warnings will be ignored.
          schema:
            type: boolean
            default: false
      requestBody:
        description: The data needed to create new broker contact.
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateBrokerContactRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokerContact'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Failed to create a new the broker contact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - dealer_manager
  /broker-contacts/{broker_contact_id}/deactivations:
    post:
      summary: Deactivate the broker contact
      description: This endpoint deactivates the user of the broker contact by its ID.
      operationId: deactivateBrokerContact
      parameters:
        - name: broker_contact_id
          in: path
          description: ID of the broker contact
          required: true
          schema:
            type: string
          example: '2147484130'
      responses:
        '204':
          description: The deactivation of the user was successful
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Broker contact not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: 'Deactivating the user linked to the broker contact (ID: ''%s'') failed.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - dealer_manager
  /broker-contacts/{broker_contact_id}:
    get:
      summary: Get broker contact
      description: This endpoint retrieves a broker contact by its ID.
      operationId: getBrokerContact
      parameters:
        - name: broker_contact_id
          in: path
          description: ID of the broker contact
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokerContact'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Broker contact not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - bike_dealer_manager
            - bike_dealer_manager_assistant
    put:
      summary: Update broker contact
      description: This endpoint updates the data of the broker contact by its ID.
      operationId: updateGivenBrokerContact
      parameters:
        - name: broker_contact_id
          in: path
          description: ID of the broker contact
          required: true
          schema:
            type: string
        - name: ignore_warnings
          in: query
          description: If set to true, (interactive) warnings will be ignored.
          schema:
            type: boolean
            default: false
      requestBody:
        description: The information of the broker contact that must be updated
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateGivenBrokerContactRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrokerContact'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Broker contact not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Updating the broker contact information failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
    delete:
      summary: Detach the broker contact
      description: This endpoint detaches the broker contact by its ID. This means that the User and Web User contact roles + link to the user account are removed. The leave date will be set on the contact to today.
      operationId: detachBrokerContact
      parameters:
        - name: broker_contact_id
          in: path
          description: ID of the broker contact
          required: true
          schema:
            type: string
          example: '2147484130'
      responses:
        '204':
          description: The broker contact was successfully detached.
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Broker contact not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: 'Detaching the user linked to the broker contact (ID: ''%s'') failed.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - dealer_manager
  /broker-companies/{broker_company_id}/documents/{document_id}:
    get:
      summary: Download a specific broker company document
      description: This endpoint download a specific document attached to a broker company.
      operationId: downloadBrokerCompanyDocuments
      parameters:
        - name: broker_company_id
          in: path
          description: The ID of the broker company
          required: true
          schema:
            type: string
          example: '123456'
        - name: document_id
          in: path
          description: The ID of the document
          required: true
          schema:
            type: string
          example: '456123'
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - dealer_salesperson
            - dealer_manager
            - broker_salesperson
            - broker_manager
  /broker-companies/{broker_company_id}/documents:
    get:
      summary: Find broker company documents
      description: This endpoint retrieves a list of documents attached to a broker company.
      operationId: findBrokerCompanyDocuments
      parameters:
        - name: broker_company_id
          in: path
          description: The ID of the broker company
          required: true
          schema:
            type: string
          example: '123456'
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: created_from
          in: query
          description: The date after which the document was created. If neither the `created_from` nor `created_to` parameter is provided, a default limit for `created_from` of 30 days less than the current date will be applied.
          schema:
            type: string
            format: date
            example: '2026-01-12'
        - name: created_to
          in: query
          description: The date before which the document was created. If neither the `created_from` nor `created_to` parameter is provided, a default limit for `created_from` of 30 days less than the current date will be applied.
          schema:
            type: string
            format: date
            example: '2026-01-12'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindBrokerCompanyDocumentsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - dealer_salesperson
            - dealer_manager
            - broker_salesperson
            - broker_manager
  /broker-contact/current/broker-company-clusters:
    get:
      summary: Get all broker companies within the dealer cluster of the current broker contact
      description: This endpoint retrieves the broker companies which are part of the current broker contacts' dealer cluster.
      operationId: findCurrentClusterBrokerCompanies
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindCurrentClusterBrokerCompaniesResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
  /suppliers/nearby:
    get:
      summary: Find nearby suppliers
      description: This endpoint retrieves a list of nearby suppliers.
      operationId: findNearbySuppliers
      parameters:
        - name: latitude
          in: query
          description: Latitude of the current position
          required: true
          schema:
            type: number
            format: double
          example: 12
        - name: longitude
          in: query
          description: Longitude of the current position
          required: true
          schema:
            type: number
            format: double
          example: 126
        - name: role_id
          in: query
          description: The ID of the role
          required: true
          schema:
            type: string
          example: '123456'
        - name: make_id
          in: query
          description: The make ID of the vehicle a supplier is entitled to
          schema:
            type: string
          example: '123336'
        - name: radius
          in: query
          description: Radius to search within
          schema:
            type: number
            format: double
            default: 20
          example: 20
        - name: radius_unit
          in: query
          description: The unit for the radius, can be 165 (kilometer) or 166 (miles)
          schema:
            type: string
