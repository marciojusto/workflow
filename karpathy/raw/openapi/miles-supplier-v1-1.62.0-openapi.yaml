components:
  schemas:
    M2MBrokerCompanyReference:
      type: object
      properties:
        brokerCompanyId:
          type: string
          description: The ID of the broker company
          example: '600021'
        reference:
          type: string
          description: The company reference
          example: '15568845'
        tradingName:
          type: string
          description: The company trading name
          example: Company trading name Inc
        externalReference:
          type: string
          description: The external reference
          example: '100002'
      description: A broker company reference
    M2MFindBrokerContact:
      type: object
      properties:
        brokerContactId:
          type: string
          description: The ID of the broker contact
          example: '2147483967'
        identification:
          type: string
          description: The identification of the broker contact
          example: Smith, John
        brokerCompanies:
          type: array
          description: The list of broker company references
          items:
            $ref: '#/components/schemas/M2MBrokerCompanyReference'
      description: Broker contact
    M2MFindBrokerContactsResponse:
      type: object
      properties:
        brokerContacts:
          type: array
          description: The list of broker contacts found
          items:
            $ref: '#/components/schemas/M2MFindBrokerContact'
        defaultLeasingCompany:
          description: The default leasing company of the user
          $ref: '#/components/schemas/M2MLeasingCompanyReference'
    M2MLeasingCompanyReference:
      type: object
      properties:
        leasingCompanyId:
          type: string
          description: The ID of the leasing company
          example: '123456'
        name:
          description: The name of the leasing company
          $ref: '#/components/schemas/MultiLanguageValue'
      description: The default leasing company of the user
    MultiLanguageValue:
      title: MultiLanguageValue
      type: object
      properties:
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '170392'
        translation:
          type: string
          description: The translation of the multi-language ID in human-readable format
          example: Hatchback
      description: Miles API v1 representation of a translated string value.
    ExceptionInfoDTO:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type. This provides human-readable documentation for the problem type when dereferenced.
          example: https://api.sofico.global/problems/microservices/service-unavailable
        title:
          type: string
          description: A short, human-readable summary of the problem type
          example: Service Unavailable
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
          example: The requested service is not available.
        message:
          description: Message objects containing translation information
          $ref: '#/components/schemas/MultiLanguageValue'
        arguments:
          type: array
          description: Additional arguments that provide context for the error
          items:
            type: string
            example: '34898219'
    AbstractValue:
      type: object
      description: An object that contains the actual value
    Address:
      type: object
      properties:
        addressId:
          type: string
          description: The ID of the address
        formattedAddress:
          type: string
          description: The formatted address
        postalCode:
          type: string
          description: Postal Code
        city:
          description: City
          $ref: '#/components/schemas/MultiLanguageValue'
        state:
          description: State
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine1:
          description: Street name
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine1Nr:
          description: Deprecated since 2022-12-12 and version '1.29.0' in favor of 'addressLine1Number'
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine1Number:
          description: House number
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine2:
          description: Street name 2
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine3:
          description: Street name 3
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine4:
          description: Street name 4
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine5:
          description: Street name 5
          $ref: '#/components/schemas/MultiLanguageValue'
        locationIdentification:
          description: The identification of the location
          $ref: '#/components/schemas/MultiLanguageValue'
        country:
          description: Country
          $ref: '#/components/schemas/Country'
        deleted:
          type: boolean
          description: Is deleted
        streetType:
          type: string
          description: The type of the street. This string needs to belong to the `StreetType` enumeration.
          example: street
      description: Address
    ContactAddress:
      type: object
      properties:
        label:
          description: This enum value indicates the label(Primary, Invoice, General....) of the address
          $ref: '#/components/schemas/EnumValue'
        address:
          description: Address
          $ref: '#/components/schemas/Address'
      description: An address
    Country:
      type: object
      properties:
        countryId:
          type: string
          description: The ID of the country
        countryName:
          description: The name of the country
          $ref: '#/components/schemas/MultiLanguageValue'
        countryCodeIso2:
          type: string
          description: The ISO2 code of the country
          example: BE
      description: Country
    DynamicAttributeValue:
      title: DynamicAttributeValue
      type: object
      properties:
        valueType:
          type: integer
          description: |
            Based on this integer the 'value' will consist of a value matching these types: 
             * 1  = MultiLanguageValue 
             * 2  = EnumValue 
             * 3  = MultiCurrencyValue 
             * 4  = DoubleUnitValue 
             * 5  = IntegerUnitValue 
             * 6  = StringValue 
             * 7  = IntegerValue 
             * 8  = DoubleValue 
             * 9  = BooleanValue 
             * 10 = UnnamedValue 
             * 11 = DateValue 
             * 12 = TimeValue 
             * 13 = DateTimeValue 
             * 14 = ZonedDateTimeValue 
             * 15 = LongValue 
          format: int32
          example: 7
        value:
          description: An object that contains the actual value
          $ref: '#/components/schemas/AbstractValue'
        sysRepAttributeId:
          type: string
          description: The Miles back-office application ID that describes the attribute
      description: Miles API v1 representation of a dynamic attribute value.It has a 'valueType' as a discriminator for the actual 'value'.The 'sysRepAttributeId' identifies which attribute value is represented.
    EnumValue:
      title: EnumValue
      type: object
      properties:
        enumId:
          type: string
          description: The enumeration ID
          example: '100002'
        attributeTypeId:
          type: string
          description: ' The ID of the attribute type'
          example: '237'
        enumGroupId:
          type: string
          description: This will be represented as a separate attribute value
          example: '1350'
          deprecated: true
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '24379'
        translation:
          type: string
          description: The translation of the enumeration ID in human-readable format
          example: Request
        enabled:
          type: boolean
          description: Indicates whether this object can still be used
          example: true
      description: Miles API v1 representation of an enum value. It contains additional values representing the attribute type and multi-language context.
    FindSupplier:
      type: object
      properties:
        supplierId:
          type: string
          description: The ID of the supplier
          example: '123456'
        legalName:
          type: string
          description: Legal Name
          example: ACME inc.
        tradingName:
          type: string
          description: Trading Name
          example: ACME
        businessUnitId:
          type: string
          description: The ID of the business unit
          example: '987654'
        reference:
          type: string
          description: Reference
          example: supplierRef
        supplierState:
          description: The supplier state
          $ref: '#/components/schemas/EnumValue'
        leasingCompanies:
          type: array
          description: The list of the leasing companies
          items:
            $ref: '#/components/schemas/LeasingCompany'
          x-Included in response from Detail Level: MEDIUM
        addresses:
          type: array
          description: The list of the contact addresses
          items:
            $ref: '#/components/schemas/ContactAddress'
          x-Included in response from Detail Level: MEDIUM
        roles:
          type: array
          description: List of supplier role IDs
          items:
            $ref: '#/components/schemas/Role'
          x-Included in response from Detail Level: MEDIUM
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: The map of the dynamic attributes
          x-Included in response from Detail Level: MEDIUM
      description: Supplier
    FindSuppliersResponse:
      type: object
