components:
  schemas:
    MultiLanguageValue:
      title: MultiLanguageValue
      type: object
      properties:
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '170392'
        translation:
          type: string
          description: The translation of the multi-language ID in human-readable format
          example: Hatchback
      description: Miles API v1 representation of a translated string value.
    WarningsInfoDTO:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type. This provides human-readable documentation for the problem type when dereferenced.
          example: https://api.sofico.global/warnings/microservices/unprocessable-entity
        title:
          type: string
          description: A short, human-readable summary of the problem type
          example: Unprocessable Entity
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
          example: Unable to process payload due to invalid data.
        messages:
          type: array
          description: An array of message objects containing translation information
          items:
            $ref: '#/components/schemas/MultiLanguageValue'
        arguments:
          type: array
          description: Additional arguments that provide context for the error
          items:
            type: string
            example: '23121434'
        isInteractiveWarning:
          type: boolean
          description: Indicates whether this error requires user interaction
          example: false
    ExceptionInfoDTO:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type. This provides human-readable documentation for the problem type when dereferenced.
          example: https://api.sofico.global/problems/microservices/service-unavailable
        title:
          type: string
          description: A short, human-readable summary of the problem type
          example: Service Unavailable
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
          example: The requested service is not available.
        message:
          description: Message objects containing translation information
          $ref: '#/components/schemas/MultiLanguageValue'
        arguments:
          type: array
          description: Additional arguments that provide context for the error
          items:
            type: string
            example: '34898219'
    AbstractValue:
      type: object
      description: An object that contains the actual value
    AmendmentQuoteReference:
      type: object
      properties:
        amendmentQuoteId:
          type: string
          description: The ID of the amendment quote
          example: '2147483672'
        reference:
          type: string
          description: The reference of the amendment quote
          example: 000927/001
        quoteStatus:
          description: The status of the amendment quote
          $ref: '#/components/schemas/EnumValue'
      description: The amendment quote linked to the credit application. This field will not be returned if the `salesQuote` field is returned.
    ApplicantCreditScoreReference:
      type: object
      properties:
        applicantCreditScoreId:
          type: string
          description: The ID of the applicant credit score
          example: '2147483817'
        applicantType:
          description: The type of the applicant on the applicant credit score
          $ref: '#/components/schemas/ApplicantType'
        customer:
          description: The customer linked to the applicant credit score
          $ref: '#/components/schemas/CustomerReference'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: The dynamic attributes of the applicant credit score
      description: An applicant credit score linked to the credit application
    ApplicantType:
      type: string
      description: The type of the applicant on the applicant credit score
      example: MAIN_APPLICANT
      enum:
        - MAIN_APPLICANT
        - JOINT_APPLICANT
    CreatedCreditApplication:
      type: object
      properties:
        creditApplicationId:
          type: string
          description: The ID of the credit application
          example: '2147483816'
        amendmentQuote:
          description: The amendment quote linked to the credit application. This field will not be returned when the `salesQuote` field is returned.
          $ref: '#/components/schemas/AmendmentQuoteReference'
        salesQuote:
          description: The sales quote linked to the credit application. This field will not be returned when the `amendmentQuote` field is returned.
          $ref: '#/components/schemas/SalesQuoteReference'
        status:
          description: The status of the credit application
          $ref: '#/components/schemas/EnumValue'
        reference:
          type: string
          description: The reference of the credit application
          example: '2147483816'
        applicantCreditScores:
          type: array
          description: The list of applicant credit scores linked to the credit application
          items:
            $ref: '#/components/schemas/ApplicantCreditScoreReference'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: The dynamic attributes of the credit application
    CustomerReference:
      type: object
      properties:
        customerId:
          type: string
          description: The ID of the customer
          example: '600364'
        legalName:
          type: string
          description: The legal name of the customer
          example: Sofico Lease
        tradingName:
          type: string
          description: The trading name of the customer
          example: Sofico Lease
        legalEntity:
          description: The legal entity of the customer
          $ref: '#/components/schemas/EnumValue'
        officialRegistration:
          type: string
          description: The official registration of the customer
          example: '123456789'
      description: The main customer for which the credit application has been created
    DynamicAttributeValue:
      title: DynamicAttributeValue
      type: object
      properties:
        valueType:
          type: integer
          description: |
            Based on this integer the 'value' will consist of a value matching these types: 
             * 1  = MultiLanguageValue 
             * 2  = EnumValue 
             * 3  = MultiCurrencyValue 
             * 4  = DoubleUnitValue 
             * 5  = IntegerUnitValue 
             * 6  = StringValue 
             * 7  = IntegerValue 
             * 8  = DoubleValue 
             * 9  = BooleanValue 
             * 10 = UnnamedValue 
             * 11 = DateValue 
             * 12 = TimeValue 
             * 13 = DateTimeValue 
             * 14 = ZonedDateTimeValue 
             * 15 = LongValue 
          format: int32
          example: 7
        value:
          description: An object that contains the actual value
          $ref: '#/components/schemas/AbstractValue'
        sysRepAttributeId:
          type: string
          description: The Miles back-office application ID that describes the attribute
      description: Miles API v1 representation of a dynamic attribute value.It has a 'valueType' as a discriminator for the actual 'value'.The 'sysRepAttributeId' identifies which attribute value is represented.
    EnumValue:
      title: EnumValue
      type: object
      properties:
        enumId:
          type: string
          description: The enumeration ID
          example: '100002'
        attributeTypeId:
          type: string
          description: ' The ID of the attribute type'
          example: '237'
        enumGroupId:
          type: string
          description: This will be represented as a separate attribute value
          example: '1350'
          deprecated: true
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '24379'
        translation:
          type: string
          description: The translation of the enumeration ID in human-readable format
          example: Request
        enabled:
          type: boolean
          description: Indicates whether this object can still be used
          example: true
      description: Miles API v1 representation of an enum value. It contains additional values representing the attribute type and multi-language context.
    SalesQuoteReference:
      type: object
      properties:
        salesQuoteId:
          type: string
          description: The ID of the sales quote
          example: '2147483672'
        reference:
          type: string
          description: The reference of the sales quote
          example: 000927/001
        quoteStatus:
          description: The status of the sales quote
          $ref: '#/components/schemas/EnumValue'
      description: The sales quote linked to the credit application. This field will not be returned if the `amendmentQuote` field is returned.
    CreateCreditApplicationRequest:
      required:
        - salesQuoteId
      type: object
      properties:
        salesQuoteId:
          minLength: 1
          type: string
          description: The ID of the sales quote for which a credit application should be created
          example: '2147483672'
    FindDocumentResponse:
      type: object
      properties:
        documents:
          type: array
          description: The list of attached documents of a credit application
          items:
            $ref: '#/components/schemas/FindStipulationDocument'
        totalCount:
          type: integer
          description: Number of retrieved documents
          format: int64
    FindStipulationDocument:
      type: object
      properties:
        stipulationId:
          type: string
          description: The ID of the stipulation
          example: '2147484539'
        documentId:
          type: string
          description: The ID of the document
          example: '2147484530'
        fileType:
          type: string
          description: The type of the document
          example: pdf
        creationDate:
          type: string
          description: The creation date of the document
          format: date
          example: '2026-04-16'
        name:
          description: The name of the document
          $ref: '#/components/schemas/MultiLanguageValue'
        description:
          description: A short description of the document
          $ref: '#/components/schemas/MultiLanguageValue'
        documentStatus:
          description: The status of the document
          $ref: '#/components/schemas/EnumValue'
      description: A document attached to the stipulation
    FindStipulation:
      type: object
      properties:
        stipulationId:
          type: string
          description: The ID of the stipulation
          example: '2147484539'
        stipulationStatus:
          description: The status of the stipulation
          $ref: '#/components/schemas/EnumValue'
        stipulationType:
          description: The type of the stipulation
          $ref: '#/components/schemas/EnumValue'
        name:
          type: string
          description: The name of the stipulation
        stipulationTypeDefinition:
          description: The stipulation type definition
          $ref: '#/components/schemas/StipulationTypeDefinition'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: The dynamic attributes of the stipulation object
      description: A stipulation
    FindStipulationsResponse:
      type: object
      properties:
        stipulations:
          type: array
          description: The paginated list of stipulations
          items:
            $ref: '#/components/schemas/FindStipulation'
        totalCount:
          type: integer
          description: Number of stipulations that qualify for the filters
          format: int64
          example: 25
    StipulationTypeDefinition:
      type: object
      properties:
        typeDefinitionId:
          type: string
          description: The ID of the stipulation type definition
          example: '128568'
        name:
          description: The name of the stipulation type definition
          $ref: '#/components/schemas/MultiLanguageValue'
      description: The stipulation type definition
    BrokerContactReference:
      type: object
      properties:
        brokerContactId:
          type: string
          description: The ID of the broker contact
          example: '600278'
        identification:
          type: string
          description: The identification of the broker contact
          example: Smith, John
      description: The broker contact on the sales quote or the amendment quote linked to the credit application
    ContractReference:
      type: object
      properties:
        contractId:
          type: string
          description: The ID of the contract
          example: '100001'
        reference:
          type: string
          description: The reference of the contract
          example: LT_100001
        status:
          description: The status of the contract
          $ref: '#/components/schemas/ContractStatus'
      description: The contract linked to the credit application
    ContractStatus:
      type: object
      properties:
        id:
          type: string
        description:
          type: string
      description: The status of the contract
    CreditApplicationDecision:
      type: object
      properties:
        id:
          type: string
          description: The credit application decision ID
          example: '100022'
        description:
          type: string
          description: The credit application decision description
          example: Accepted
      description: The credit scoring decision of the credit application
    CreditApplicationPhase:
      type: object
      properties:
        id:
          type: string
          description: The ID of the credit application phase
          example: draft
        description:
          type: string
          description: The description of the credit application phase
          example: draft
      description: The phase of the credit application
    CreditDecision:
      type: object
      properties:
        decision:
          description: The credit scoring decision of the credit application
          $ref: '#/components/schemas/CreditApplicationDecision'
        date:
          type: string
          description: The date the decision was taken for the credit application
          format: date
          example: '2026-04-16'
        expiryDate:
          type: string
          description: The date on which the credit application expires, after the credit score decision has been retrieved
          format: date
          example: '2026-04-16'
      description: The credit decision taken for the credit application
    FindCreditApplication:
      type: object
      properties:
        creditApplicationId:
          type: string
          description: The ID of the credit application
          example: '2147483816'
        reference:
          type: string
          description: The reference of the credit application
          example: '2147483816'
        amendmentQuote:
          description: The amendment quote linked to the credit application. This field will not be returned if the `salesQuote` field is returned.
          $ref: '#/components/schemas/AmendmentQuoteReference'
        salesQuote:
          description: The sales quote linked to the credit application. This field will not be returned if the `amendmentQuote` field is returned.
          $ref: '#/components/schemas/SalesQuoteReference'
        brokerContact:
          description: The broker contact on the sales quote or the amendment quote linked to the credit application
          $ref: '#/components/schemas/BrokerContactReference'
        status:
          description: The status of the credit application
          $ref: '#/components/schemas/EnumValue'
        decision:
          description: The decision taken for the credit application. Deprecated since 2026-03-31 and version '1.72.0' in favor of 'creditDecision.decision'.
          $ref: '#/components/schemas/EnumValue'
        phase:
          description: The phase of the credit application
          $ref: '#/components/schemas/CreditApplicationPhase'
        expiryDate:
          type: string
          description: The date on which the credit application expires, before the credit score decision has been retrieved
          format: date
          example: '2026-04-16'
        creditDecisionExpiryDate:
          type: string
          description: The date on which the credit application expires, after the credit score decision has been retrieved. Deprecated since 2026-03-31 and version '1.72.0' in favor of 'creditDecision.expiryDate'.
          format: date
          deprecated: true
          example: '2026-04-16'
        creditDecision:
          description: The credit decision taken for the credit application
          $ref: '#/components/schemas/CreditDecision'
        externalComment:
          type: string
          description: The external comment of the credit application
          example: Copy of E-ID required
        vehicleDescription:
          description: The description of the vehicle for which the credit application is created
          $ref: '#/components/schemas/MultiLanguageValue'
        mainCustomer:
          description: The main customer for which the credit application has been created
          $ref: '#/components/schemas/CustomerReference'
        contractReference:
          description: The contract linked to the credit application
          $ref: '#/components/schemas/ContractReference'
        conversations:
          description: The conversations associated with the credit application
          $ref: '#/components/schemas/FindCreditApplicationConversationResponse'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: The dynamic attributes of the credit application
      description: A credit application
    FindCreditApplicationConversation:
      type: object
      properties:
        conversationId:
          type: string
          description: The ID of the conversation
          example: 05f72eef-4615-4c78-a7d7-d5a9d8e6dfe8
        title:
          type: string
          description: The title of the conversation
          example: Waiting for booking approval
        lastMessageTimestamp:
          type: string
          description: The date and time of the last message
          format: date-time
          example: '2026-04-16T14:03:19.067Z'
        lastMessageUserType:
          description: The last message user type
          $ref: '#/components/schemas/ParticipantType'
        unreadMessages:
          type: integer
          description: The number of unread messages in the conversation
          format: int32
          example: 5
        isSeenByCurrentUser:
          type: boolean
          description: Indicates whether the conversation is seen by the current user
          example: true
      description: The conversation
    FindCreditApplicationConversationResponse:
      type: object
      properties:
        conversations:
          type: array
          description: A list of conversations
          items:
            $ref: '#/components/schemas/FindCreditApplicationConversation'
        totalCount:
          type: integer
          description: The number of conversations in the response
          format: int64
          example: 10
      description: The conversations associated with the credit application
    FindCreditApplicationsResponse:
      type: object
      properties:
        creditApplications:
          type: array
          description: The paginated list of credit applications
          items:
            $ref: '#/components/schemas/FindCreditApplication'
        totalCount:
          type: integer
          description: Number of credit applications that qualify for the filters
          format: int64
          example: 25
    ParticipantType:
      type: string
      description: The participant type
      enum:
        - BACK_OFFICE
        - FRONT_OFFICE
    Address:
      type: object
      properties:
        addressId:
          type: string
          description: The address ID
          example: '23287213'
        addressLine1:
          description: The first address line
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine1Number:
          description: The number of the first address line
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine2:
          description: The second address line
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine3:
          description: The third address line
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine4:
          description: The fourth address line
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine5:
          description: The fifth address line
          $ref: '#/components/schemas/MultiLanguageValue'
        postalCode:
          type: string
          description: The postal code of the address
          example: '9000'
        city:
          description: The city of the address
          $ref: '#/components/schemas/MultiLanguageValue'
        country:
          description: The country of the address
          $ref: '#/components/schemas/CountryReference'
        formattedAddress:
          type: string
          description: The formatted address
          example: Leasingweg 1 1000 AA AMSTERDAM
        state:
          description: The state of the address
          $ref: '#/components/schemas/MultiLanguageValue'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: A map of dynamic attributes
      description: The address itself
    AddressHistory:
      type: object
      properties:
        addressLine1:
          type: string
          description: The first address line
          example: Poel
        addressLine1Number:
          type: string
          description: The number of the first address line
          example: '5'
        addressLine2:
          type: string
          description: The second address line
          example: Poel
        addressLine3:
          type: string
          description: The third address line
          example: Poel
        addressLine4:
          type: string
          description: The fourth address line
          example: Poel
        addressLine5:
          type: string
          description: The fifth address line
          example: Poel
        city:
          type: string
          description: The city of the address
          example: Gent
        postalCode:
          type: string
          description: The postal code of the address
          example: '9000'
        state:
          type: string
          description: The state of the address
          example: Oost-Vlaanderen
        country:
          description: The country of the employer employing the customer
          $ref: '#/components/schemas/CountryReference'
        formattedAddress:
          type: string
          description: The formatted address
          example: Leasingweg 1 1000 AA AMSTERDAM
        addressId:
          type: string
          description: The ID of the address
          example: '2147483672'
        validFrom:
          type: string
          description: The date on which the customer started living at this address
          format: date
          example: '2026-04-16'
        validTo:
          type: string
          description: The date to which the customer lived at this address
          format: date
          example: '2026-04-16'
      description: An address history record
    ApplicantCreditScore:
      type: object
      properties:
        applicantCreditScoreId:
          type: string
          description: The ID of the applicant credit score
          example: '2147483817'
        applicantType:
          description: The type of the applicant on the applicant credit score
          $ref: '#/components/schemas/ApplicantType'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: The dynamic attributes of the applicant credit score
        applicantInformation:
          description: The applicant information of the applicant credit score
          $ref: '#/components/schemas/ApplicantInformation'
    ApplicantInformation:
      type: object
      properties:
        employmentInfos:
          type: array
          description: The list of employment information of the customer linked to the applicant credit score
          items:
            $ref: '#/components/schemas/EmploymentInfo'
        financialInfo:
          description: The financial information of the customer linked to the applicant credit score
          $ref: '#/components/schemas/FinancialInfo'
        loanInfos:
          type: array
          description: The list of loan information of the customer linked to the applicant credit score
          items:
            $ref: '#/components/schemas/LoanInfo'
        addressHistory:
          type: array
          description: The address history of the customer linked to the applicant credit score
          items:
            $ref: '#/components/schemas/AddressHistory'
        customer:
          description: The customer linked to the applicant credit score
          $ref: '#/components/schemas/Customer'
      description: The applicant information of the applicant credit score
    ContactAddress:
      type: object
      properties:
        label:
          description: The label of the contact address
          $ref: '#/components/schemas/EnumValue'
        address:
          description: The address itself
          $ref: '#/components/schemas/Address'
      description: Customer contact address
    CountryReference:
      type: object
      properties:
        countryId:
          type: string
          description: The ID of the country
          example: '19'
        countryCodeIso2:
          type: string
          description: The ISO3166-1 alpha-2 code of the country
          example: BE
        countryCodeIso3:
          type: string
          description: The ISO3166-1 alpha-3 code of the country
          example: BEL
        countryName:
          description: The human-readable name of the country
          $ref: '#/components/schemas/MultiLanguageValue'
      description: The country of the address
    Customer:
      type: object
      properties:
        customerId:
          type: string
          description: The ID of the customer
          example: '41199698'
        tradingName:
          type: string
          description: The trading name
          example: John Doe Inc
        legalName:
          type: string
          description: The legal name of the customer
          example: Sofico Lease
        officialRegistration:
          type: string
          description: The official registration of the customer
          example: 404.484.060
        vatNumber:
          type: string
          description: The VAT number of the customer
          example: '41199698'
        establishmentDate:
          type: string
          description: Establishment date
          format: date
          example: '2026-04-16'
        reference:
          type: string
          description: Additional customer reference. Typically used for mapping to other systems.
          example: '100000008'
        legalEntity:
          description: Legal entity
          $ref: '#/components/schemas/EnumValue'
        taxLiability:
          description: Tax liability
          $ref: '#/components/schemas/EnumValue'
        customerState:
          description: The state of the customer
          $ref: '#/components/schemas/EnumValue'
        individualPerson:
          description: Individual person of customer
          $ref: '#/components/schemas/IndividualPerson'
        phoneNumbers:
          type: array
          description: A list of phone numbers
          items:
            $ref: '#/components/schemas/PhoneNumber'
        addresses:
          type: array
          description: A list of customer contact addresses
          items:
            $ref: '#/components/schemas/ContactAddress'
        internetReferences:
          type: array
          description: A list of internet references
          items:
            $ref: '#/components/schemas/InternetReference'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: A map of dynamic attributes
        sectorCode:
          description: Sector code information
          $ref: '#/components/schemas/SectorCode'
      description: The customer linked to the applicant credit score
    Employer:
      type: object
      properties:
        name:
          type: string
          description: The name of the employer employing the customer
          example: Sofico
        phoneNumber:
          type: string
          description: The phone number of the employer employing the customer
          example: '03214567890'
        address:
          description: The address details of the employer
          $ref: '#/components/schemas/EmployerAddress'
      description: The information related to the employer
    EmployerAddress:
      type: object
      properties:
        addressLine1:
          type: string
          description: The first address line
          example: Poel
        addressLine1Number:
          type: string
          description: The number of the first address line
          example: '5'
        addressLine2:
          type: string
          description: The second address line
          example: Poel
        addressLine3:
          type: string
          description: The third address line
          example: Poel
        addressLine4:
          type: string
          description: The fourth address line
          example: Poel
        addressLine5:
          type: string
          description: The fifth address line
          example: Poel
        city:
          type: string
          description: The city of the address
          example: Gent
        postalCode:
          type: string
          description: The postal code of the address
          example: '9000'
        state:
          type: string
          description: The state of the address
          example: Oost-Vlaanderen
        country:
          description: The country of the employer employing the customer
          $ref: '#/components/schemas/CountryReference'
        formattedAddress:
          type: string
          description: The formatted address
          example: Leasingweg 1 1000 AA AMSTERDAM
      description: The address details of the employer
    EmploymentHistory:
      type: object
      properties:
        employmentHistoryId:
          type: string
          description: The ID of the employment history
          example: '100099'
        jobTitle:
          type: string
          description: The job title of the employee
          example: Developer
        employer:
          type: string
          description: The employer name
          example: Sofico
        occupation:
          description: The occupation
          $ref: '#/components/schemas/SimpleEnumValue'
        validFrom:
          type: string
          description: The employment history is valid within a range starting with this date
          format: date
          example: '2026-04-16'
        validTo:
          type: string
          description: The employment history is valid within a range ending with this date, specified date included
          format: date
          example: '2026-04-16'
        country:
          description: The country of the employment history
          $ref: '#/components/schemas/CountryReference'
        sectorCode:
          description: Sector code information
          $ref: '#/components/schemas/SectorCode'
