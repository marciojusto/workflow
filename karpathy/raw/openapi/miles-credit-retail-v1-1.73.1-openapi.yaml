          description: The decision of the credit application
          $ref: '#/components/schemas/CreditApplicationDecision'
        returnDate:
          type: string
          description: The date when the feedback from the internal or external credit insurer was received
          format: date
          example: '2026-04-16'
        creditDecisionExpiryDate:
          type: string
          description: Date to define the validity period of the credit limit, specified date included
          format: date
          example: '2026-04-16'
        conditionReason:
          type: string
          description: Together with the `decision` attribute, this represents the answer code from the credit department or external credit insurance company. If the decision is accepted, it specifies any conditions that must be met for the credit request to be approved. If the decision is refused, it provides the reason for the refusal.
