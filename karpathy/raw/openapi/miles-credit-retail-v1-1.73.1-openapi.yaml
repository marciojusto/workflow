openapi: 3.0.1
info:
  title: miles-credit-retail
  description: "This functional service supports the creation and follow-up of **credit applications**.\n\t\t\tFor more information, check the **Read Me** tab."
  contact:
    url: https://www.sofico.global
  license:
    name: Sofico
    url: https://www.sofico.global
  version: 1.73.1
  x-milesServiceType: functional
  x-logo:
    url: https://www.sofico.global/sofico.svg
    altText: Sofico logo
tags:
  - name: CreditApplicationResource
    description: This resource contains the endpoints related to the manipulation of credit applications.
    x-displayName: Credit applications
  - name: CreditUnderwritingDecisionResource
    description: This resource contains the endpoints to determine whether credit underwriting is required for a sales quote.
    x-displayName: Credit underwriting required decisions
  - name: EnumerationResource
    description: This resource contains the endpoints related to the retrieval of enumerations.
    x-displayName: Enumerations
  - name: M2MBrokerCompaniesResource
    description: This resource contains the endpoints to perform credit line checks for broker companies and their parent broker companies.
    x-displayName: Broker Credit Line Checks
  - name: M2MCreditApplicationResource
    description: This resource contains the endpoints related to the management of credit applications and their related data.
    x-displayName: Credit applications
  - name: ValidationRulesResource
    description: This resource contains the endpoints related to validation rules.
    x-displayName: Validation rules
  - name: model_credit_application_root
    description: <SchemaDefinition schemaRef="#/components/schemas/CreditApplicationModelRoot" />
    x-displayName: Credit application model
paths:
  /credit-applications/{credit_application_id}/cancellations:
    post:
      tags:
        - CreditApplicationResource
      summary: Cancel credit application
      description: This endpoint cancels a credit application based on its ID.
      operationId: cancelCreditApplication
      parameters:
        - name: credit_application_id
          in: path
          description: The ID of the credit application
          required: true
          schema:
            type: string
          example: '2147483816'
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Failed to cancel the credit application.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
            - retail_customer
  /credit-applications:
    get:
      tags:
        - CreditApplicationResource
      summary: Find credit applications
      description: This endpoint retrieves a filtered list of credit applications.
      operationId: findCreditApplications
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: credit_application_id
          in: query
          description: The IDs of the credit applications to filter by
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '1005214'
        - name: sales_quote_id
          in: query
          description: |
            The IDs of sales quotes by which the linked credit applications need to be filtered.
            This query parameter can be used in parallel with the `amendment_quote_id` query parameter,
            such that you are able to find credit applications linked to both specific sales quotes and amendment quotes.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '2147483672'
        - name: amendment_quote_id
          in: query
          description: |
            The IDs of amendment quotes by which the linked credit applications need to be filtered.
            This query parameter can be used in parallel with the `sales_quote_id` query parameter,
            such that you are able to find credit applications linked to both specific sales quotes and amendment quotes.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
          example: '2147483672'
        - name: credit_application_status
          in: query
          description: The IDs of the possible credit application statuses
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '1830'
        - name: broker_company_id
          in: query
          description: The IDs of the broker companies of which the credit applications should be retrieved
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '53030'
        - name: customer_id
          in: query
          description: The IDs of the customers linked to the active credit applications to filter by
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '500353'
        - name: broker_contact_id
          in: query
          description: The IDs of the broker contacts of which the credit applications should be retrieved
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '600278'
        - name: excluded_contract_status
          in: query
          description: The IDs of the contract status for which the credit applications should not be retrieved. This parameter will only be taken into account if the credit application has an associated contract and the contract is in the given 'excluded' status.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '566'
        - name: excluded_contract_status_group
          in: query
          description: The IDs of the contract status group for which the credit applications should not be retrieved. This parameter will only be taken into account if the credit application has an associated contract and the contract is in the given 'excluded' group.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '1094'
        - name: phase
          in: query
          description: The phases for which credit applications should be retrieved
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: draft
        - name: include_conversation_info
          in: query
          description: Indicates whether conversation information should be included. The Miles chat feature must be included in your Miles Enterprise license to use this parameter.
          schema:
            type: boolean
            default: false
          example: true
        - name: search_query
          in: query
          description: NOTICE THIS WILL ONLY WORK FOR POSTGRES ODS By filling in this property, you can do a back-end search
          schema:
            minimum: 2
            maxLength: 2147483647
            minLength: 2
            type: string
          example: A000927/
          x-miles-search:
            tradingName: The trading name of the customer linked to the credit application
            reference: The reference of the sales or amendment quote
            officialRegistration: The official registration of the customer linked to the credit application
            description: The description of the vehicle linked to the credit application
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindCreditApplicationsResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
            - retail_customer
    post:
      tags:
        - CreditApplicationResource
      summary: Create credit application
      description: This endpoint creates a credit application.
      operationId: createCreditApplication
      requestBody:
        description: 'The information needed to create a credit application:'
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCreditApplicationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatedCreditApplication'
        '400':
          description: The sales quote ID must not be null.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Sales quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Failed to create the credit application.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
            - retail_customer
  /credit-applications/{credit_application_id}/applicant-credit-scores/{applicant_credit_score_id}/stipulations/{stipulation_id}/documents/{document_id}:
    get:
      tags:
        - CreditApplicationResource
      summary: Download applicant credit score stipulation document
      description: This endpoint downloads a document attached to a stipulation of an applicant credit score.
      operationId: downloadApplicantCreditScoreStipulationDocument
      parameters:
        - name: credit_application_id
          in: path
          description: The ID of the credit application
          required: true
          schema:
            type: string
          example: '2147483816'
        - name: applicant_credit_score_id
          in: path
          description: The ID of the applicant credit score
          required: true
          schema:
            type: string
          example: '2147483817'
        - name: stipulation_id
          in: path
          description: The ID of the stipulation
          required: true
          schema:
            type: string
          example: '2147484539'
        - name: document_id
          in: path
          description: The ID of the document
          required: true
          schema:
            type: string
          example: '2147484540'
      responses:
        '200':
          description: Response is a download
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
          x-isResponseFile: 'true'
        '401':
          description: Unauthorized
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Credit application not found
            - Applicant credit score not found
            - Stipulation not found
            - Stipulation document not found
          content:
            application/octet-stream:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - broker_manager
            - broker_salesperson
            - dealer_manager
            - dealer_salesperson
            - retail_customer
    delete:
      tags:
        - CreditApplicationResource
      summary: Delete applicant credit score stipulation document
