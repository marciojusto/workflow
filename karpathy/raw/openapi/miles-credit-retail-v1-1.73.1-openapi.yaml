      type: object
      properties:
        creditApplicationId:
          type: string
          description: The ID of the credit application
          example: '2147483917'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: The dynamic attributes of the credit application
        externalReference:
          type: string
          description: The reference used by the external credit insurance company
          example: EXT-REF-12345
