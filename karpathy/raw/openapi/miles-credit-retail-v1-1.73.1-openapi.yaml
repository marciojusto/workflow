          type: array
          description: A list of service choice IDs that uses this qualifier setting
          items:
            type: string
            description: The ID of a service choice that uses this qualifier setting
            example: '100344'
        value:
          type: string
          description: The value
          example: '0.025'
        dataType:
          type: string
          description: The kind of data type
          example: Enum
        defaultValue:
          type: string
          description: The default value of the qualifier setting
          example: '8'
        minValue:
          type: number
          description: The minimum value of the qualifier setting
          format: double
          example: 4
        maxValue:
          type: number
          description: The maximum value of the qualifier setting
          format: double
          example: 12
        isRequired:
          type: boolean
          description: Indicates whether the qualifier setting is required
          default: false
        choices:
          type: array
          description: A list of qualifier setting choices
          items:
            $ref: '#/components/schemas/QualifierSettingChoice'
      description: A qualifier setting of the service
    QualifierSettingChoice:
      type: object
      properties:
        qualifierSettingChoiceId:
          type: string
          description: The ID of the qualifier setting choice
          example: '100513'
        label:
          description: The label of the qualifier setting choice
          $ref: '#/components/schemas/MultiLanguageValue'
        isSelected:
          type: boolean
          description: Indicates whether the qualifier setting choice is selected
          example: false
      description: A qualifier setting choice
    QualifierValue:
      title: QualifierValue
      type: object
      properties:
        valueType:
          type: integer
          description: |
            Based on this integer, the 'value' will consist of a value matching one of these types:
             * 1  = MultiLanguageValue
             * 2  = EnumValue
             * 3  = MultiCurrencyValue
             * 4  = DoubleUnitValue
             * 5  = IntegerUnitValue
             * 6  = StringValue
             * 7  = IntegerValue
             * 8  = DoubleValue
             * 9  = BooleanValue
             * 10 = UnnamedValue
             * 11 = DateValue
             * 12 = TimeValue
             * 13 = DateTimeValue
             * 14 = ZonedDateTimeValue
             * 15 = LongValue
          format: int32
          example: 9
        value:
          description: An object that contains the actual value
          $ref: '#/components/schemas/AbstractValue'
        name:
          type: string
          description: The name of the qualifier value
          example: Insured yes/no
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '170392'
        qualifierType:
          type: string
          description: The type of the qualifier
          example: '5'
        translation:
          type: string
      description: Miles API v1 representation of a qualifier value.
