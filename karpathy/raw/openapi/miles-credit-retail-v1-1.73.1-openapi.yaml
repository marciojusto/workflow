            type: string
          example: '2147483817'
        - name: stipulation_id
          in: path
          description: The ID of the stipulation
          required: true
          schema:
            type: string
          example: '2147484539'
        - name: document_id
          in: path
          description: The ID of the document
          required: true
          schema:
            type: string
          example: '2147484540'
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - Credit application not found
            - Applicant credit score not found
            - Stipulation not found
            - Stipulation document not found
          content:
