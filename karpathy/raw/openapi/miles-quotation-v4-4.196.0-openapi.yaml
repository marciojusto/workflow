components:
  schemas:
    FindWebQuoteEscalationReasonsResponse:
      type: object
      properties:
        quoteEscalationReasons:
          type: array
          description: The list of quote escalation reason values
          items:
            $ref: '#/components/schemas/WebQuoteEscalationReason'
    WebQuoteEscalationReason:
      type: object
      properties:
        id:
          type: string
          description: The web quote escalation ID
          example: '100001'
        description:
          type: string
          description: The web quote escalation description
          example: Upgrade accessories
      description: A quote escalation reason
    ExceptionInfoDTO:
      type: object
      properties:
        type:
          type: string
          description: A URI reference that identifies the problem type. This provides human-readable documentation for the problem type when dereferenced.
          example: https://api.sofico.global/problems/microservices/service-unavailable
        title:
          type: string
          description: A short, human-readable summary of the problem type
          example: Service Unavailable
        detail:
          type: string
          description: A human-readable explanation specific to this occurrence of the problem
          example: The requested service is not available.
        message:
          description: Message objects containing translation information
          $ref: '#/components/schemas/MultiLanguageValue'
        arguments:
          type: array
          description: Additional arguments that provide context for the error
          items:
            type: string
            example: '34898219'
    MultiLanguageValue:
      title: MultiLanguageValue
      type: object
      properties:
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '170392'
        translation:
          type: string
          description: The translation of the multi-language ID in human-readable format
          example: Hatchback
      description: Miles API v1 representation of a translated string value.
    EnumValue:
      title: EnumValue
      type: object
      properties:
        enumId:
          type: string
          description: The enumeration ID
          example: '100002'
        attributeTypeId:
          type: string
          description: ' The ID of the attribute type'
          example: '237'
        enumGroupId:
          type: string
          description: This will be represented as a separate attribute value
          example: '1350'
          deprecated: true
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '24379'
        translation:
          type: string
          description: The translation of the enumeration ID in human-readable format
          example: Request
        enabled:
          type: boolean
          description: Indicates whether this object can still be used
          example: true
      description: Miles API v1 representation of an enum value. It contains additional values representing the attribute type and multi-language context.
    FindEnumerationsResponse:
      type: object
      properties:
        enumerations:
          type: array
          description: The list of enumeration values
          items:
            $ref: '#/components/schemas/EnumValue'
    AbstractValue:
      type: object
      description: An object that contains the actual value
    DynamicAttributeValue:
      title: DynamicAttributeValue
      type: object
      properties:
        valueType:
          type: integer
          description: |
            Based on this integer the 'value' will consist of a value matching these types: 
             * 1  = MultiLanguageValue 
             * 2  = EnumValue 
             * 3  = MultiCurrencyValue 
             * 4  = DoubleUnitValue 
             * 5  = IntegerUnitValue 
             * 6  = StringValue 
             * 7  = IntegerValue 
             * 8  = DoubleValue 
             * 9  = BooleanValue 
             * 10 = UnnamedValue 
             * 11 = DateValue 
             * 12 = TimeValue 
             * 13 = DateTimeValue 
             * 14 = ZonedDateTimeValue 
             * 15 = LongValue 
          format: int32
          example: 7
        value:
          description: An object that contains the actual value
          $ref: '#/components/schemas/AbstractValue'
        sysRepAttributeId:
          type: string
          description: The Miles back-office application ID that describes the attribute
      description: Miles API v1 representation of a dynamic attribute value.It has a 'valueType' as a discriminator for the actual 'value'.The 'sysRepAttributeId' identifies which attribute value is represented.
    ForeignCurrencyValue:
      title: ForeignCurrencyValue
      type: object
      properties:
        value:
          type: number
          description: The value that holds the currency amount
          format: double
          example: 25.56
        currency:
          type: string
          description: The ISO code of the currency
          example: USD
      description: Miles API v1 representation of a foreign currency value.
    M2MGetSalesQuoteLeaseServicePriceDetailsResponse:
      type: object
      properties:
        salesQuoteId:
          type: string
          description: The ID of the sales quote
          example: '2170284'
        productId:
          type: string
          description: The ID of the sales quote product
          example: '120023'
        services:
          type: array
          description: A list of sales quote services
          items:
            $ref: '#/components/schemas/M2MSalesQuoteService'
    M2MSalesQuoteService:
      type: object
      properties:
        serviceId:
          type: string
          description: The ID of the quote service
          example: '1200023'
        productTypeComponentId:
          type: string
          description: The ID of the quote product type component
          example: '400343'
        name:
          description: The name of the service
          $ref: '#/components/schemas/MultiLanguageValue'
        leasePrice:
          description: The lease price of the service
          $ref: '#/components/schemas/MultiCurrencyValue'
        leaseVat:
          description: The lease VAT amount of the service
          $ref: '#/components/schemas/MultiCurrencyValue'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: A map of dynamic attributes
      description: Sales quote service
    MultiCurrencyValue:
      title: MultiCurrencyValue
      type: object
      properties:
        value:
          type: number
          description: The value that holds the currency amount
          format: double
          example: 25.56
        currencyValue:
          type: number
          description: The currency amount in a different currency. Deprecated since 2025-07-10 and version '3.5.0' in favor of 'foreignCurrency'.
          format: double
          example: 27.56
          deprecated: true
        currencyId:
          type: string
          description: The ID of the currency. Deprecated since 2025-07-10 and version '3.5.0' in favor of 'foreignCurrency'.
          example: '2'
          deprecated: true
        currency:
          type: string
          description: The ISO code of the reference currency
          example: EUR
        foreignCurrency:
          description: Foreign currency information
          $ref: '#/components/schemas/ForeignCurrencyValue'
      description: Miles API v1 representation of a currency value.
    ContractBudgetAllocation:
      type: object
      properties:
        contractId:
          type: string
          description: The contract ID
          example: '2147484225'
        reference:
          type: string
          description: The reference of the contract
          example: '006831'
        expectedEndDate:
          type: string
          description: The expected end date
          format: date
          example: '2026-04-07'
        licensePlate:
          type: string
          description: The license plate of the car
          example: 1-AAA-003
        makeName:
          description: The name of the make of the car
          $ref: '#/components/schemas/MultiLanguageValue'
        modelName:
          description: The name of the model of the car
          $ref: '#/components/schemas/MultiLanguageValue'
      description: Contract that is using this mobility plan part
    MobilityPlanAllocation:
      type: object
      properties:
        mobilityPlanId:
          type: string
          description: ID of the mobility plan
          example: 4623b852-7b47-46cf-90cf-f7718b81f8fc
        name:
          type: string
          description: The name of the mobility plan
          example: Every thing can happen plan
        description:
          type: string
          description: Description for the mobility plan
          example: BMW for consultants
        mobilityBudgetUnit:
          description: Kind of mobility budget unit
          $ref: '#/components/schemas/EnumValue'
        leasePriceVisibility:
          description: Kind of lease price visibility
          $ref: '#/components/schemas/EnumValue'
        mobilityPlanParts:
          type: array
          description: A list of mobility plan part allocation
          items:
            $ref: '#/components/schemas/MobilityPlanPartAllocation'
      description: The mobility budget allocation
    MobilityPlanAllocationResponse:
      type: object
      properties:
        mobilityPlanAllocation:
          description: The mobility budget allocation
          $ref: '#/components/schemas/MobilityPlanAllocation'
    MobilityPlanPartAllocation:
      type: object
      properties:
        mobilityPlanPartId:
          type: string
          description: The mobility plan part ID
          example: 88608864-19ea-4749-872f-ff18ad8bcb7b
        mobilityPlanUserPartId:
          type: string
          description: The mobility plan user part ID when overriding the part for a user specific
          example: '2147485869'
        mobilityPartType:
          description: The type of mobility plan part
          $ref: '#/components/schemas/EnumValue'
        mobilityBudgetedAmount:
          description: Mobility budgeted amount
          $ref: '#/components/schemas/MultiCurrencyValue'
        mobilityActualAmount:
          description: Mobility actual amount
          $ref: '#/components/schemas/MultiCurrencyValue'
        priceDifference:
          description: Price difference between mobilityBudgetedAmount and mobilityActualAmount
          $ref: '#/components/schemas/MultiCurrencyValue'
        salesQuote:
          description: Sales quote that is using this mobility plan part
          $ref: '#/components/schemas/SalesQuoteBudgetAllocation'
        orderedSalesQuote:
          description: Ordered sales quote that is using this mobility plan part
          $ref: '#/components/schemas/SalesQuoteBudgetAllocation'
        contract:
          description: Contract that is using this mobility plan part
          $ref: '#/components/schemas/ContractBudgetAllocation'
      description: Mobility plan part allocation
    SalesQuoteBudgetAllocation:
      type: object
      properties:
        salesQuoteId:
          type: string
          description: The ID of the sales quote
          example: '2147595087'
        reference:
          type: string
          description: Reference of the sales quote
          example: 006831/001
        expectedDeliveryDate:
          type: string
          description: Expected date when the delivery should happen
          format: date
          example: '2026-04-07'
        expirationDate:
          type: string
          description: The date on which the sales quote will expire
          format: date
          example: '2026-04-07'
        makeName:
          description: The name of the make of the car
          $ref: '#/components/schemas/MultiLanguageValue'
        modelName:
          description: The name of the model of the car
          $ref: '#/components/schemas/MultiLanguageValue'
        salesQuoteStatus:
          description: The status of the sales quote
          $ref: '#/components/schemas/EnumValue'
      description: Ordered sales quote that is using this mobility plan part
    CalculateMobilityPlanAllocationRequest:
