  /sales-quotes:
    get:
      tags:
        - SalesQuoteResource
      summary: Find sales quotes
      description: 'This endpoint retrieves a list of sales quotes.It can be used with a search query using the properties that can be found in the description of the query parameter search_query.It accepts multiple keywords separated by spaces, except for queries with only one character or the !, % and ^ wildcards.An example for a search query is ''11598 A1'': a search will be performed to find a match or partial match for ''11598'' or ''A1'' on the attributes.'
      operationId: findSalesQuotes
      parameters:
        - name: count
          in: query
          description: The maximum number of elements to be returned
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 10
        - name: offset
          in: query
          description: The number of elements to skip before returning the requested list of elements
          schema:
            minimum: 0
            type: integer
            format: int32
            example: 50
        - name: sort_by
          in: query
          description: List of order clauses in which the elements will be returned, deprecated since 2022-09-06 and version 1.184.0 in favor of sorting
          deprecated: true
          schema:
            type: array
            items:
              type: string
        - name: sorting
          in: query
          description: List of order clauses in which the elements will be returned
          schema:
            type: array
            items:
              type: string
        - name: sales_quote_id
          in: query
          description: ID(s) of the sales quote(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147595062'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'true'
        - name: broker_contact_id
          in: query
          description: ID(s) of the broker contact(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '2147595062'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'false'
        - name: broker_company_id
          in: query
          description: ID(s) of the broker company(ies), only useful in case of broker/dealer users
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '500003'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'false'
        - name: quote_status
          in: query
          description: ID(s) of the sales quote status(es); note that the quote_status_group parameter cannot be set in combination with this parameter.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100041'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'false'
        - name: quote_status_group
          in: query
          description: ID(s) of the sales quote status group(s); note that the quote_status parameter cannot be set in combination with this parameter.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '1076'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'false'
        - name: vehicle_category
          in: query
          description: ID(s) of the vehicle category(ies)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100008'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'true'
        - name: driver_id
          in: query
          description: ID(s) of the driver(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '600599'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'false'
        - name: customer_id
          in: query
          description: ID(s) of the customer(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '600364'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'false'
        - name: quotation_template_id
          in: query
          description: ID(s) of the quotation template(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '600080'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'false'
        - name: mobility_plan_id
          in: query
          description: ID(s) of the mobility plan(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: 00f3d16f-14fc-4117-b6d8-cce3f18fbd46
          x-miles-extra-description:
            Will be ignored when using a search_query: 'false'
        - name: include_vehicle_configuration_options
          in: query
          description: Indicates whether the response should include the vehicle configuration options
          schema:
            type: boolean
            default: false
          example: true
          x-miles-extra-description:
            Will be ignored when using a search_query: 'true'
        - name: vehicle_option_type_group_id
          in: query
          description: ID(s) of the vehicle option type group(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100041'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'false'
        - name: creation_date_to
          in: query
          description: 'The date until which the created quote is available, specified date included (ex: creation_date_to=2023-04-27)'
          schema:
            type: string
            format: date
            example: '2026-04-07'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'true'
        - name: creation_date_from
          in: query
          description: 'The date from which the created quote is available, specified date included (ex: creation_date_from=2023-04-27)'
          schema:
            type: string
            format: date
            example: '2026-04-07'
          x-miles-extra-description:
            Will be ignored when using a search_query: 'true'
        - name: reference
          in: query
          description: The reference of the sales quote
          schema:
            type: string
          example: 008971/001
          x-miles-extra-description:
            Will be ignored when using a search_query: 'true'
        - name: vehicle_model_name
          in: query
          description: The model name of the vehicle
          schema:
            type: string
          example: X1
          x-miles-extra-description:
            Will be ignored when using a search_query: 'true'
        - name: dynamic_attribute_filters
          in: query
          description: The dynamic attributes to filter on
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: 300123|Criterium
            x-miles-extra-description:
              Will be ignored when using a search_query: 'true'
        - name: search_query
          in: query
          description: NOTICE THIS WILL ONLY WORK FOR POSTGRES ODS By filling in this property you can do a back-end search
          schema:
            maxLength: 2147483647
            minLength: 2
            type: string
          example: 000927/
          x-miles-search:
            legalName: The legal name of the customer linked on to the sales quote
            tradingName: The trading name of the customer linked on to the sales quote
            reference: The reference of the sales quote
            officialRegistration: The official registration of the customer linked to the sales quote
            description: The description of the vehicle linked on to the sales quote
        - name: vehicle_nature_id
          in: query
          description: ID(s) of the vehicle nature(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100088'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindSalesQuotesResponse'
        '400':
          description: Only one of `findSalesQuotesRequestParameters.quote_status` or `findSalesQuotesRequestParameters.quote_status_group` can be filled in
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - '*'
