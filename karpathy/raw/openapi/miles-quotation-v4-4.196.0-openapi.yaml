        extraWebDiscount:
          description: Sum of catalogPrices of all 'Extra Web discount' accessories
          $ref: '#/components/schemas/MultiCurrencyValue'
        extraWebDiscountVatAmount:
          description: Calculated VAT over 'extraWebDiscount' (VAT % based on ConfigOption.catalogVATCodeEnumId)
          $ref: '#/components/schemas/MultiCurrencyValue'
        extraWebDiscountAmountInclVat:
          description: Sum of extraWebDiscount + extraWebDiscountVATAmount
          $ref: '#/components/schemas/MultiCurrencyValue'
        extraDiscounts:
          type: array
          description: A list of extra discounts
          items:
            $ref: '#/components/schemas/SalesQuotePricingDetailsDiscount'
        commercialAction:
          description: Sum of delivery cost components of configured delivery cost model
          $ref: '#/components/schemas/MultiCurrencyValue'
        deliveryCostComponents:
          type: array
          description: A list of delivery cost components of configured delivery cost model
          items:
            $ref: '#/components/schemas/DeliveryCostComponent'
        totalFinancedDeliveryCost:
          description: Sum of financed delivery costs (delivery costs marked as 'apply to order'). Deprecated since 2022-10-21 and version number 4.49.2 in favor of deliveryCostComponents
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalDealerDeliveryCosts:
          description: Sum of dealer delivery costs (delivery costs marked as 'apply to order')
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalDealerDeliveryCostsVat:
          description: The sum of all VAT amounts of the dealer delivery costs
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalDealerDeliveryCostsInclVat:
          description: The sum of the dealer delivery costs, including VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalOtherDeliveryCosts:
          description: Sum of other delivery costs (delivery costs not marked as 'apply to order')
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalOtherDeliveryCostsVat:
          description: The sum of all VAT amounts of the other delivery costs
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalOtherDeliveryCostsInclVat:
          description: The sum of the other delivery costs, including VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalDiscount:
          description: Sum of vehicleDiscount, fleetDiscount, optionDiscount, extraWebDiscount, commercialAction
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalDiscounted:
          description: Minus of totalPrice and totalDiscount
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalDiscountedVatAmount:
          description: Calculated VAT over 'totalDiscountedPrice' (VAT % based on ConfigVehicle.catalogVATCodeEnumId)
          $ref: '#/components/schemas/MultiCurrencyValue'
        totalDiscountedInclVat:
          description: Sum of totalDiscounted and totalDiscountedVATAmount
          $ref: '#/components/schemas/MultiCurrencyValue'
        tax:
          description: ConfigVehicle tax
          $ref: '#/components/schemas/MultiCurrencyValue'
        moreMileagePrice:
          description: Excess KM + excl VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        lessMileagePrice:
          description: 'Insufficient KM - excl VAT '
          $ref: '#/components/schemas/MultiCurrencyValue'
        moreMileagePriceInclVat:
          description: Excess KM + incl VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        lessMileagePriceInclVat:
          description: Insufficient KM - incl VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        purchaseOptionValue:
          description: Purchase option description
          $ref: '#/components/schemas/Price'
        purchaseOptionValueVatAmount:
          description: Purchase option description VAT amount
          $ref: '#/components/schemas/MultiCurrencyValue'
        purchaseOptionValueInclVat:
          description: Sum of purchaseOptionValue and purchaseOptionValueVATAmount
          $ref: '#/components/schemas/MultiCurrencyValue'
        quotationTemplateId:
          type: string
          description: The ID of the quotation template
          example: '600080'
        dealerVehiclePrice:
          description: The dealer vehicle price
          $ref: '#/components/schemas/DealerVehiclePrice'
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: A map of dynamic attributes
