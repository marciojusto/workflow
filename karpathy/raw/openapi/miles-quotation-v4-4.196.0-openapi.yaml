        language:
          maxLength: 3
          minLength: 2
          pattern: ^[A-Za-z]{2,3}$
          type: string
          description: The ISO 639-1 or ISO 639-2 code of the language, in which the mail will be generated. If not passed, the default language of the logged-in user will be used instead.
