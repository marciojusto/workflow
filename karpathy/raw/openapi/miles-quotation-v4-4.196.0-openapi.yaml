          type: string
          description: The name of the qualifier value
          example: Insured yes/no
        multiLanguageId:
          type: string
          description: The multi-language ID that can be used to retrieve the translation in other languages
          example: '170392'
        qualifierType:
          type: string
          description: The type of the qualifier
          example: '5'
        translation:
          type: string
      description: Miles API v1 representation of a qualifier value.
