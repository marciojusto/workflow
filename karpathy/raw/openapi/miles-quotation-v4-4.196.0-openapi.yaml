          description: |-
            Net price of the config vehicle with VAT.
            You need to provide exactly one net price, either the one with VAT (configVehicleNetPriceWithVat) or the one without VAT (configVehicleNetPriceWithoutVat)
          format: double
          example: 17500
        configVehicleNetPriceWithoutVat:
          minimum: 0
          type: number
          description: |-
            Net price of the config vehicle without VAT.
            You need to provide exactly one net price, either the one with VAT (configVehicleNetPriceWithVat) or the one without VAT (configVehicleNetPriceWithoutVat)
          format: double
          example: 17500
