openapi: 3.0.1
info:
  title: miles-quotation
  description: "This service supports creation, calculation and follow-up of sales quotes (price proposals), typically\n\t\t\tinvolving selection/configuration of a vehicle/asset and a choice of finance or rental product."
  contact:
    url: https://www.sofico.global
  license:
    name: Sofico
    url: https://www.sofico.global
  version: 4.196.0
  x-milesServiceType: functional
  x-logo:
    url: https://www.sofico.global/sofico.svg
    altText: Sofico logo
paths:
  /enumeration-groups/web-quote-escalation:
    get:
      tags:
        - EnumerationGroupResource
      summary: Find web quote escalation reason enumerations
      description: This endpoint retrieves a list of enumeration values for the web quote escalation group.
      operationId: findWebQuoteEscalationEnumerations
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindWebQuoteEscalationReasonsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_manager
            - mobility_manager_assistant
  /enumerations:
    get:
      tags:
        - EnumerationResource
      summary: Find enumerations
      description: This endpoint retrieves a list of enumeration values.
      operationId: findEnumerations
      parameters:
        - name: attribute_type_id
          in: query
          description: ID(s) of the attribute type of the enumeration value(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '100034'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindEnumerationsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_prospect
  /m2m/sales-quotes/{sales_quote_id}/quote-services:
    get:
      tags:
        - M2MSalesQuoteServicePriceDetailsResources
      summary: Get sales quote lease service price details by quote ID
      description: This endpoint retrieves lists of sales quote lease service price details.
      operationId: getQuoteLeasePriceDetailsForM2M
      parameters:
        - name: sales_quote_id
          in: path
          description: ID of the sales quote
          required: true
          schema:
            type: string
          example: '1000001'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/M2MGetSalesQuoteLeaseServicePriceDetailsResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - m2m_quote_fleet
  /mobility-plans/allocations/actions/calculations:
    post:
      tags:
        - MobilityPlanResource
      summary: Calculate mobility budget allocation
      description: This endpoint calculates a mobility budget allocation.
      operationId: calculateMobilityPlanAllocation
      requestBody:
        description: Data required to calculate a mobility budget allocation
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculateMobilityPlanAllocationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobilityPlanAllocationResponse'
        '400':
          description: Mobility plan ID must not be null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
  /mobility-plans/allocations/actions/confirmations:
    post:
      tags:
        - MobilityPlanResource
      summary: Confirm mobility budget allocation
      description: This endpoint confirms a mobility budget allocation.
      operationId: confirmMobilityPlanAllocation
      requestBody:
        description: Data required to confirm a mobility budget allocation
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmMobilityPlanAllocationRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobilityPlanAllocationResponse'
        '400':
          description: Mobility plan ID must not be null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
  /mobility-plans/{mobility_plan_id}/allocations:
    get:
      tags:
        - MobilityPlanResource
      summary: Get mobility budget allocation
      description: This endpoint retrieves a mobility budget allocation.
      operationId: getMobilityPlanAllocations
      parameters:
        - name: mobility_plan_id
          in: path
          description: ID of the mobility plan
          required: true
          schema:
            type: string
          example: 4623b852-7b47-46cf-90cf-f7718b81f8fc
        - name: driver_id
          in: query
          description: ID of the driver
          schema:
            type: string
          example: '2147485451'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobilityPlanAllocationResponse'
        '400':
          description: Mobility plan ID must not be null
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
  /ordered-quotations/{sales_quote_id}/documents:
    get:
      tags:
        - OrderedQuotationResource
      summary: Find documents attached to ordered sales quote
      description: This endpoint retrieves a list of all documents attached to an ordered sales quote.
      operationId: findAttachedDocumentsForOrder
      parameters:
        - name: sales_quote_id
          in: path
          description: ID of the sales quote
          required: true
          schema:
            type: string
          example: '2147595062'
        - name: status_id
          in: query
          description: ID(s) of the document status(es) (enumeration)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '89653'
        - name: document_template_id
          in: query
          description: ID(s) of the document template(es)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '500003'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindAttachedDocumentsResponse'
        '400':
          description: Sales quote ID required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
  /quotation-templates/evaluations:
    post:
      tags:
        - QuotationTemplateResource
      summary: Get the available quotation templates
      description: This endpoint evaluates a set of field and value pairs according to a set of rules in order to provide the available quotation templates.If the configuration of the rules has not been provided, this endpoint will result in a 501 (Not Implemented) error code.
      operationId: evaluateToQuotationTemplates
      requestBody:
        description: Data required to do an evaluation for the available quotation templates
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/AvailableQuotationTemplateRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvailableQuotationTemplatesResponse'
        '400':
          description: The available quotation template is required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_prospect
  /quotation-templates/{quotation_template_id}/allowed-services:
    get:
      tags:
        - QuotationTemplateResource
      summary: Get the allowed services for a quotation template
      description: This endpoint retrieves the allowed services for a customer or generic quotation template based on the quotation template ID. The unavailable services get filtered out based on the product configuration.
      operationId: getAllowedServices
      parameters:
        - name: quotation_template_id
          in: path
          description: The ID of the customer or generic quotation template
          required: true
          schema:
            type: string
          example: '7000005'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotationTemplateAllowedServices'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_prospect
            - retail_prospect
  /quotation-templates/{quotation_template_id}:
    get:
      tags:
        - QuotationTemplateResource
      summary: Get quotation template
      description: This endpoint retrieves a quotation template by ID.
      operationId: getAvailableQuotationTemplate
      parameters:
        - name: quotation_template_id
          in: path
          description: ID of the quotation
          required: true
          schema:
            type: string
          example: '601120'
        - name: include_additional_content
          in: query
          description: Boolean to indicate if additional additionalContent attribute is fetched.
          schema:
            type: boolean
            default: false
          example: true
        - name: additional_content_key
          in: query
          description: The key(s) on which the additional content must be filtered, this will be ignored if 'include_additional_content' is false.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: description
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetQuotationTemplate'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_prospect
  /quotation-templates:
    get:
      tags:
        - QuotationTemplateResource
      summary: Find available quotation templates
      description: This endpoint retrieves a list of quotation templates. Either use the driver ID or the contact categories to retrieve the quotation templates (optional). The quotation templates of commercial parents are included.
      operationId: getAvailableQuotationTemplates
      parameters:
        - name: customer_id
          in: query
          description: ID(s) of the customer(s)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '600364'
        - name: driver_id
          in: query
          description: ID(s) of the driver(s)
          schema:
            type: array
            items:
              type: string
              example: '600599'
        - name: quote_product_id
          in: query
          description: ID(s) of the quote product(s)
          schema:
            type: array
            items:
              type: string
              example: '600122'
        - name: product_category_id
          in: query
          description: ID(s) of the product category(s)
          schema:
            type: array
            items:
              type: string
              example: '801'
        - name: contact_categories
          in: query
          description: ID(s) of the contact category(ies)
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: '600599'
        - name: mobility_part_type
          in: query
          description: The type of mobility part
          schema:
            type: string
          example: parttypecar
        - name: include_object_information
          in: query
          description: Use 'include_additional_content' instead.
          deprecated: true
          schema:
            type: boolean
            default: false
        - name: include_additional_content
          in: query
          description: Boolean to indicate if additional additionalContent attribute is fetched.
          schema:
            type: boolean
            default: false
          example: true
        - name: additional_content_key
          in: query
          description: The key(s) on which the additional content must be filtered, this will be ignored if 'include_additional_content' is false.
          schema:
            uniqueItems: true
            type: array
            items:
              type: string
              example: description
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuotationTemplateResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_prospect
  /quotation-templates/{quotation_template_id}/sales-quotes-defaults:
    post:
      tags:
        - QuotationTemplateResource
      summary: Get the defaulted sales quote request
      description: This endpoint returns the defaulted sales quote request according to a set of rules provided in a configuration file.
      operationId: getDefaultedSalesQuoteRequest
      parameters:
        - name: quotation_template_id
          in: path
          description: The ID of the quotation template
          required: true
          schema:
            type: string
          example: '7000005'
      requestBody:
        description: Data required
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/SalesQuoteDefaultsRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesQuoteDefaultsResponse'
        '400':
          description: Mileage and term fields required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
        '501':
          description: The configuration of the rules have not been provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_prospect
  /quotation-templates/{quotation_template_id}/input-restrictions:
    post:
      tags:
        - QuotationTemplateResource
      summary: Get quotation template input restrictions
      description: This endpoint retrieves the input restrictions of a quotation template by ID.
      operationId: getInputRestrictions
      parameters:
        - name: quotation_template_id
          in: path
          description: ID of the quotation
          required: true
          schema:
            type: string
          example: '601120'
      requestBody:
        description: Data required to filter the input restrictions
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/InputRestrictionsRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InputRestrictionsResponse'
        '400':
          description: Product ID required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Unprocessable Entity
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_prospect
  /sales-quotes/{sales_quote_id}/co-customers:
    get:
      tags:
        - SalesQuoteResource
      summary: Find co-customers of a sales quote
      description: This endpoint retrieves the co-customers linked to a sales quote.
      operationId: findCoCustomers
      parameters:
        - name: sales_quote_id
          in: path
          description: ID of the sales quote
          required: true
          schema:
            type: string
          example: '32432'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FindCoCustomersResponse'
        '400':
          description: Sales quote ID required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Sales quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
    post:
      tags:
        - SalesQuoteResource
      summary: Add a new co-customer to the sales quote
      description: This endpoint adds a new co-customer to the sales quote.
      operationId: addCoCustomerForSalesQuote
      parameters:
        - name: sales_quote_id
          in: path
          description: ID of the sales quote
          required: true
          schema:
            type: string
          example: '215864215'
        - name: ignore_warnings
          in: query
          description: Indicates whether warnings should be ignored. If set to true, interactive warnings will be ignored.
          schema:
            type: boolean
            default: false
          example: true
      requestBody:
        description: Co-customer data required to add to the sales quote
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CoCustomerRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CoCustomerResponse'
        '400':
          description: Sales quote ID and customer detail required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Sales quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: Modifying the co-customer in the sales quote has failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
      security:
        - Roles:
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
  /sales-quotes/{sales_quote_id}/signatories:
    get:
      tags:
        - SalesQuoteResource
      summary: Get signatories
      description: This endpoint retrieves the signatories for a certain sales quote.
      operationId: getSignatories
      parameters:
        - name: sales_quote_id
          in: path
          description: ID of the sales quote
          required: true
          schema:
            type: string
          example: '2147595062'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SignatoriesResponse'
        '400':
          description: Sales quote ID required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Sales quote not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
