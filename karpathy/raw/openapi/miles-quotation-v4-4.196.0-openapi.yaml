      description: This endpoint will generate the necessary templated message contents for a sales quote that needs to be sent by mail.
      operationId: getTemplatedMessageContents
      parameters:
        - name: sales_quote_id
          in: path
          description: ID of the sales quote
          required: true
          schema:
            type: string
          example: '2147595062'
        - name: mail_subject_template_id
          in: query
          description: The text template ID that should be used to generate the mail subject
          required: true
          schema:
            minLength: 1
            type: string
          example: '100001'
        - name: mail_body_template_id
          in: query
          description: The text template ID that should be used to generate the mail body
          required: true
          schema:
            minLength: 1
            type: string
          example: '100002'
        - name: language
          in: query
          description: The ISO 639-1 or ISO 639-2 code of the language in which the mail subject and body should be generated. If not passed the language of the logged-in user will be used.
          schema:
            maxLength: 3
            minLength: 2
            pattern: ^[A-Za-z]{2,3}$
            type: string
            format: ISO 639-1 or ISO 639-2
          example: NLD
      responses:
        '200':
          description: OK
          content:
