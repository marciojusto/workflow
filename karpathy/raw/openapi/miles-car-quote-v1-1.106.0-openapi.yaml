openapi: 3.0.1
info:
  title: miles-car-quote
  description: This service is used to create and copy car quotes.
  contact:
    url: https://www.sofico.global
  license:
    name: Sofico
    url: https://www.sofico.global
  version: 1.106.0
  x-milesServiceType: functional
  x-logo:
    url: https://www.sofico.global/sofico.svg
    altText: Sofico logo
tags:
  - name: ValidationRules
    description: This resource contains endpoints related to validation rules.
paths:
  /car-quotes/{quote_id}/actions/copies:
    post:
      summary: Copy a car quote
      description: This endpoint creates a copy of an existing car quote.
      operationId: copyQuote
      parameters:
        - name: quote_id
          in: path
          description: ID of the car quote to copy
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CopyQuoteResponse'
        '400':
          description: |-
            - The quote status is not configured in the config file.
            - The value for property `quote.quoteStatus`: '%s' should be a number.
            - The quote status is not configured in the config file.
            - A quotation template needs to be provided.
            - The quote status is not valid for the authenticated user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: '- The user does not hold any credentials for the operation.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: '- The current user is not allowed to set the catalog option prices.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - No access type was found on the quotation template.
            - The quotation template access type is not allowed.
            - No access type was found on the quotation template.
            - The quote could not be found.
            - The default leasing company was not found for the authenticated user.
            - Failed to initialize the Mobility Manager context because no customers were found.
            - No driver could be found for the mobility user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: |-
            - Failed to perform quote update.
            - Copying a car quote is only possible for the broker company linked to the broker contact on the car quote you want to copy.
            - Only a fleet manager is allowed to copy a sales quote for multiple vehicles.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
        '500':
          description: |-
            - The VAT calculation could not be performed because the customer could not be found.
            - The VAT calculation could not be performed because no country was specified.
            - Failed to perform VAT calculation.
            - The VAT calculation could not be performed because no VAT code was specified.
            - The VAT calculation could not be performed: all lists in the arguments should have the same size.
            - Failed to retrieve the ID of the contact.
            - Something went wrong updating the sales quote.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_prospect
  /car-quotes:
    post:
      summary: Create a car quote
      description: This endpoint creates a new car quote.
      operationId: createQuote
      requestBody:
        description: Data required to create a sales car quote
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCarQuoteRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCarQuoteResponse'
        '400':
          description: |-
            - When the quote is linked to a list car policy, the car policy vehicle ID should be defined.
            - More than one catalog reference was found.
            - The quote status is not configured in the config file.
            - The value for property `quote.quoteStatus`: '%s' should be a number.
            - Please provide either mileage or distance, and either term or duration.
            - The parameter `legalEntityGroupId` cannot be defined in the same request as customer ID or customer.
            - The customer legal entity is required for creation of the customer.
            - A quotation template needs to be provided.
            - Catalog option ID and catalog option code cannot be used together.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: '- The user does not hold any credentials for the operation.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: |-
            - The current user is not allowed to set the catalog price.
            - The current user is not allowed to set the vehicle nature. The user must be either the broker or dealer.
            - The current user is not allowed to set the catalog option prices.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - The customer ID you provided could not be found.
            - The quotation template could not be found with the provided ID.
            - The car policy vehicle with ID '%s' could not be found. Check if the ID is correct and associated with an existing vehicle in the policy.
            - No access type was found on the quotation template.
            - The quotation template access type is not allowed.
            - The default leasing company was not found for the authenticated user.
            - Failed to initialize the Mobility Manager context because no customers were found.
            - The supplier ID cannot be found.
            - No driver could be found for the mobility user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: |-
            - When creating a quote based on a list-based car policy you should always select a driver!
            - The provided vehicle nature ID is not allowed.
            - The provided catalog vehicle ID is not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
        '500':
          description: |-
            - Failed to perform quote creation.
            - No default customer has been defined for the car quote. At least the customer ID, customer or legal entity group ID is needed.
            - The VAT calculation could not be performed because the customer could not be found.
            - The VAT calculation could not be performed because no country was specified.
            - Failed to perform VAT calculation.
            - The VAT calculation could not be performed because no VAT code was specified.
            - The VAT calculation could not be performed: all lists in the arguments should have the same size.
            - A failure occurred while performing the create customer request.
            - Failed to retrieve the ID of the contact.
            - Something went wrong updating the sales quote.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_prospect
  /stock-car-quotes:
    post:
      summary: Create a car quote for a stock vehicle
      description: This endpoint creates a new car quote for a stock vehicle.
      operationId: createQuoteStockVehicle
      requestBody:
        description: Data required to create a sales car quote for a stock vehicle
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateStockCarQuoteRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateStockCarQuoteResponse'
        '400':
          description: |-
            - More than one catalog reference was found.
            - The customer legal entity is required for creation of the customer.
            - The quote status is not configured in the config file.
            - The value for property `quote.quoteStatus`: '%s' should be a number.
            - The parameter `legalEntityGroupId` cannot be defined in the same request as customer ID or customer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: '- The user does not hold any credentials for the operation.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: '- The current user is not allowed to set the vehicle nature. The user must be either the broker or dealer.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - The customer ID you provided could not be found.
            - The quotation template could not be found with the provided ID.
            - The provided catalog vehicle could not be found.
            - No access type was found on the quotation template.
            - The quotation template access type is not allowed.
            - The default leasing company was not found for the authenticated user.
            - Failed to initialize the Mobility Manager context because no customers were found.
            - The supplier ID cannot be found.
            - No driver could be found for the mobility user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: '- The provided vehicle nature ID is not allowed.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
        '500':
          description: |-
            - No default customer has been defined for the car quote. At least the customer ID, customer or legal entity group ID is needed.
            - Asynchronous task handling failed while converting the quote.
            - The VAT calculation could not be performed because the customer could not be found.
            - The VAT calculation could not be performed because no country was specified.
            - Failed to perform VAT calculation.
            - The VAT calculation could not be performed because no VAT code was specified.
            - The VAT calculation could not be performed: all lists in the arguments should have the same size.
            - A failure occurred while performing the create customer request.
            - Failed to retrieve the ID of the contact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      deprecated: true
      security:
        - Roles:
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
  /used-car-quotes:
    post:
      summary: Create a car quote for a used vehicle
      description: This endpoint creates a new car quote for a used vehicle.
      operationId: createQuoteUsedVehicle
      requestBody:
        description: Data required to create a sales car quote for a used vehicle
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUsedCarQuoteRequest'
        required: true
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateUsedCarQuoteResponse'
        '400':
          description: |-
            - More than one catalog reference was found.
            - The customer legal entity is required for creation of the customer.
            - The quote status is not configured in the config file.
            - The value for property `quote.quoteStatus`: '%s' should be a number.
            - The parameter `legalEntityGroupId` cannot be defined in the same request as customer ID or customer.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '401':
          description: '- The user does not hold any credentials for the operation.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: |-
            - The current user is not allowed to set the vehicle nature. The user must be either the broker or dealer.
            - The current user is not allowed to set the catalog option prices.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: |-
            - The customer ID you provided could not be found.
            - The quotation template could not be found with the provided ID.
            - The provided catalog vehicle could not be found.
            - No access type was found on the quotation template.
            - The quotation template access type is not allowed.
            - The default leasing company was not found for the authenticated user.
            - Failed to initialize the Mobility Manager context because no customers were found.
            - The supplier ID cannot be found.
            - No driver could be found for the mobility user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '422':
          description: '- The provided vehicle nature ID is not allowed.'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WarningsInfoDTO'
        '500':
          description: |-
            - No default customer has been defined for the car quote. At least the customer ID, customer or legal entity group ID is needed.
            - Creating or copying the quote failed.
            - Asynchronous task handling failed while converting the quote.
            - The VAT calculation could not be performed because the customer could not be found.
            - The VAT calculation could not be performed because no VAT code was specified.
            - The VAT calculation could not be performed because no country was specified.
            - The VAT calculation could not be performed: all lists in the arguments should have the same size.
            - Failed to perform VAT calculation.
            - The VAT calculation could not be performed: all lists in the arguments should have the same size.
            - A failure occurred while performing the create customer request.
            - Failed to retrieve the ID of the contact.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      deprecated: true
      security:
        - Roles:
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
  /validation-rules/{validation_id}:
    get:
      tags:
        - ValidationRules
      summary: Get validation rules
      description: This endpoint retrieves the validation rules used by the requested validation category.
      operationId: getValidationRules
      parameters:
        - name: validation_id
          in: path
          description: |
            The ID of the validation category.
            For now, only the following value can be provided:
            - `CREATE_CAR_QUOTE`: Returns the validation rules that will be applied on the request when creating a new car quote,
              using the `POST /car-quotes` endpoint.
          required: true
          schema:
            $ref: '#/components/schemas/ValidationRulesCategory'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationRoot'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExceptionInfoDTO'
      security:
        - Roles:
            - mobility_user
            - mobility_manager
            - mobility_manager_assistant
            - dealer_manager
            - dealer_salesperson
            - broker_manager
            - broker_salesperson
            - retail_prospect
components:
  schemas:
    AbstractValue:
      type: object
    Address:
      type: object
      properties:
        addressId:
          type: string
          description: The address ID
          example: '23287213'
        formattedAddress:
          type: string
          description: The formatted address
          example: Leasingweg 1 1000 AA AMSTERDAM
        postalCode:
          type: string
          description: The postal code
          example: '9000'
        city:
          description: The city of the address
          $ref: '#/components/schemas/MultiLanguageValue'
        state:
          description: The state of the address
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine1:
          description: The first address line
          $ref: '#/components/schemas/MultiLanguageValue'
        addressLine2:
          description: The second address line
          $ref: '#/components/schemas/MultiLanguageValue'
        locationIdentification:
          description: The location of identification
          $ref: '#/components/schemas/MultiLanguageValue'
        deleted:
          type: boolean
          description: Indicates if the address has been deleted
          example: true
        country:
          description: The country of the address
          $ref: '#/components/schemas/Country'
      description: The address of the supplier
    AllocatedDriverResponse:
      type: object
      properties:
        allocatedDriverId:
          type: string
          description: The allocated driver ID
          example: '1012345'
        driverId:
          type: string
          description: The driver ID
          example: '2012345'
        isMainDriver:
          type: boolean
          description: Indicates whether this is the main driver
          example: true
        dynamicAttributes:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/DynamicAttributeValue'
          description: A map of dynamic attributes
      description: Allocated driver
    BatteryType:
      type: object
      properties:
        id:
          type: string
          description: The ID of the battery type
          example: '1000341'
        description:
          type: string
          description: The battery type of the vehicle
          example: lithium-ion polymer
      description: The battery type of the vehicle
    BrokerCompanyReference:
      type: object
      properties:
        brokerCompanyId:
          type: string
          description: The ID of the broker company
          example: '100001'
        tradingName:
          type: string
          description: The trading name of the broker company
          example: Company Co
      description: A broker company
    BrokerContactRepresentation:
      type: object
      properties:
        brokerContactId:
          type: string
          description: Broker contact ID
          example: '600001'
        brokerContactIdentification:
          type: string
          description: Broker contact identification
          example: Smith, John
      description: Broker Contact representation
    CalculateQuoteInfo:
      type: object
      properties:
        budgetDifference:
          type: number
          description: Difference between the budget and the lease price
          format: double
          example: -426.76
        budget:
          type: number
          description: The budget
          format: double
          example: 1500
        warningBudgetReachingMaximum:
          type: boolean
          description: Whether the lease price reached the maximum of the budget
          example: false
        fleetPolicyViolated:
          type: boolean
          description: Whether there are violations of the fleet policy
          example: false
        downPaymentAllowed:
          type: boolean
          description: Whether a down payment is allowed or not
          example: false
        accessoriesNotAllowed:
          type: boolean
          description: Whether accessories are allowed or not
          example: false
        invoicingTargetEditable:
          type: boolean
          description: Whether it is possible to change who will pay the down payment
          example: true
        invoicingTargetDefault:
          type: string
          description: Who will pay the invoice of the down payment
        pricesVisible:
          type: boolean
          description: Whether the price is visible
          example: true
        budgetIsSet:
          type: boolean
          description: Whether a budget is set
          example: true
        remainingOptionalEquipmentBudget:
          type: number
          description: The remaining optional equipment budget
          format: double
          example: 7500
        remainingOptionalEquipmentBudgetExceeded:
          type: boolean
          description: Whether the remaining optional equipment budget has exceeded
          example: false
        optionalEquipmentBudget:
          type: number
          description: The optional equipment budget set on the car policy
          format: double
          example: 7500
        upgradeCost:
          type: number
          description: The upgrade cost defined in the car policy for that car
          format: double
          example: 2000
        downgradeCompensation:
          type: number
          description: The downgrade compensation defined in the car policy for that car
          format: double
          example: 1000
        maximumUpfrontPayment:
          type: number
          description: The maximum amount of upfront you can use
          format: double
          example: 2000
        informationalUpfrontPayment:
          type: number
          description: 'This value will be filled as informational if you have configured upgrade cost impact to ''Internal company arrangement'' on the car policy '
          format: double
          example: 3000
        isUpfrontLimitExceeded:
          type: boolean
          description: Whether the upfront limit has exceeded
          example: false
        isMandatoryTerm:
          type: boolean
          description: Indicates whether the term is mandatory
          example: false
        isMandatoryMileage:
          type: boolean
          description: Indicates whether the mileage is mandatory
          example: false
      description: The calculate sales quote info
    CarConfiguration:
      type: object
      properties:
        quoteVehicleId:
          type: string
          description: The ID of the quote vehicle
          example: '123456'
        description:
          description: The description
          $ref: '#/components/schemas/MultiLanguageValue'
        catalogCarId:
          type: string
          description: The catalog car ID
          example: '12345'
        makeName:
          description: Deprecated since 2022-12-19 and version 1.55.0 in favor of make.makeName
          $ref: '#/components/schemas/MultiLanguageValue'
        modelName:
          description: Deprecated since 2022-12-19 and version 1.55.0 in favor of model.modelName
          $ref: '#/components/schemas/MultiLanguageValue'
        modelYear:
          type: string
          description: Deprecated since 2022-12-19 and version 1.55.0 in favor of model.modelYear
          format: date
          deprecated: true
          example: '2026-04-02'
        typeName:
          type: string
          description: The name of the type
          example: SUV
        consumption:
          description: The fuel consumption of the car
          $ref: '#/components/schemas/DoubleUnitValue'
        co2Emission:
          type: integer
          description: The CO2 emission of the car
          format: int32
          example: 5
        kW:
          type: number
          description: The kW of the vehicle
          format: double
        dinHp:
          type: integer
          description: The horsepower of the car
          format: int32
          example: 142
        cc:
          type: number
          description: The engine capacity of the car
          format: double
          example: 500
        code:
          type: string
          description: The code of the car
          example: AB12CD
        engineFuelType:
          description: The fuel type of the engine
          $ref: '#/components/schemas/EnumValue'
        imagesPath:
          type: string
          description: The path to the image of the car
          example: AUDI/A4/2017/5ES*
        maximumSeatingCapacity:
          type: integer
          description: The maximum number of seating capacity of the car
          format: int32
          example: 7
        seatingCapacity:
          type: integer
          description: The seating capacity of the car
          format: int32
          example: 5
        transmission:
          description: The transmission of the car
          $ref: '#/components/schemas/EnumValue'
        nature:
          description: The nature of the car
          $ref: '#/components/schemas/EnumValue'
        catalogVATCode:
          description: The catalog VAT code of the car
          $ref: '#/components/schemas/EnumValue'
        powertrain:
          description: Kind of powertrain the car has
          $ref: '#/components/schemas/EnumValue'
        tax:
          description: The tax
          $ref: '#/components/schemas/MultiCurrencyValue'
        netPrice:
          description: The net price for the car
          $ref: '#/components/schemas/MultiCurrencyValue'
        netPriceInclVAT:
          description: The net price including the VAT of the car
          $ref: '#/components/schemas/MultiCurrencyValue'
        catalogPrice:
          description: The catalog price of the car
          $ref: '#/components/schemas/MultiCurrencyValue'
        consumerPrice:
          description: The consumer price of the car
          $ref: '#/components/schemas/MultiCurrencyValue'
        discountPercentage:
          type: number
          description: Discount percentage
          format: double
          example: 0.25
        discountAmount:
          description: The amount of discount
          $ref: '#/components/schemas/MultiCurrencyValue'
        discountAmountInclVAT:
          description: The amount of discount inclusive the VAT
          $ref: '#/components/schemas/MultiCurrencyValue'
        isDealerImposed:
          type: boolean
          description: Whether it's imposed by the dealer
          example: true
        totalOptionPrice:
          description: The total price of the car options
          $ref: '#/components/schemas/MultiCurrencyValue'
        acceleration:
          type: number
          description: Acceleration from 0 to 100 km/h or from 0 to 60 mp/h
          format: double
          example: 10.8
        fiscalPower:
          type: integer
          description: Fiscal power is used for taxation
          format: int32
          example: 1
        fiscalValue:
          description: Fiscal value
          $ref: '#/components/schemas/MultiCurrencyValue'
        height:
          type: integer
          description: The height of the car in mm
          format: int32
          example: 1423
        length:
          type: integer
          description: The length of the car in mm
          format: int32
          example: 4292
        width:
          type: integer
          description: The width of the car in mm
          format: int32
          example: 1765
        netWeight:
          description: How much the car weighs
          $ref: '#/components/schemas/DoubleUnitValue'
        noxEmission:
          type: integer
          description: (NOx) emissions is the nitrogen oxides that a car emits in mg/km
          format: int32
          example: 151
        numberOfCylinders:
          type: integer
          description: Number of cylinders the car has
          format: int32
          example: 4
        tankContents:
          type: number
          description: The content of the tank
          format: double
          example: 55
        torque:
          type: integer
          description: The torque of the car in Nm
          format: int32
          example: 175
        wheelbase:
          type: integer
          description: The width of the wheelbase in mm
          format: int32
          example: 2578
        tireSpecification:
          type: string
          description: The specification of the tire
          example: 225 45 17 V
        maxWeight:
          description: The max weight of the car
          $ref: '#/components/schemas/DoubleUnitValue'
        maxLoad:
          description: The max load of the car
          $ref: '#/components/schemas/DoubleUnitValue'
        trailerLoadBraked:
          description: Braked weight is the maximum weight of a trailer, caravan, boat trailer or horsebox that has its own brakes
          $ref: '#/components/schemas/DoubleUnitValue'
        trailerLoadUnbraked:
          description: Unbraked weight is the maximum weight of a trailer, caravan, boat trailer or horsebox that is not capable of braking independently.
          $ref: '#/components/schemas/DoubleUnitValue'
        bodyStyle:
          description: Kind of body style the car has
          $ref: '#/components/schemas/EnumValue'
        energyLabel:
          description: Kind of energy label the car has
          $ref: '#/components/schemas/EnumValue'
        emissionNorm:
          description: Type of emission norm the car has
          $ref: '#/components/schemas/EnumValue'
        drive:
          description: Kind of drive the car has
          $ref: '#/components/schemas/EnumValue'
        numberOfDoors:
          description: Number of doors the car has
          $ref: '#/components/schemas/EnumValue'
        orderStrategy:
          description: Strategy from where the vehicle gets ordered
          $ref: '#/components/schemas/EnumValue'
        vehicleCategory:
          description: The category of the vehicle
          $ref: '#/components/schemas/VehicleCategory'
        configurationChangedDate:
          type: string
